<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Growth Engine · Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #FAF9F5;
    --paper-2: #F3F1EA;
    --card: #FFFFFF;
    --ink: #16151A;
    --ink-2: #44424C;
    --ink-3: #75727E;
    --line: #E8E5DD;
    --line-2: #DEDACF;
    --purple: #7C3AED;
    --purple-2: #C069DD;
    --purple-soft: #F3ECFD;
    --secondary: #0E7C7B;      /* soft teal, the one secondary */
    --secondary-soft: #E4F2F1;
    --gold: #B08833;
    --shadow-sm: 0 1px 2px rgba(22,21,26,.04), 0 4px 14px rgba(22,21,26,.05);
    --shadow-md: 0 2px 6px rgba(22,21,26,.05), 0 18px 50px rgba(22,21,26,.08);
    --shadow-lg: 0 30px 80px rgba(60,30,110,.12);
    --r-sm: 12px;
    --r-md: 18px;
    --r-lg: 26px;
    --maxw: 1080px;
    --accent: #7C3AED;         /* overridden per-prospect via JS */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  body::before {
    /* faint paper grain / warmth */
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(124,58,237,.05), transparent 60%),
      radial-gradient(900px 600px at -10% 30%, rgba(14,124,123,.035), transparent 55%);
    z-index: 0;
  }

  h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; font-weight: 600; line-height: 1.08; letter-spacing: -.02em; color: var(--ink); }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; position: relative; z-index: 1; }
  section { position: relative; z-index: 1; }

  .eyebrow {
    font-family: 'Outfit', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
    color: var(--ink-3);
    display: inline-flex; align-items: center; gap: 9px;
  }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .accent-text { color: var(--accent); }

  /* ---------- icons ---------- */
  .ic { display: inline-flex; flex: 0 0 auto; }
  .ic svg { display: block; width: 100%; height: 100%; }

  /* ---------- reveal motion ----------
     Hidden state is only ever applied once JS has marked the body .js-on.
     So with JS disabled (or if the script errors before boot), every .reveal
     stays at its natural opacity:1 and the whole page is visible. The JS path
     adds .in (scroll observer) and a hard safety net force-shows everything. */
  .reveal { opacity: 1; transform: none; }
  body.js-on .reveal { opacity: 0; transform: translateY(18px); transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); will-change: opacity, transform; }
  body.js-on .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .reveal, body.js-on .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    html { scroll-behavior: auto; }
  }

  /* ================= COVER ================= */
  .cover { padding: 64px 0 56px; }
  .cover-top {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding-bottom: 40px;
  }
  .brandmark { display: flex; align-items: center; gap: 12px; }
  .brandmark .logo {
    width: 40px; height: 40px; border-radius: 11px;
    background: linear-gradient(150deg, var(--purple), var(--purple-2));
    display: grid; place-items: center; box-shadow: 0 6px 18px rgba(124,58,237,.28);
  }
  .brandmark .logo svg { width: 22px; height: 22px; }
  .brandmark .name { font-family: 'Outfit'; font-weight: 600; font-size: 16px; letter-spacing: -.01em; }
  .brandmark .name span { color: var(--ink-3); font-weight: 400; }
  .cover-prepared { text-align: right; font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }
  .cover-prepared b { color: var(--ink); font-weight: 600; display: block; font-family: 'Outfit'; }

  .cover-grid {
    display: grid; grid-template-columns: 1.15fr .85fr; gap: 48px; align-items: center;
  }
  .cover-kicker { margin-bottom: 22px; }
  .cover-for {
    font-family: 'Outfit'; font-size: 13px; font-weight: 500; color: var(--ink-3);
    letter-spacing: .02em; margin-bottom: 14px;
  }
  .cover-for b { color: var(--accent); font-weight: 600; }
  h1.cover-title {
    font-size: clamp(38px, 6vw, 62px); font-weight: 600; letter-spacing: -.035em;
    line-height: 1.02; margin-bottom: 22px;
  }
  h1.cover-title .hl { color: var(--accent); }
  .cover-sub { font-size: clamp(16px, 2.1vw, 19px); color: var(--ink-2); max-width: 32ch; margin-bottom: 30px; }
  .cover-meta { display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: center; }
  .meta-chip {
    display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-2);
    background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px;
    box-shadow: var(--shadow-sm);
  }
  .meta-chip .ic { width: 15px; height: 15px; color: var(--accent); }

  .cover-visual {
    position: relative; aspect-ratio: 1/1; border-radius: var(--r-lg);
    overflow: hidden; border: 1px solid var(--line);
    background: var(--card); box-shadow: var(--shadow-lg);
  }
  .cover-visual svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ================= TRUST BAR ================= */
  .trust { padding: 30px 0 8px; }
  .trust-inner {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg);
    box-shadow: var(--shadow-md); overflow: hidden;
  }
  .trust-press { padding: 26px 30px 22px; border-bottom: 1px solid var(--line); }
  .trust-press .lbl {
    font-family: 'Outfit'; font-size: 11.5px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; color: var(--ink-3); text-align: center; margin-bottom: 18px;
  }
  .press-row {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
    gap: 14px 36px;
  }
  .press-logo {
    font-family: 'Outfit'; font-weight: 600; font-size: clamp(15px, 2.4vw, 21px);
    color: var(--ink); letter-spacing: -.01em; opacity: .82;
    white-space: nowrap;
  }
  .press-logo.serif { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-style: normal; }
  .press-logo.caps { text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }

  .trust-chips { display: grid; grid-template-columns: repeat(3, 1fr); }
  .trust-chip { padding: 24px 26px; text-align: center; border-right: 1px solid var(--line); }
  .trust-chip:last-child { border-right: none; }
  .trust-chip .val {
    font-family: 'Outfit'; font-weight: 700; font-size: clamp(28px, 4.4vw, 40px);
    letter-spacing: -.03em; line-height: 1;
    background: linear-gradient(120deg, var(--purple), var(--purple-2));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .trust-chip .lbl { font-size: 13px; color: var(--ink-3); margin-top: 9px; }

  /* ================= GENERIC SECTION ================= */
  .sec { padding: 78px 0; }
  .sec-head { max-width: 56ch; margin-bottom: 42px; }
  .sec-head h2 { font-size: clamp(28px, 4.4vw, 42px); margin: 14px 0 0; letter-spacing: -.03em; }
  .sec-head p { color: var(--ink-2); font-size: 16.5px; margin-top: 14px; max-width: 50ch; }

  /* ----- We studied you ----- */
  .study-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 44px; align-items: center; }
  .browser {
    border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--line-2);
    box-shadow: var(--shadow-lg); background: var(--card);
  }
  .browser-bar {
    display: flex; align-items: center; gap: 8px; padding: 11px 14px;
    background: var(--paper-2); border-bottom: 1px solid var(--line);
  }
  .browser-bar .dots { display: flex; gap: 6px; }
  .browser-bar .dots i { width: 10px; height: 10px; border-radius: 50%; display: block; }
  .browser-bar .dots i:nth-child(1){ background:#E36E62; } .browser-bar .dots i:nth-child(2){ background:#E9B84A; } .browser-bar .dots i:nth-child(3){ background:#4FB867; }
  .browser-bar .url {
    flex: 1; font-size: 12px; color: var(--ink-3); background: var(--card);
    border: 1px solid var(--line); border-radius: 8px; padding: 5px 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 7px;
  }
  .browser-bar .url .ic { width: 12px; height: 12px; color: var(--secondary); }
  .browser-shot { display: block; width: 100%; aspect-ratio: 16/10.5; object-fit: cover; object-position: top center; background: var(--paper-2); }
  /* placeholder swap */
  .shot-ph {
    aspect-ratio: 16/10.5; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background:
      linear-gradient(180deg, var(--card), var(--paper-2));
    color: var(--ink-3); text-align: center; padding: 24px;
  }
  .shot-ph .ic { width: 34px; height: 34px; color: var(--accent); opacity: .7; }
  .shot-ph .u { font-family: 'Outfit'; font-weight: 600; color: var(--ink-2); font-size: 15px; }
  .shot-ph .t { font-size: 12.5px; max-width: 28ch; }

  .study-read .summary { font-size: 17px; color: var(--ink-2); margin-bottom: 26px; max-width: 42ch; }
  .signal-list { display: flex; flex-direction: column; gap: 12px; }
  .signal {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 14px 16px; box-shadow: var(--shadow-sm);
  }
  .signal .ico {
    width: 34px; height: 34px; flex: 0 0 auto; border-radius: 9px;
    background: var(--secondary-soft); color: var(--secondary);
    display: grid; place-items: center;
  }
  .signal .ico .ic { width: 17px; height: 17px; }
  .signal .txt { font-size: 14.5px; color: var(--ink); font-weight: 500; font-family: 'Outfit'; }

  /* ----- Strategy ----- */
  .strategy { background: linear-gradient(180deg, var(--paper), var(--purple-soft) 60%, var(--paper)); }
  .badge-free {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--ink); color: #fff; border-radius: 999px; padding: 8px 16px;
    font-family: 'Outfit'; font-size: 12.5px; font-weight: 600; letter-spacing: .02em;
    box-shadow: 0 10px 30px rgba(22,21,26,.18);
  }
  .badge-free .ic { width: 15px; height: 15px; color: var(--purple-2); }
  .strategy-head { text-align: center; max-width: 24ch; margin: 22px auto 8px; }
  .strategy-head h2 { font-size: clamp(30px, 5vw, 48px); letter-spacing: -.035em; }
  .strategy-head h2 .hl { color: var(--accent); }
  .strategy-sub { text-align: center; color: var(--ink-3); font-size: 14.5px; margin-bottom: 48px; }
  .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .pillar {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 30px 26px; box-shadow: var(--shadow-md); position: relative; overflow: hidden;
  }
  .pillar::after { content: ""; position: absolute; inset: 0 0 auto 0; height: 3px; background: linear-gradient(90deg, var(--purple), var(--purple-2)); opacity: .9; }
  .pillar .pic {
    width: 50px; height: 50px; border-radius: 14px; margin-bottom: 20px;
    background: linear-gradient(150deg, var(--purple-soft), #fff);
    border: 1px solid var(--line); color: var(--accent);
    display: grid; place-items: center;
  }
  .pillar .pic .ic { width: 24px; height: 24px; }
  .pillar h3 { font-size: 19px; margin-bottom: 9px; }
  .pillar .num { position: absolute; top: 22px; right: 24px; font-family: 'Outfit'; font-weight: 700; font-size: 14px; color: var(--line-2); }
  .pillar p { font-size: 14.5px; color: var(--ink-2); }

  /* ----- Proof ----- */
  .proof-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .case {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg);
    overflow: hidden; box-shadow: var(--shadow-md); display: flex; flex-direction: column;
  }
  .case-shot { position: relative; aspect-ratio: 16/10; overflow: hidden; background: var(--paper-2); border-bottom: 1px solid var(--line); }
  .case-shot img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
  .case-shot .ph { position: absolute; inset: 0; display: grid; place-items: center; color: var(--ink-3); font-family: 'Outfit'; font-weight: 600; }
  .case-badge {
    position: absolute; top: 14px; left: 14px;
    background: rgba(255,255,255,.94); backdrop-filter: blur(6px);
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 13px;
    font-family: 'Outfit'; font-size: 11.5px; font-weight: 600; color: var(--ink-2);
    box-shadow: var(--shadow-sm);
  }
  .case-body { padding: 24px 26px 26px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .case-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .case-name { font-family: 'Outfit'; font-weight: 600; font-size: 18px; }
  .case-ind { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }
  .case-metric { text-align: right; flex: 0 0 auto; }
  .case-metric .v {
    font-family: 'Outfit'; font-weight: 700; font-size: 30px; line-height: 1; letter-spacing: -.03em;
    background: linear-gradient(120deg, var(--purple), var(--purple-2));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .case-metric .l { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }
  .case-result { font-size: 14.5px; color: var(--ink-2); }
  .case-result b { color: var(--ink); font-weight: 600; }
  .case-subs { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; }
  .case-subs span {
    font-size: 12px; color: var(--ink-2); background: var(--paper-2);
    border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; font-weight: 500;
  }
  .case-press { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; padding-top: 4px; border-top: 1px solid var(--line); margin-top: 4px; }
  .case-press .pl { font-family: Georgia, serif; font-weight: 700; font-size: 13px; color: var(--ink-3); }

  /* ----- What you get ----- */
  .deliver-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .deliver {
    display: flex; align-items: center; gap: 15px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 20px 22px; box-shadow: var(--shadow-sm);
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }
  .deliver:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--line-2); }
  .deliver .dic {
    width: 46px; height: 46px; flex: 0 0 auto; border-radius: 13px;
    background: var(--purple-soft); color: var(--accent);
    display: grid; place-items: center; border: 1px solid var(--line);
  }
  .deliver .dic .ic { width: 22px; height: 22px; }
  .deliver .dl { font-family: 'Outfit'; font-weight: 600; font-size: 15px; color: var(--ink); }

  /* ----- Pricing ----- */
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 760px; margin: 0 auto; }
  .price-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 34px 30px 32px; box-shadow: var(--shadow-md); position: relative; display: flex; flex-direction: column;
  }
  .price-card.featured { border-color: transparent; box-shadow: var(--shadow-lg); background: linear-gradient(180deg, #fff, var(--purple-soft)); }
  .price-card.featured::before {
    content: ""; position: absolute; inset: -1px; border-radius: var(--r-lg);
    padding: 1.5px; background: linear-gradient(150deg, var(--purple), var(--purple-2));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }
  .price-tag {
    position: absolute; top: -13px; right: 24px;
    background: linear-gradient(120deg, var(--purple), var(--purple-2)); color: #fff;
    font-family: 'Outfit'; font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    padding: 5px 13px; border-radius: 999px; box-shadow: 0 8px 22px rgba(124,58,237,.32);
  }
  .price-name { font-family: 'Outfit'; font-weight: 600; font-size: 14px; color: var(--ink-3); letter-spacing: .04em; text-transform: uppercase; }
  .price-amt { font-family: 'Outfit'; font-weight: 700; font-size: 46px; letter-spacing: -.03em; margin: 10px 0 2px; }
  .price-amt .per { font-size: 15px; font-weight: 500; color: var(--ink-3); letter-spacing: 0; }
  .price-rule { height: 1px; background: var(--line); margin: 22px 0; }
  .price-bullets { display: flex; flex-direction: column; gap: 13px; flex: 1; }
  .price-bullets li { list-style: none; display: flex; align-items: flex-start; gap: 11px; font-size: 14.5px; color: var(--ink); }
  .price-bullets .chk { width: 20px; height: 20px; flex: 0 0 auto; border-radius: 50%; background: var(--secondary-soft); color: var(--secondary); display: grid; place-items: center; margin-top: 1px; }
  .price-bullets .chk .ic { width: 12px; height: 12px; }

  /* ----- Guarantee + CTA ----- */
  .close { padding: 84px 0 96px; }
  .close-card {
    background: var(--ink); color: #fff; border-radius: var(--r-lg); overflow: hidden;
    position: relative; box-shadow: 0 40px 90px rgba(22,21,26,.28);
  }
  .close-card::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(700px 420px at 85% -20%, rgba(192,105,221,.4), transparent 60%),
      radial-gradient(600px 380px at -10% 120%, rgba(124,58,237,.36), transparent 60%);
    pointer-events: none;
  }
  .close-inner { position: relative; padding: 56px 52px; display: grid; grid-template-columns: 1.1fr .9fr; gap: 44px; align-items: center; }
  .guarantee-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.16);
    border-radius: 999px; padding: 8px 16px; font-family: 'Outfit'; font-size: 12.5px; font-weight: 600;
    color: #fff; margin-bottom: 22px;
  }
  .guarantee-badge .ic { width: 16px; height: 16px; color: var(--purple-2); }
  .close h2 { color: #fff; font-size: clamp(28px, 4.2vw, 40px); letter-spacing: -.03em; margin-bottom: 16px; }
  .close .guarantee-line { color: rgba(255,255,255,.82); font-size: 16.5px; max-width: 38ch; margin-bottom: 8px; }
  .close .roi-line { color: var(--purple-2); font-size: 14.5px; font-family: 'Outfit'; font-weight: 500; }
  .close-cta { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .btn {
    display: inline-flex; align-items: center; gap: 11px; text-decoration: none;
    font-family: 'Outfit'; font-weight: 600; font-size: 16px;
    background: #fff; color: var(--ink); border-radius: 14px; padding: 16px 26px;
    box-shadow: 0 16px 40px rgba(0,0,0,.28); transition: transform .2s ease, box-shadow .2s ease;
    width: 100%; justify-content: center;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 22px 52px rgba(0,0,0,.34); }
  .btn .ic { width: 19px; height: 19px; color: var(--purple); }
  .sign { display: flex; align-items: center; gap: 14px; padding-top: 4px; }
  .sign .av {
    width: 46px; height: 46px; border-radius: 50%; flex: 0 0 auto;
    background: linear-gradient(150deg, var(--purple), var(--purple-2)); color: #fff;
    display: grid; place-items: center; font-family: 'Outfit'; font-weight: 700; font-size: 17px;
    box-shadow: 0 8px 22px rgba(124,58,237,.4);
  }
  .sign .who { line-height: 1.35; }
  .sign .who .nm { font-family: 'Outfit'; font-weight: 600; font-size: 15px; color: #fff; }
  .sign .who .rl { font-size: 12.5px; color: rgba(255,255,255,.6); }

  footer { padding: 30px 0 48px; text-align: center; color: var(--ink-3); font-size: 12.5px; }
  footer .fbrand { font-family: 'Outfit'; font-weight: 600; color: var(--ink-2); }
  footer a { color: var(--ink-3); text-decoration: none; }

  /* ================= RESPONSIVE ================= */
  @media (max-width: 940px) {
    .cover-grid { grid-template-columns: 1fr; gap: 36px; }
    .cover-visual { max-width: 420px; }
    .study-grid { grid-template-columns: 1fr; gap: 30px; }
    .proof-grid { grid-template-columns: 1fr; }
    .pillars { grid-template-columns: 1fr; }
    .deliver-grid { grid-template-columns: repeat(2, 1fr); }
    .close-inner { grid-template-columns: 1fr; gap: 30px; padding: 44px 34px; }
  }
  @media (max-width: 640px) {
    .wrap { padding: 0 20px; }
    .cover { padding: 36px 0 40px; }
    .cover-top { flex-direction: row; padding-bottom: 30px; }
    .cover-prepared { font-size: 11px; }
    .sec { padding: 56px 0; }

function initials(name) {
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'A';
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();

/* Global site-screenshot fallback. Swaps a failed ./site.png <img> for a
   tasteful browser-frame placeholder. Built with DOM nodes (no innerHTML of
   user data) so it can never break the page or show a broken-image icon. */
window.__sitePlaceholder = function (img) {
  if (!img || !img.parentNode) return;
  const url = img.getAttribute('data-url') || 'your website';
  const ph = document.createElement('div');
  ph.className = 'shot-ph';
  ph.innerHTML = icon('search');
  const u = document.createElement('div'); u.className = 'u'; u.textContent = url;
  const t = document.createElement('div'); t.className = 't';
  t.textContent = 'Live capture of your site sits here in the sent version.';
  ph.appendChild(u); ph.appendChild(t);
  img.replaceWith(ph);
};

   Light-appropriate soft mesh + concentric line motif in accent hue.

function generativeHero(hue) {
  const a = hue || '#7C3AED';
  return (
    '<svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">' +
    '<defs>' +
      '<linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">' +
        '<stop offset="0" stop-color="#FFFFFF"/>' +
        '<stop offset="1" stop-color="#F3F1EA"/>' +

      '<radialGradient id="hb" cx="72%" cy="26%" r="70%">' +
        '<stop offset="0" stop-color="' + a + '" stop-opacity="0.22"/>' +
        '<stop offset="0.5" stop-color="' + a + '" stop-opacity="0.06"/>' +
        '<stop offset="1" stop-color="' + a + '" stop-opacity="0"/>' +

        '<stop offset="0" stop-color="#7C3AED" stop-opacity="0.14"/>' +
        '<stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>' +
      '</radialGradient>' +
    '</defs>' +
    '<rect width="400" height="400" fill="url(#hg)"/>' +
    '<rect width="400" height="400" fill="url(#hb)"/>' +
    '<rect width="400" height="400" fill="url(#hb2)"/>' +
    // concentric contour rings (botanical/topographic feel)
    '<g fill="none" stroke="' + a + '" stroke-opacity="0.5" stroke-width="1">' +
      ringPath(248, 150, 36) + ringPath(248, 150, 62) + ringPath(248, 150, 90) +
      ringPath(248, 150, 120, 0.32) + ringPath(248, 150, 152, 0.2) +
    '</g>' +
    // fine flowing lines
    '<g fill="none" stroke="' + a + '" stroke-opacity="0.28" stroke-width="1">' +
      '<path d="M-10 300 C 90 250, 150 330, 250 280 S 420 250, 420 300"/>' +
      '<path d="M-10 330 C 90 285, 150 360, 250 312 S 420 285, 420 332"/>' +
    '</g>' +
    // soft accent nodes
    '<circle cx="248" cy="150" r="7" fill="' + a + '" fill-opacity="0.9"/>' +
    '<circle cx="110" cy="100" r="4" fill="#7C3AED" fill-opacity="0.55"/>' +

    '<circle cx="320" cy="250" r="3.5" fill="#C069DD" fill-opacity="0.6"/>' +
    '</svg>'
  );
}
function ringPath(cx, cy, r, op) {

  return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '"' + o + '/>';

    (has(s.headline) ? '<div class="strategy-head reveal"><h2>' + esc(s.headline) + '</h2></div>' : '') +
    '<div class="strategy-sub reveal">No charge. No catch. This is the plan we would run.</div>' +
    (pillars.length ? '<div class="pillars">' +
      pillars.map((pl, i) =>
        '<div class="pillar reveal" style="transition-delay:' + (i * 80) + 'ms">' +
          '<div class="num">0' + (i + 1) + '</div>' +
          '<div class="pic">' + icon(pl.icon) + '</div>' +
          (has(pl.title) ? '<h3>' + esc(pl.title) + '</h3>' : '') +
          (has(pl.line) ? '<p>' + esc(pl.line) + '</p>' : '') +
        '</div>'
      ).join('') +
    '</div>' : '') +
  '</div></section>'
  );
}

function renderProof(stat) {
  const cs = stat.case_studies || {};
  const order = ['frenchify', 'drsw'];
  const cards = order.map(k => cs[k]).filter(Boolean);
  if (!cards.length) return '';

  function caseCard(c) {
    const subs = arr(c.sub_metrics).slice(0, 3);
    const press = arr(c.media).slice(0, 6);
    const phName = esc(c.name || 'Client');
    const img = has(c.image)
      ? '<img src="' + esc(c.image) + '" alt="' + esc(c.name) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'grid\';">' +
        '<div class="ph" style="display:none;">' + phName + '</div>'
      : '<div class="ph">' + phName + '</div>';
    const resultLine = (has(c.before) && has(c.after))
      ? '<div class="case-result"><b>From:</b> ' + esc(c.before) + '<br><b>To:</b> ' + esc(c.after) + '</div>'
      : '';
    return (
    '<div class="case reveal">' +
      '<div class="case-shot">' +
        (has(c.industry) ? '<div class="case-badge">' + esc(c.industry) + '</div>' : '') +
        img +
      '</div>' +
      '<div class="case-body">' +
        '<div class="case-top">' +
          '<div>' +
            '<div class="case-name">' + esc(c.name) + '</div>' +
          '</div>' +
          (has(c.hero_metric) ? '<div class="case-metric">' +
            '<div class="v">' + esc(c.hero_metric) + '</div>' +
            (has(c.hero_metric_label) ? '<div class="l">' + esc(c.hero_metric_label) + '</div>' : '') +
          '</div>' : '') +
        '</div>' +
        resultLine +
        (subs.length ? '<div class="case-subs">' + subs.map(m => '<span>' + esc(m) + '</span>').join('') + '</div>' : '') +
        (press.length ? '<div class="case-press">' + press.map(m => '<span class="pl">' + esc(m) + '</span>').join('') + '</div>' : '') +
      '</div>' +
    '</div>'
    );
  }

  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-head reveal" style="text-align:center;margin-left:auto;margin-right:auto;">' +
      '<div class="eyebrow" style="justify-content:center;"><span class="dot"></span>Proof, not promises</div>' +
      '<h2>Real clients. Real numbers.</h2>' +
      '<p style="margin-left:auto;margin-right:auto;">Two businesses we grew from the ground up. The screenshots are theirs.</p>' +
    '</div>' +
    '<div class="proof-grid">' + cards.map(caseCard).join('') + '</div>' +
  '</div></section>'
  );
}

function renderDeliverables(p) {
  const items = arr(p.deliverables).slice(0, 6);
  if (!items.length) return '';
  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-head reveal">' +
      '<div class="eyebrow"><span class="dot"></span>What you get</div>' +
      '<h2>Everything, handled.</h2>' +
    '</div>' +
    '<div class="deliver-grid">' +
      items.map((d, i) =>
        '<div class="deliver reveal" style="transition-delay:' + (i * 50) + 'ms">' +
          '<div class="dic">' + icon(d.icon) + '</div>' +
          '<div class="dl">' + esc(d.label) + '</div>' +
        '</div>'
      ).join('') +
    '</div>' +
  '</div></section>'
  );
}

function renderPricing(p) {
  const pr = p.pricing || {};
  const g = pr.growth || {}, sc = pr.scale || {};
  const gBullets = arr(g.bullets), sBullets = arr(sc.bullets);
  if (!gBullets.length && !sBullets.length) return '';

  function card(tier, featured) {
    const name = has(tier.name) ? tier.name : (featured ? 'Scale' : 'Growth');
    const price = has(tier.price) ? tier.price : '';
    const bullets = arr(tier.bullets);
    return (
    '<div class="price-card ' + (featured ? 'featured' : '') + ' reveal">' +
      (featured ? '<div class="price-tag">Recommended</div>' : '') +
      '<div class="price-name">' + esc(name) + '</div>' +
      (has(price) ? '<div class="price-amt">' + esc(price) + '<span class="per"> /mo</span></div>' : '') +
      '<div class="price-rule"></div>' +
      '<ul class="price-bullets">' +
        bullets.map(b =>
          '<li><span class="chk">' + icon('check') + '</span>' + esc(b) + '</li>'
        ).join('') +
      '</ul>' +
    '</div>'
    );
  }

  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-head reveal" style="text-align:center;margin-left:auto;margin-right:auto;">' +
      '<div class="eyebrow" style="justify-content:center;"><span class="dot"></span>Simple pricing</div>' +
      '<h2>Two ways to start.</h2>' +
    '</div>' +
    '<div class="price-grid">' +
      card(g, false) +
      card(sc, true) +
    '</div>' +
  '</div></section>'
  );
}

function renderClose(p, meta) {
  const cta = (meta && has(meta.cta_url)) ? meta.cta_url : 'https://cal.com/grawoth/consultation-call-with-allen';
  const guarantee = has(p.guarantee) ? p.guarantee : 'If we do not move the numbers, you do not pay.';
  const preparedBy = (meta && has(meta.prepared_by)) ? meta.prepared_by : 'Allen Anant Thomas';

  return (
  '<section class="close"><div class="wrap">' +
    '<div class="close-card reveal">' +
      '<div class="close-inner">' +
        '<div>' +
          '<span class="guarantee-badge">' + icon('shield') + 'Our guarantee</span>' +
          '<h2>Let us build this with you.</h2>' +
          '<p class="guarantee-line">' + esc(guarantee) + '</p>' +
          (has(p.roi_line) ? '<p class="roi-line">' + esc(p.roi_line) + '</p>' : '') +
        '</div>' +
        '<div class="close-cta">' +
          '<a class="btn" href="' + esc(cta) + '" target="_blank" rel="noopener">' + icon('calendar') + 'Book a 20-min call</a>' +
          '<div class="sign">' +
            '<div class="av">' + esc(initials(preparedBy)) + '</div>' +
            '<div class="who">' +
              '<div class="nm">' + esc(preparedBy) + '</div>' +
              '<div class="rl">Founder, The Growth Engine</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}

function renderFooter(stat) {
  const c = (stat && stat.contact) || {};
  const bits = [];
  if (has(c.website)) bits.push(esc(c.website));
  if (has(c.email)) bits.push(esc(c.email));
  if (has(c.phone)) bits.push(esc(c.phone));
  return (
  '<footer><div class="wrap">' +
    '<div class="fbrand">The Growth Engine</div>' +
    (bits.length ? '<div style="margin-top:6px;">' + bits.join(' · ') + '</div>' : '') +
  '</div></footer>'
  );
}

/* ============================================================
   BOOT
   ============================================================ */
function boot() {
  const cfg = (typeof CONFIG !== 'undefined' && CONFIG) ? CONFIG : {};
  const p = cfg.prospect || {};
  const stat = cfg.static || {};
  const meta = cfg.meta || {};

  // set accent hue from prospect
  const hue = (p.visual && has(p.visual.accent_hue)) ? p.visual.accent_hue : '#7C3AED';
  document.documentElement.style.setProperty('--accent', hue);

  const html = [
    renderCover(p, meta),
    renderTrust(p, stat),
    renderStudy(p),
    renderStrategy(p),
    renderProof(stat),
    renderDeliverables(p),
    renderPricing(p),
    renderClose(p, meta),
    renderFooter(stat)
  ].join('');

  document.getElementById('app').innerHTML = html;

  const els = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
  // forceShow makes content visible no matter what, via direct inline style
  // so it never depends on a class+transition resolving (bulletproof floor).
  const forceShow = () => els.forEach(el => {
    el.classList.add('in');
    el.style.opacity = '1';
    el.style.transform = 'none';
  });

  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce || !('IntersectionObserver' in window)) {
    forceShow();
    return;
  }

  // only NOW arm the hidden-then-animate behavior (CSS gated on body.js-on)
  document.body.classList.add('js-on');

  const io = new IntersectionObserver((entries, obs) => {
    entries.forEach(en => {
      if (en.isIntersecting) { en.target.classList.add('in'); obs.unobserve(en.target); }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  els.forEach(el => io.observe(el));

  // hard safety: if the observer never fires for off-screen items (print,
  // headless capture, no-scroll views), force EVERYTHING visible after 1.4s.
  setTimeout(forceShow, 1400);
  // and on print, reveal immediately so PDF/Cmd-P never drops a section
  if (window.matchMedia) {
    const mq = window.matchMedia('print');
    (mq.addEventListener ? mq.addEventListener('change', forceShow) : mq.addListener && mq.addListener(forceShow));
  }
  window.addEventListener('beforeprint', forceShow);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
