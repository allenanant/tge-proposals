<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Growth Engine · Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0D0D0C;
    --bg-soft: #141413;
    --panel: #1A1A18;
    --panel-2: #201F1D;
    --line: rgba(255,255,255,0.08);
    --line-2: rgba(255,255,255,0.14);
    --ink: #F4F1EC;
    --ink-soft: #B8B4AC;
    --ink-dim: #7E7A72;
    --purple: #C069DD;
    --purple-soft: rgba(192,105,221,0.14);
    --purple-line: rgba(192,105,221,0.35);
    --gold: #E7C66B;
    --gold-soft: rgba(231,198,107,0.12);
    --high: #F0726B;
    --med: #E7C66B;
    --low: #6BE7A8;
    --maxw: 1180px;
    --r: 18px;
    --r-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Hanken Grotesk", system-ui, sans-serif;
    line-height: 1.55;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    font-size: 17px;
  }
  h1,h2,h3,h4 { font-family: "Outfit", system-ui, sans-serif; line-height: 1.04; letter-spacing: -0.02em; font-weight: 800; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  ::selection { background: var(--purple); color: #0D0D0C; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 clamp(20px, 5vw, 56px); }
  section { padding: clamp(64px, 10vw, 140px) 0; position: relative; border-top: 1px solid var(--line); }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: "Outfit", sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); }
  .eyebrow .num { color: var(--purple); font-variant-numeric: tabular-nums; }
  .eyebrow .bar { width: 28px; height: 1px; background: var(--line-2); }
  .lede { color: var(--ink-soft); font-size: clamp(17px, 2vw, 20px); max-width: 60ch; }
  .muted { color: var(--ink-dim); }

  /* progress bar */
  .progress { position: fixed; top: 0; left: 0; height: 3px; width: 0; background: linear-gradient(90deg, var(--purple), var(--gold)); z-index: 90; transition: width .1s linear; }

  /* top nav */
  .nav { position: sticky; top: 0; z-index: 80; backdrop-filter: blur(14px); background: rgba(13,13,12,0.72); border-bottom: 1px solid var(--line); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px clamp(20px,5vw,56px); max-width: var(--maxw); margin: 0 auto; }
  .brandmark { display: flex; align-items: center; gap: 10px; font-family: "Outfit",sans-serif; font-weight: 800; font-size: 16px; letter-spacing: -0.01em; }
  .brandmark .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--purple); box-shadow: 0 0 14px var(--purple); }
  .nav .cta { font-family:"Outfit",sans-serif; font-weight:600; font-size:13.5px; padding: 9px 16px; border-radius: 99px; background: var(--purple); color:#11020e; white-space: nowrap; transition: transform .15s ease, box-shadow .15s ease; }
  .nav .cta:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(192,105,221,.35); }

  /* reveal */
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity:1 !important; transform:none !important; transition:none; } html{scroll-behavior:auto;} }

  /* ---------- COVER ---------- */
  .cover { padding-top: clamp(56px, 9vw, 110px); border-top: none; overflow: hidden; }
  .cover::before { content:""; position:absolute; inset:0; background:
      radial-gradient(60% 50% at 78% 8%, rgba(192,105,221,0.20), transparent 60%),
      radial-gradient(50% 45% at 8% 95%, rgba(231,198,107,0.08), transparent 60%);
      pointer-events:none; }
  .cover-grid { display:grid; grid-template-columns: 1.55fr 1fr; gap: clamp(28px,5vw,64px); align-items:end; position:relative; }
  .cover h1 { font-size: clamp(44px, 8.5vw, 104px); font-weight: 900; letter-spacing: -0.035em; }
  .cover h1 .accent { color: var(--purple); }
  .cover .sub { margin-top: 26px; font-size: clamp(18px,2.4vw,24px); color: var(--ink-soft); max-width: 30ch; font-weight: 500; }
  .cover-tag { margin-bottom: 30px; }
  .cover-meta { display:flex; flex-direction:column; gap:18px; padding-bottom: 6px; }
  .cover-meta .row { display:flex; flex-direction:column; gap:3px; padding: 14px 0; border-top: 1px solid var(--line); }
  .cover-meta .row:first-child { border-top: none; }
  .cover-meta .k { font-family:"Outfit",sans-serif; font-size: 12px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-dim); }
  .cover-meta .v { font-family:"Outfit",sans-serif; font-weight:600; font-size: 17px; color: var(--ink); }
  .jobctx { margin-top: clamp(36px,6vw,60px); border:1px solid var(--purple-line); background: var(--purple-soft); border-radius: var(--r); padding: clamp(20px,3vw,30px); position:relative; }
  .jobctx .label { font-family:"Outfit",sans-serif; font-weight:700; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color: var(--purple); margin-bottom: 8px; }
  .jobctx p { color: var(--ink); font-size: clamp(16px,2vw,19px); max-width: 72ch; }

  /* ---------- THE READ (audit) ---------- */
  .read-grid { display:grid; grid-template-columns: 300px 1fr; gap: clamp(28px,4vw,56px); margin-top: 44px; align-items:start; }
  .score-card { border:1px solid var(--line); background: linear-gradient(160deg, var(--panel), var(--bg-soft)); border-radius: var(--r); padding: 30px; text-align:center; position: sticky; top: 84px; }
  .gauge { position: relative; width: 180px; height: 180px; margin: 6px auto 16px; }
  .gauge svg { transform: rotate(-90deg); }
  .gauge .num { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .gauge .num b { font-family:"Outfit",sans-serif; font-size: 52px; font-weight:800; letter-spacing:-.03em; line-height:1; }
  .gauge .num span { font-size:12px; color:var(--ink-dim); letter-spacing:.12em; text-transform:uppercase; margin-top:4px; font-family:"Outfit",sans-serif; }
  .score-card .verdict { color: var(--ink-soft); font-size:14.5px; }
  .findings { display:flex; flex-direction:column; gap:14px; }
  .finding { display:grid; grid-template-columns: auto 1fr; gap: 16px; padding: 20px; border:1px solid var(--line); border-radius: var(--r-sm); background: var(--panel); transition: border-color .2s ease, transform .2s ease; }
  .finding:hover { border-color: var(--line-2); transform: translateX(3px); }
  .sev { width: 10px; height: 10px; border-radius: 50%; margin-top: 8px; }
  .sev.high { background: var(--high); box-shadow:0 0 10px var(--high); }
  .sev.medium { background: var(--med); box-shadow:0 0 10px var(--med); }
  .sev.low { background: var(--low); box-shadow:0 0 10px var(--low); }
  .finding h4 { font-size: 18px; margin-bottom: 5px; }
  .finding p { color: var(--ink-soft); font-size: 15px; }
  .sev-tag { font-family:"Outfit",sans-serif; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-dim); }

  /* ---------- DIAGNOSIS ---------- */
  .prob-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 48px; }
  .prob { border:1px solid var(--line); border-radius: var(--r); padding: 30px; background: var(--panel); position:relative; overflow:hidden; }
  .prob::after { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--high); opacity:.7; }
  .prob .stat { font-family:"Outfit",sans-serif; font-weight:800; font-size: clamp(30px,4vw,42px); color: var(--purple); letter-spacing:-.03em; line-height:1; }
  .prob h4 { font-size: 19px; margin: 14px 0 8px; }
  .prob p { color: var(--ink-soft); font-size: 15px; }

  /* ---------- COMPETITIVE ---------- */
  .comp-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 48px; }
  .comp-side h3, .gap-side h3 { font-family:"Outfit",sans-serif; font-size: 14px; letter-spacing:.12em; text-transform:uppercase; color: var(--ink-dim); margin-bottom: 18px; }
  .comp-card { border:1px solid var(--line); border-radius: var(--r-sm); padding: 22px; background: var(--panel); margin-bottom: 14px; }
  .comp-card .name { font-family:"Outfit",sans-serif; font-weight:700; font-size: 19px; display:flex; align-items:center; gap:10px; margin-bottom:7px; }
  .comp-card .name .ic { color: var(--ink-dim); }
  .comp-card p { color: var(--ink-soft); font-size: 15px; }
  .gap-card { border:1px solid var(--purple-line); background: var(--purple-soft); border-radius: var(--r-sm); padding: 18px 20px; margin-bottom: 14px; display:flex; gap:14px; align-items:flex-start; }
  .gap-card .check { color: var(--purple); flex:none; margin-top:1px; }
  .gap-card p { font-size: 15.5px; color: var(--ink); }

  /* ---------- STRATEGY (centerpiece) ---------- */
  .strategy { background:
      radial-gradient(70% 50% at 85% 0%, rgba(192,105,221,0.13), transparent 55%),
      radial-gradient(50% 40% at 0% 100%, rgba(231,198,107,0.06), transparent 55%),
      var(--bg-soft);
      border-top: 1px solid var(--purple-line); }
  .strategy .banner { display:inline-flex; align-items:center; gap:10px; padding:8px 16px; border-radius:99px; border:1px solid var(--purple-line); background: var(--purple-soft); font-family:"Outfit",sans-serif; font-weight:600; font-size:12.5px; letter-spacing:.1em; text-transform:uppercase; color: var(--purple); margin-bottom: 26px; }
  .strategy .pulse { width:7px;height:7px;border-radius:50%;background:var(--purple);box-shadow:0 0 0 0 var(--purple);animation:pulse 2.2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(192,105,221,.5);} 70%{box-shadow:0 0 0 10px rgba(192,105,221,0);} 100%{box-shadow:0 0 0 0 rgba(192,105,221,0);} }
  @media (prefers-reduced-motion: reduce){ .pulse{animation:none;} }
  .strategy h2 { font-size: clamp(34px, 6vw, 68px); font-weight: 900; letter-spacing:-.035em; max-width: 18ch; }
  .strategy h2 em { font-style: normal; color: var(--purple); }
  .strat-summary { margin-top: 26px; font-size: clamp(17px,2.2vw,22px); color: var(--ink-soft); max-width: 64ch; }
  .strat-block-label { font-family:"Outfit",sans-serif; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-dim); margin: clamp(48px,7vw,84px) 0 22px; display:flex; align-items:center; gap:12px; }
  .strat-block-label::after { content:""; flex:1; height:1px; background: var(--line); }

  .pillars { display:grid; grid-template-columns: repeat(2,1fr); gap: 18px; }
  .pillar { border:1px solid var(--line-2); border-radius: var(--r); padding: clamp(22px,3vw,30px); background: linear-gradient(165deg, var(--panel-2), var(--panel)); position:relative; transition: transform .25s ease, border-color .25s ease; }
  .pillar:hover { transform: translateY(-4px); border-color: var(--purple-line); }
  .pillar .pidx { font-family:"Outfit",sans-serif; font-weight:800; font-size: 13px; color: var(--purple); letter-spacing:.1em; }
  .pillar h3 { font-size: clamp(21px,2.6vw,27px); margin: 10px 0 6px; }
  .pillar .obj { color: var(--ink-soft); font-size: 15.5px; margin-bottom: 18px; }
  .pillar .moves { list-style:none; display:flex; flex-direction:column; gap:11px; margin-bottom: 20px; }
  .pillar .moves li { display:flex; gap:11px; font-size: 15px; color: var(--ink); }
  .pillar .moves .arw { color: var(--purple); flex:none; margin-top:2px; }
  .pillar .kpi { display:inline-flex; align-items:center; gap:9px; padding:9px 14px; border-radius:99px; background: var(--bg); border:1px solid var(--line); font-size:13.5px; }
  .pillar .kpi b { font-family:"Outfit",sans-serif; color: var(--gold); font-weight:700; }
  .pillar .kpi .klabel { color: var(--ink-dim); font-family:"Outfit",sans-serif; font-size:11px; letter-spacing:.1em; text-transform:uppercase; }

  .channels-plan { display:grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
  .cplan { display:grid; grid-template-columns: 150px 1fr; gap: 18px; border:1px solid var(--line); border-radius: var(--r-sm); padding: 20px 22px; background: var(--panel); align-items:start; }
  .cplan .ch { font-family:"Outfit",sans-serif; font-weight:700; font-size: 17px; }
  .cplan .role { font-size: 13px; color: var(--purple); margin-top:3px; }
  .cplan .first { font-size: 14.5px; color: var(--ink-soft); }
  .cplan .first b { color: var(--ink); font-weight:600; display:block; font-family:"Outfit",sans-serif; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color: var(--ink-dim); margin-bottom:4px; }

  .qwins { display:flex; flex-wrap:wrap; gap: 12px; }
  .qwin { display:flex; align-items:center; gap:12px; border:1px solid var(--gold-soft); border-color: rgba(231,198,107,.3); background: var(--gold-soft); border-radius:99px; padding: 12px 20px 12px 16px; font-size: 15px; }
  .qwin .bolt { color: var(--gold); flex:none; }

  /* ---------- ROADMAP ---------- */
  .road-grid { display:grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 48px; }
  .road-col { border:1px solid var(--line); border-radius: var(--r); background: var(--panel); padding: 24px 22px; position:relative; }
  .road-col .wk { font-family:"Outfit",sans-serif; font-weight:800; font-size: 16px; margin-bottom:4px; }
  .road-col .wk .n { color: var(--purple); }
  .road-col .phase { font-size: 12px; color: var(--ink-dim); letter-spacing:.1em; text-transform:uppercase; font-family:"Outfit",sans-serif; margin-bottom:18px; }
  .road-col ul { list-style:none; display:flex; flex-direction:column; gap:11px; }
  .road-col li { display:flex; gap:10px; font-size: 14px; color: var(--ink-soft); }
  .road-col li .tick { color: var(--purple); flex:none; margin-top:3px; opacity:.8; }
  .road-rail { position:absolute; top: 24px; right: -8px; width: 16px; height: 16px; }

  /* ---------- DELIVERABLES ---------- */
  .deliv-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: 18px; margin-top: 48px; }
  .deliv { border:1px solid var(--line); border-radius: var(--r); padding: 28px; background: var(--panel); transition: border-color .2s ease, transform .2s ease; }
  .deliv:hover { border-color: var(--purple-line); transform: translateY(-3px); }
  .deliv .ic { width:42px; height:42px; border-radius: 11px; display:flex; align-items:center; justify-content:center; background: var(--purple-soft); color: var(--purple); margin-bottom:18px; }
  .deliv h4 { font-size: 19px; margin-bottom: 7px; }
  .deliv p { color: var(--ink-soft); font-size: 14.5px; }

  /* ---------- PROOF ---------- */
  .proof { background: var(--bg-soft); }
  .case-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 48px; }
  .case { border:1px solid var(--line-2); border-radius: var(--r); overflow:hidden; background: var(--panel); display:flex; flex-direction:column; }
  .case .top { display:grid; grid-template-columns: 1fr auto; gap:16px; padding: 26px 26px 20px; align-items:start; }
  .case .cname { font-family:"Outfit",sans-serif; font-weight:800; font-size: 22px; }
  .case .cind { font-size: 13px; color: var(--ink-dim); margin-top:3px; }
  .case .hero-m { text-align:right; }
  .case .hero-m b { font-family:"Outfit",sans-serif; font-weight:900; font-size: 40px; color: var(--purple); letter-spacing:-.03em; line-height:1; display:block; }
  .case .hero-m span { font-size: 11px; color: var(--ink-dim); letter-spacing:.1em; text-transform:uppercase; }
  .case .submetrics { display:flex; flex-wrap:wrap; gap:8px; padding: 0 26px 18px; }
  .case .submetrics span { font-size: 12.5px; color: var(--ink-soft); border:1px solid var(--line); border-radius:99px; padding:5px 12px; }
  .case .cimg { width:100%; aspect-ratio: 16/10; object-fit: cover; border-top:1px solid var(--line); border-bottom:1px solid var(--line); background: var(--bg); }
  .case .story { padding: 22px 26px; display:flex; flex-direction:column; gap:11px; }
  .case .story p { font-size: 14.5px; color: var(--ink-soft); }
  .case .ba { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 26px 24px; margin-top:auto; }
  .case .ba .box { border:1px solid var(--line); border-radius: var(--r-sm); padding: 14px; }
  .case .ba .box .t { font-size: 10.5px; letter-spacing:.12em; text-transform:uppercase; font-family:"Outfit",sans-serif; margin-bottom:6px; }
  .case .ba .before .t { color: var(--high); }
  .case .ba .after .t { color: var(--low); }
  .case .ba .box p { font-size: 13.5px; color: var(--ink); }
  .case .media { padding: 0 26px 24px; }
  .case .media .ml { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color: var(--ink-dim); font-family:"Outfit",sans-serif; margin-bottom:10px; }
  .case .media .logos { display:flex; flex-wrap:wrap; gap:8px; }
  .case .media .logos span { font-family:"Outfit",sans-serif; font-weight:600; font-size:12.5px; color: var(--ink-soft); border:1px solid var(--line); border-radius:7px; padding:6px 11px; }

  .metrics-strip { display:grid; grid-template-columns: repeat(5,1fr); gap: 1px; background: var(--line); border:1px solid var(--line); border-radius: var(--r); overflow:hidden; margin-top: 22px; }
  .metric { background: var(--panel); padding: 24px 18px; text-align:center; }
  .metric b { font-family:"Outfit",sans-serif; font-weight:800; font-size: clamp(22px,3vw,30px); color: var(--ink); letter-spacing:-.02em; display:block; }
  .metric span { font-size: 12px; color: var(--ink-dim); margin-top:5px; display:block; }

  .dash-row { display:grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-top: 22px; }
  .dash-row img { border:1px solid var(--line); border-radius: var(--r-sm); aspect-ratio: 16/10; object-fit: cover; background: var(--panel); }

  /* ---------- ROI ---------- */
  .roi-wrap { display:grid; grid-template-columns: 1.1fr 1fr; gap: clamp(24px,4vw,48px); margin-top: 48px; align-items:center; }
  .roi-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .roi-cell { border:1px solid var(--line); border-radius: var(--r); padding: 24px; background: var(--panel); }
  .roi-cell .k { font-size: 12px; letter-spacing:.1em; text-transform:uppercase; color: var(--ink-dim); font-family:"Outfit",sans-serif; margin-bottom:10px; }
  .roi-cell .val { font-family:"Outfit",sans-serif; font-weight:800; font-size: clamp(24px,3.4vw,34px); letter-spacing:-.02em; }
  .roi-hero { border:1px solid var(--purple-line); background: linear-gradient(160deg, var(--purple-soft), transparent); border-radius: var(--r); padding: clamp(28px,4vw,44px); text-align:center; }
  .roi-hero .big { font-family:"Outfit",sans-serif; font-weight:900; font-size: clamp(56px,10vw,104px); color: var(--purple); letter-spacing:-.04em; line-height:1; }
  .roi-hero .rl { font-size: 14px; color: var(--ink-soft); margin-top: 12px; }
  .roi-disc { font-size: 12.5px; color: var(--ink-dim); margin-top: 18px; max-width: 70ch; }

  /* ---------- PRICING ---------- */
  .price-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 48px; max-width: 860px; }
  .plan { border:1px solid var(--line-2); border-radius: var(--r); padding: clamp(28px,3.5vw,38px); background: var(--panel); position:relative; display:flex; flex-direction:column; }
  .plan.feat { border-color: var(--purple-line); background: linear-gradient(168deg, var(--panel-2), var(--panel)); box-shadow: 0 0 0 1px var(--purple-line), 0 24px 60px -30px rgba(192,105,221,.5); }
  .plan .badge { position:absolute; top: -11px; left: clamp(28px,3.5vw,38px); font-family:"Outfit",sans-serif; font-weight:700; font-size:11px; letter-spacing:.12em; text-transform:uppercase; background: var(--purple); color:#11020e; padding:5px 12px; border-radius:99px; }
  .plan .pname { font-family:"Outfit",sans-serif; font-weight:700; font-size: 15px; letter-spacing:.06em; text-transform:uppercase; color: var(--ink-soft); }
  .plan .pprice { font-family:"Outfit",sans-serif; font-weight:900; font-size: clamp(40px,6vw,58px); letter-spacing:-.03em; margin: 10px 0 4px; }
  .plan .pprice .per { font-size: 16px; font-weight:500; color: var(--ink-dim); letter-spacing:0; }
  .plan ul { list-style:none; display:flex; flex-direction:column; gap:13px; margin: 26px 0 30px; }
  .plan li { display:flex; gap:12px; font-size: 15px; color: var(--ink-soft); }
  .plan li .c { color: var(--purple); flex:none; margin-top:2px; }
  .plan .pcta { margin-top:auto; text-align:center; font-family:"Outfit",sans-serif; font-weight:700; font-size: 15px; padding: 15px; border-radius: 12px; border:1px solid var(--line-2); transition: transform .15s ease, background .15s ease; }
  .plan.feat .pcta { background: var(--purple); color:#11020e; border-color: var(--purple); }
  .plan .pcta:hover { transform: translateY(-2px); }

      if (["high", "medium", "low"].indexOf(sev) === -1) sev = "medium";
      return '<div class="finding reveal"><span class="sev ' + sev + '"></span><div>' +
        (has(f.title) ? '<h4>' + esc(f.title) + '</h4>' : '') +
        (has(f.detail) ? '<p>' + esc(f.detail) + '</p>' : '') +
        '<span class="sev-tag">' + esc(sev) + ' priority</span></div></div>';
    }).join("");

    out.push(
      '<section><div class="wrap">' +
      sectionHead(pad(++n), "The Read", "We pulled apart " + siteLabel + " before we wrote a word.", "An honest look at what is working, what is leaking, and where the fastest money is.") +
      '<div class="read-grid">' +
        '<div class="score-card reveal">' + gauge + '<div class="verdict">' + esc(verdict) + '</div></div>' +
        '<div class="findings">' + findings + '</div>' +
      '</div></div></section>'
    );
  })();

  // ---------- DIAGNOSIS ----------
  (function () {
    var probs = arr(P.problems).filter(function (p) { return has(p.title) || has(p.detail); });
    if (!probs.length) return;
    var cards = probs.map(function (p) {
      return '<div class="prob reveal">' +
        (has(p.stat) ? '<div class="stat">' + esc(p.stat) + '</div>' : '') +
        (has(p.title) ? '<h4>' + esc(p.title) + '</h4>' : '') +
        (has(p.detail) ? '<p>' + esc(p.detail) + '</p>' : '') +
        '</div>';
    }).join("");
    out.push(
      '<section><div class="wrap">' +
      sectionHead(pad(++n), "Diagnosis", "The three things quietly capping your growth.", "Industry reality, not guesswork. Each one is fixable, and we have a plan for all three.") +
      '<div class="prob-grid">' + cards + '</div></div></section>'
    );
  })();

  // ---------- COMPETITIVE ----------
  (function () {
    var comps = arr(P.competitors).filter(function (c) { return has(c.name) || has(c.edge); });
    var gaps = nonEmptyStrings(P.competitive_gaps);
    if (!comps.length && !gaps.length) return;

    var compHtml = comps.length ? (
      '<div class="comp-side reveal"><h3>Who you are up against</h3>' +
      comps.map(function (c) {
        return '<div class="comp-card">' +
          (has(c.name) ? '<div class="name"><span class="ic" style="width:18px;height:18px;display:inline-block;">' + ic("flame") + '</span>' + esc(c.name) + '</div>' : '') +
          (has(c.edge) ? '<p>' + esc(c.edge) + '</p>' : '') +
          '</div>';
      }).join("") + '</div>'
    ) : '';

    var gapHtml = gaps.length ? (
      '<div class="gap-side reveal"><h3>The openings we exploit</h3>' +
      gaps.map(function (g) {
        return '<div class="gap-card"><span class="check" style="width:20px;height:20px;display:inline-block;">' + ic("check") + '</span><p>' + esc(g) + '</p></div>';
      }).join("") + '</div>'
    ) : '';

    out.push(
      '<section><div class="wrap">' +
      sectionHead(pad(++n), "Competitive Landscape", "Your competitors are beatable. Here is where.", "") +
      '<div class="comp-grid">' + compHtml + gapHtml + '</div></div></section>'
    );
  })();

  // ---------- STRATEGY (centerpiece) ----------
  (function () {
    var st = P.strategy;
    if (!st) return;
    var pillars = arr(st.pillars).filter(function (p) { return has(p.name); });
    var channels = arr(st.channel_plan).filter(function (c) { return has(c.channel); });
    var wins = nonEmptyStrings(st.quick_wins);

    var head =
      '<div class="reveal"><span class="banner"><span class="pulse"></span>Your free growth strategy</span></div>' +
      '<div class="reveal"><span class="eyebrow"><span class="num">' + pad(++n) + '</span><span class="bar"></span>The Strategy</span></div>' +
      (has(st.headline) ? '<h2 class="reveal" style="margin-top:18px;">' + escEm(st.headline) + '</h2>' : '') +
      (has(st.summary) ? '<p class="strat-summary reveal">' + esc(st.summary) + '</p>' : '');

    var pillarHtml = "";
    if (pillars.length) {
      pillarHtml = '<div class="strat-block-label reveal">Strategic Pillars</div><div class="pillars">' +
        pillars.map(function (p, i) {
          var moves = nonEmptyStrings(p.moves).map(function (m) {
            return '<li><span class="arw" style="width:16px;height:16px;display:inline-block;">' + ic("arrow") + '</span><span>' + esc(m) + '</span></li>';
          }).join("");
          var kpi = has(p.kpi) ? '<div class="kpi"><span class="klabel">Target</span><b>' + esc(p.kpi) + '</b></div>' : '';
          return '<div class="pillar reveal"><div class="pidx">PILLAR ' + pad(i + 1) + '</div>' +
            '<h3>' + esc(p.name) + '</h3>' +
            (has(p.objective) ? '<div class="obj">' + esc(p.objective) + '</div>' : '') +
            (moves ? '<ul class="moves">' + moves + '</ul>' : '') +
            kpi + '</div>';
        }).join("") + '</div>';
    }

    var chanHtml = "";
    if (channels.length) {
      chanHtml = '<div class="strat-block-label reveal">Channel Plan</div><div class="channels-plan">' +
        channels.map(function (c) {
          return '<div class="cplan reveal"><div><div class="ch">' + esc(c.channel) + '</div>' +
            (has(c.role) ? '<div class="role">' + esc(c.role) + '</div>' : '') + '</div>' +
            (has(c.first_30_days) ? '<div class="first"><b>First 30 days</b>' + esc(c.first_30_days) + '</div>' : '<div></div>') +
            '</div>';
        }).join("") + '</div>';
    }

    var winHtml = "";
    if (wins.length) {
      winHtml = '<div class="strat-block-label reveal">Week-One Quick Wins</div><div class="qwins reveal">' +
        wins.map(function (w) {
          return '<div class="qwin"><span class="bolt" style="width:16px;height:16px;display:inline-block;">' + ic("bolt") + '</span>' + esc(w) + '</div>';
        }).join("") + '</div>';
    }

    out.push('<section class="strategy"><div class="wrap">' + head + pillarHtml + chanHtml + winHtml + '</div></section>');
  })();

  // ---------- ROADMAP ----------
  (function () {
    var weeks = arr(P.roadmap).filter(function (w) { return has(w.week) && nonEmptyStrings(w.items).length; });
    if (!weeks.length) return;
    var cols = weeks.map(function (w, i) {
      var parts = String(w.week).split(/\s*[:\u2014\u2013]\s*|\s+-\s+/);
      var wk = parts[0] || w.week;
      var phase = parts.length > 1 ? parts.slice(1).join(" ") : "";
      var items = nonEmptyStrings(w.items).map(function (it) {
        return '<li><span class="tick" style="width:14px;height:14px;display:inline-block;">' + ic("tick") + '</span><span>' + esc(it) + '</span></li>';
      }).join("");
      return '<div class="road-col reveal"><div class="wk"><span class="n">' + esc(wk.replace(/week/i, "Week")) + '</span></div>' +
        (phase ? '<div class="phase">' + esc(phase) + '</div>' : '<div class="phase">&nbsp;</div>') +
        '<ul>' + items + '</ul></div>';
    }).join("");
    out.push(
      '<section><div class="wrap">' +
      sectionHead(pad(++n), "30-Day Roadmap", "The first month, week by week.", "No slow ramp. We move on day one and you see proof inside the first week.") +
      '<div class="road-grid">' + cols + '</div></div></section>'
    );
  })();

  // ---------- DELIVERABLES ----------
  (function () {
    var d = arr(P.mock_deliverables).filter(function (x) { return has(x.title) || has(x.desc); });
    if (!d.length) return;
    var cards = d.map(function (x, i) {
      return '<div class="deliv reveal"><div class="ic">' + ic(DELIV_ICONS[i % DELIV_ICONS.length]) + '</div>' +
        (has(x.title) ? '<h4>' + esc(x.title) + '</h4>' : '') +
        (has(x.desc) ? '<p>' + esc(x.desc) + '</p>' : '') + '</div>';
    }).join("");
    out.push(
      '<section><div class="wrap">' +
      sectionHead(pad(++n), "What You Get", "Everything that ships, every month.", "") +
      '<div class="deliv-grid">' + cards + '</div></div></section>'
    );
  })();

  // ---------- PROOF ----------
  (function () {
    var cs = (S.case_studies) || {};
    var metrics = arr(S.proof_metrics).filter(function (m) { return has(m.value); }).slice(0, 5);
    var dashes = nonEmptyStrings(S.dashboard_images);

    function caseCard(c) {
      if (!c || !has(c.name)) return "";
      var subs = nonEmptyStrings(c.sub_metrics).map(function (s) { return '<span>' + esc(s) + '</span>'; }).join("");
      var story = nonEmptyStrings(c.story).map(function (s) { return '<p>' + esc(s) + '</p>'; }).join("");
      var img = has(c.image) ? '<img class="cimg" src="' + esc(c.image) + '" alt="' + esc(c.name) + '" loading="lazy" onerror="this.style.display=\'none\'"/>' : '';
      var ba = "";
      if (has(c.before) || has(c.after)) {
        ba = '<div class="ba">' +
          (has(c.before) ? '<div class="box before"><div class="t">Before</div><p>' + esc(c.before) + '</p></div>' : '') +
          (has(c.after) ? '<div class="box after"><div class="t">After</div><p>' + esc(c.after) + '</p></div>' : '') +
          '</div>';
      }
      var media = "";
      var ml = nonEmptyStrings(c.media);
      if (ml.length) {
        media = '<div class="media"><div class="ml">As seen in</div><div class="logos">' +
          ml.map(function (m) { return '<span>' + esc(m) + '</span>'; }).join("") + '</div></div>';
      }
      var hero = has(c.hero_metric) ? '<div class="hero-m"><b>' + esc(c.hero_metric) + '</b><span>' + esc(c.hero_metric_label || "") + '</span></div>' : '';
      return '<div class="case reveal"><div class="top"><div><div class="cname">' + esc(c.name) + '</div>' +
        (has(c.industry) ? '<div class="cind">' + esc(c.industry) + '</div>' : '') + '</div>' + hero + '</div>' +
        (subs ? '<div class="submetrics">' + subs + '</div>' : '') +
        img +
        (story ? '<div class="story">' + story + '</div>' : '') +
        media + ba + '</div>';
    }

    var cases = [caseCard(cs.frenchify), caseCard(cs.drsw)].filter(function (x) { return x; }).join("");

    var metricStrip = metrics.length ? (
      '<div class="metrics-strip reveal">' + metrics.map(function (m) {
        return '<div class="metric"><b>' + esc(m.value) + '</b><span>' + esc(m.label || "") + '</span></div>';
      }).join("") + '</div>'
    ) : '';

    var dashRow = dashes.length ? (
      '<div class="dash-row reveal">' + dashes.slice(0, 3).map(function (src) {
        return '<img src="' + esc(src) + '" alt="Live performance dashboard" loading="lazy" onerror="this.style.display=\'none\'"/>';
      }).join("") + '</div>'
    ) : '';

    if (!cases && !metricStrip && !dashRow) return;

    out.push(
      '<section class="proof"><div class="wrap">' +
      sectionHead(pad(++n), "Proof", "We have done this. Here are the receipts.", "Real clients, real numbers. Different industries, same playbook discipline.") +
      (cases ? '<div class="case-grid">' + cases + '</div>' : '') +
      (metricStrip ? '<div class="strat-block-label reveal" style="margin-top:48px;">Numbers from real client work</div>' + metricStrip : '') +
      (dashRow ? '<div class="strat-block-label reveal" style="margin-top:42px;">Live ad dashboards</div>' + dashRow : '') +
      '</div></section>'
    );
  })();

  // ---------- ROI ----------
  (function () {
    var r = P.roi_projection;
    if (!r) return;
    var cells = [];
    function cell(k, v) { if (has(v)) cells.push('<div class="roi-cell reveal"><div class="k">' + esc(k) + '</div><div class="val">' + esc(v) + '</div></div>'); }
    cell("New customers / mo", r.leads_per_month);
    cell("Repeat / close rate", r.close_rate);
    cell("Projected revenue", r.projected_revenue);
    cell("Your investment", r.investment);
    var heroVal = has(r.roi_multiple) ? r.roi_multiple : "";
    if (!cells.length && !has(heroVal)) return;

    var heroBox = has(heroVal) ? (
      '<div class="roi-hero reveal"><div class="big">' + esc(heroVal) + '</div>' +
      '<div class="rl">projected return on every dollar in</div></div>'
    ) : '';

    out.push(
      '<section><div class="wrap">' +
      sectionHead(pad(++n), "ROI Projection", "The math, conservatively.", "") +
      '<div class="roi-wrap">' +
        (cells.length ? '<div class="roi-grid">' + cells.join("") + '</div>' : '<div></div>') +
        heroBox +
      '</div>' +
      '<p class="roi-disc reveal">Projection based on the strategy above and benchmarks from comparable clients. Not a guarantee. We report real numbers weekly so you always see the truth.</p>' +
      '</div></section>'
    );
  })();

  // ---------- PRICING ----------
  (function () {
    var pr = P.pricing || {};
    function plan(obj, feat) {
      if (!obj) return "";
      var bullets = nonEmptyStrings(obj.bullets);
      if (!has(obj.name) && !has(obj.price) && !bullets.length) return "";
      var li = bullets.map(function (b) {
        return '<li><span class="c" style="width:18px;height:18px;display:inline-block;">' + ic("check") + '</span><span>' + esc(b) + '</span></li>';
      }).join("");
      return '<div class="plan ' + (feat ? "feat" : "") + ' reveal">' +
        (feat ? '<span class="badge">Recommended</span>' : '') +
        (has(obj.name) ? '<div class="pname">' + esc(obj.name) + '</div>' : '') +
        (has(obj.price) ? '<div class="pprice">' + esc(obj.price) + '<span class="per"> / mo</span></div>' : '') +
        (li ? '<ul>' + li + '</ul>' : '<div style="flex:1"></div>') +
        '<a class="pcta" href="' + CAL + '" target="_blank" rel="noopener">Start with ' + esc(has(obj.name) ? obj.name : "this plan") + '</a>' +
        '</div>';
    }
    var g = plan(pr.growth, false), sc = plan(pr.scale, true);
    if (!g && !sc) return;
    out.push(
      '<section><div class="wrap">' +
      sectionHead(pad(++n), "Pricing", "Two ways to run this. Both pay for themselves.", "Monthly retainer. No setup fee, no lock-in. Cancel any time, though nobody does.") +
      '<div class="price-grid">' + g + sc + '</div></div></section>'
    );
  })();

  // ---------- CTA ----------
  (function () {
    var company = has(P.company_name) ? P.company_name : "your brand";
    out.push(
      '<section class="cta-final"><div class="wrap">' +
        '<div class="reveal">' +
          '<h2>Your whole strategy is <span class="accent">already built</span>.</h2>' +
          '<p>You just read the plan we would run for ' + esc(company) + '. Let us walk you through it and answer everything in 20 minutes.</p>' +
          '<a class="cta-btn" href="' + CAL + '" target="_blank" rel="noopener">Book a 20-min call ' +
            '<span style="width:20px;height:20px;display:inline-block;">' + ic("arrow") + '</span></a>' +
          '<div class="cta-sub">No pitch deck theater. Just the plan, the numbers, and your questions.</div>' +
        '</div>' +
      '</div></section>'
    );
  })();

  // ---------- FOOTER ----------
  (function () {
    var c = S.contact || {};
    var bits = [];
    if (has(c.email)) bits.push('<a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a>');
    if (has(c.website)) bits.push(esc(c.website));
    if (has(c.phone)) bits.push(esc(c.phone));
    out.push(
      '<footer class="footer"><div class="wrap">' +
        '<div class="fbrand">The Growth Engine</div>' +
        (bits.length ? '<div>' + bits.join(' &nbsp;·&nbsp; ') + '</div>' : '') +
      '</div></footer>'
    );
  })();

  document.getElementById("app").innerHTML = out.join("");

  // ---------- scroll reveal ----------
  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var nodes = Array.prototype.slice.call(document.querySelectorAll(".reveal"));
  if (reduce || !("IntersectionObserver" in window)) {
    nodes.forEach(function (el) { el.classList.add("in"); });
  } else {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
      });
    }, { rootMargin: "0px 0px -8% 0px", threshold: 0.08 });
    nodes.forEach(function (el, i) {
      var sib = el.parentElement ? Array.prototype.indexOf.call(el.parentElement.children, el) : 0;
      el.style.transitionDelay = Math.min(sib, 6) * 55 + "ms";
      io.observe(el);
    });
  }

  // ---------- progress bar ----------
  var bar = document.getElementById("progress");
  function onScroll() {
    var h = document.documentElement;
    var max = (h.scrollHeight - h.clientHeight) || 1;
    bar.style.width = (Math.min(1, (h.scrollTop || document.body.scrollTop) / max) * 100) + "%";
  }
  window.addEventListener("scroll", onScroll, { passive: true });
  onScroll();
})();
</script>
</body>
</html>
