<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Proposal | The Growth Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ============================================================
   RESET + ROOT
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden;background:#0D0D0C}
body{
  background:#0D0D0C;color:#fff;font-family:'Hanken Grotesk',sans-serif;
  line-height:1.6;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

:root{
  --bg:#0D0D0C;
  --bg-alt:#0A0A09;
  --surface:#191919;
  --surface-2:#2D2D2D;
  --surface-glass:rgba(25,25,25,0.55);
  --accent:#C069DD;
  --accent-glow:#9B3FC7;
  --accent-soft:#D48EF0;
  --success:#22C55E;
  --warning:#F59E0B;
  --danger:#EF4444;
  --text:#fff;
  --muted:#888;
  --subtle:#555;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --border-accent:rgba(192,105,221,0.3);
  --font-h:'Outfit',sans-serif;
  --font-b:'Hanken Grotesk',sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --font-s:'Instrument Serif',serif;
  --r-sm:1rem;
  --r-md:1.5rem;
  --r-lg:2rem;
  --r-xl:3rem;
  --shadow:0 20px 60px rgba(0,0,0,0.5),0 4px 16px rgba(0,0,0,0.3);
  --shadow-glow:0 0 80px rgba(192,105,221,0.18),0 20px 60px rgba(0,0,0,0.55);
  --ease:cubic-bezier(0.16,1,0.3,1);
}

/* ============================================================
   GLOBAL CHROME (progress bar, noise, magnetic cursor)
   ============================================================ */
#scroll-progress{
  position:fixed;top:0;left:0;height:2px;width:0;z-index:99999;
  background:linear-gradient(90deg,var(--accent-glow),var(--accent),var(--accent-soft));
  box-shadow:0 0 18px var(--accent),0 0 6px var(--accent-soft);
}
#noise{
  position:fixed;inset:0;pointer-events:none;z-index:99998;opacity:.035;
  mix-blend-mode:overlay;
}
#cursor-glow{
  position:fixed;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,rgba(192,105,221,0.16) 0%,rgba(192,105,221,0) 60%);
  pointer-events:none;z-index:1;transform:translate(-50%,-50%);
  transition:opacity .3s ease;mix-blend-mode:screen;will-change:transform;
}
#nav{
  position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);
  z-index:9000;display:flex;align-items:center;gap:.6rem;
  padding:.55rem 1rem .55rem .65rem;border-radius:100px;
  background:rgba(13,13,12,0.65);backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--border);
  font-family:var(--font-m);font-size:.65rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);
  opacity:0;pointer-events:none;transition:opacity .5s ease;
}
#nav.show{opacity:1;pointer-events:auto}
#nav .nav-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 10px var(--success);animation:pulse 2.4s ease-in-out infinite}
#nav .nav-sep{width:1px;height:14px;background:var(--border-strong)}
#nav .nav-cta{
  background:linear-gradient(135deg,var(--accent),var(--accent-glow));
  color:#fff;padding:.45rem 1rem;border-radius:100px;
  font-weight:600;letter-spacing:.1em;box-shadow:0 0 20px rgba(192,105,221,.35);
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}

/* ============================================================
   TYPOGRAPHY UTILS
   ============================================================ */
.section-label{
  font-family:var(--font-m);font-size:.7rem;text-transform:uppercase;
  letter-spacing:.3em;color:var(--accent);margin-bottom:1.25rem;
  display:inline-flex;align-items:center;gap:.85rem;
}
.section-label::before{content:'';width:32px;height:1px;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.section-headline{
  font-family:var(--font-h);font-weight:700;
  font-size:clamp(2rem,5.5vw,4rem);line-height:1.05;letter-spacing:-.035em;
  margin-bottom:1.25rem;
}
.accent{color:var(--accent)}
.drama{
  font-family:var(--font-s);font-style:italic;color:var(--accent);
  font-size:clamp(1.15rem,2.2vw,1.65rem);opacity:.92;letter-spacing:.005em;
}
.gradient-text{
  background:linear-gradient(135deg,#fff 0%,var(--accent-soft) 50%,var(--accent) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.split-line{display:block;overflow:hidden}
.split-line>span{display:inline-block;will-change:transform}

.container{max-width:1240px;margin:0 auto;padding:0 2rem;position:relative;z-index:2}
section{position:relative}
.section-pad{padding:9rem 0;position:relative}
.section-pad::before{
  content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(192,105,221,.18),transparent);
}

/* ============================================================
   PILLS / BUTTONS / FRAMES
   ============================================================ */
.pill{
  display:inline-flex;align-items:center;gap:.45rem;
  padding:.4rem 1rem;border-radius:100px;font-size:.72rem;
  font-family:var(--font-m);background:rgba(255,255,255,.04);
  border:1px solid var(--border);color:var(--muted);backdrop-filter:blur(8px);
}
.pill-accent{background:rgba(192,105,221,.08);border-color:var(--border-accent);color:var(--accent)}
.pill-success{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:var(--success)}
.pill-warning{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:var(--warning)}
.pill-danger{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:var(--danger)}

.btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:1.05rem 2.4rem;border-radius:100px;
  font-family:var(--font-h);font-weight:600;font-size:1rem;
  border:none;transition:transform .4s var(--ease),box-shadow .4s var(--ease);
  position:relative;overflow:hidden;letter-spacing:-.005em;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-glow));
  color:#fff;
  box-shadow:0 8px 28px rgba(192,105,221,.35),inset 0 1px 0 rgba(255,255,255,.12);
}
.btn-primary::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,var(--accent-soft),var(--accent));
  opacity:0;transition:opacity .4s var(--ease);
}
.btn-primary>*{position:relative;z-index:1}
.btn-primary:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 16px 50px rgba(192,105,221,.55),0 0 0 1px rgba(255,255,255,.08) inset}
.btn-primary:hover::before{opacity:1}
.btn-outline{background:transparent;color:#fff;border:1px solid var(--border-strong)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

.browser-frame{
  background:#0F0F0E;border-radius:1.1rem;overflow:hidden;
  border:1px solid var(--border-strong);box-shadow:var(--shadow);
}
.browser-bar{
  display:flex;align-items:center;gap:.45rem;padding:.7rem 1rem;
  background:#161615;border-bottom:1px solid var(--border);
}
.browser-dot{width:11px;height:11px;border-radius:50%}
.browser-dot.r{background:#EF4444}.browser-dot.a{background:#F59E0B}.browser-dot.g{background:#22C55E}
.browser-url{
  font-family:var(--font-m);font-size:.7rem;color:var(--muted);
  margin-left:.5rem;flex:1;background:rgba(255,255,255,.04);
  padding:.3rem .85rem;border-radius:6px;
}
.browser-content{position:relative;background:#fff;min-height:240px}
.browser-content img{width:100%;display:block}
.browser-fake{
  background:linear-gradient(180deg,#fff 0%,#f3f4f6 100%);
  height:340px;padding:2rem;color:#111;font-family:var(--font-h);
}
.browser-fake .bf-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.4rem;padding-bottom:.9rem;border-bottom:1px solid #e5e7eb}
.browser-fake .bf-logo{font-weight:700;font-size:1rem}
.browser-fake .bf-links{display:flex;gap:1.4rem;font-size:.78rem;color:#6b7280}
.browser-fake .bf-hero h1{font-size:2.2rem;font-weight:700;line-height:1.1;margin-bottom:.85rem;letter-spacing:-.02em;color:#0a0a09}
.browser-fake .bf-hero p{font-size:.92rem;color:#4b5563;max-width:380px;margin-bottom:1.4rem}
.browser-fake .bf-cta{display:inline-block;background:#0a0a09;color:#fff;padding:.7rem 1.4rem;border-radius:6px;font-size:.82rem;font-weight:500}
.browser-fake .bf-block{margin-top:1.6rem;display:flex;gap:.8rem}
.browser-fake .bf-block .bk{width:60px;height:60px;background:#e5e7eb;border-radius:8px}

.phone-frame{
  background:#0a0a09;border-radius:2.6rem;padding:9px;
  border:2px solid rgba(255,255,255,.1);
  box-shadow:var(--shadow);position:relative;
}
.phone-frame::before{
  content:'';position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:90px;height:22px;border-radius:14px;background:#0a0a09;z-index:3;
}
.phone-screen{border-radius:2.1rem;overflow:hidden;background:#0F0F0E;position:relative}
.phone-screen img{width:100%;display:block}

/* ============================================================
   SECTION 1: HERO
   ============================================================ */
#hero{
  min-height:100vh;height:100vh;
  display:flex;flex-direction:column;justify-content:flex-end;
  position:relative;overflow:hidden;padding:0;
}
#hero-canvas{position:absolute;inset:0;z-index:0;opacity:.7}
.hero-mesh{position:absolute;inset:0;overflow:hidden;z-index:0}
.hero-blob{
  position:absolute;border-radius:50%;filter:blur(120px);
  opacity:.5;mix-blend-mode:screen;will-change:transform;
}
.hero-blob.b1{width:780px;height:780px;background:#C069DD;top:-260px;left:-220px;animation:floatA 18s ease-in-out infinite}
.hero-blob.b2{width:560px;height:560px;background:#5B21B6;bottom:-200px;right:-180px;animation:floatB 22s ease-in-out infinite}
.hero-blob.b3{width:420px;height:420px;background:#9B3FC7;top:30%;left:55%;animation:floatC 16s ease-in-out infinite}
.hero-blob.b4{width:300px;height:300px;background:#7C3AED;top:60%;left:10%;animation:floatA 26s ease-in-out infinite reverse}
@keyframes floatA{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.06)}66%{transform:translate(-30px,20px) scale(.96)}}
@keyframes floatB{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-40px,30px) scale(.94)}66%{transform:translate(30px,-20px) scale(1.05)}}
@keyframes floatC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-40px) scale(1.1)}}
.hero-grid{
  position:absolute;inset:0;z-index:0;opacity:.45;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse at 50% 50%,#000 30%,transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 50%,#000 30%,transparent 75%);
}
.hero-vignette{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse at 50% 30%,transparent 0%,rgba(13,13,12,.6) 75%,rgba(13,13,12,1) 100%);
  pointer-events:none;
}
.hero-top-meta{
  position:absolute;top:2.4rem;left:2.4rem;right:2.4rem;z-index:5;
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--font-m);font-size:.65rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--muted);
}
.hero-top-meta .ht-logo{display:flex;align-items:center;gap:.6rem}
.hero-top-meta .ht-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.hero-content{
  position:relative;z-index:5;padding:0 4rem 6rem;max-width:1400px;
  width:100%;margin:0 auto;
}
.hero-eyebrow{
  font-family:var(--font-m);font-size:.7rem;text-transform:uppercase;
  letter-spacing:.35em;color:var(--muted);margin-bottom:2rem;
  display:inline-flex;align-items:center;gap:.85rem;
}
.hero-eyebrow::before{content:'';width:48px;height:1px;background:var(--accent)}
.hero-company{
  font-family:var(--font-h);font-weight:800;
  font-size:clamp(3.8rem,12.5vw,11rem);
  line-height:.92;letter-spacing:-.045em;
  color:#fff;margin-bottom:1.6rem;
  background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,.55) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-subline{
  font-size:clamp(1.05rem,1.5vw,1.3rem);color:#bbb;
  max-width:680px;line-height:1.7;font-weight:300;
  margin-bottom:2.6rem;
}
.hero-stats{
  display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:3rem;
}
.hero-cta-row{display:flex;flex-wrap:wrap;gap:1rem;align-items:center}
.hero-bottom-meta{
  position:absolute;bottom:2.4rem;right:2.4rem;z-index:5;
  font-family:var(--font-m);font-size:.65rem;color:var(--subtle);
  text-align:right;letter-spacing:.1em;line-height:1.7;
}
.scroll-indicator{
  position:absolute;bottom:2.4rem;left:50%;transform:translateX(-50%);z-index:5;
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  font-family:var(--font-m);font-size:.6rem;color:var(--subtle);
  text-transform:uppercase;letter-spacing:.3em;
}
.scroll-line{width:1px;height:40px;background:linear-gradient(180deg,transparent,var(--accent));position:relative;overflow:hidden}
.scroll-line::after{
  content:'';position:absolute;top:-40px;left:0;width:100%;height:40px;
  background:linear-gradient(180deg,transparent,#fff);
  animation:scrolldown 2.4s ease-in-out infinite;
}
@keyframes scrolldown{0%{top:-40px}100%{top:100%}}

/* particle field */
.particle{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:#fff;pointer-events:none;
  box-shadow:0 0 6px rgba(255,255,255,.6);
}

/* ============================================================
   SECTION 2: AUDIT
   ============================================================ */
#audit .audit-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:3.5rem;align-items:start;margin-top:3rem}
.audit-shot{position:relative;perspective:1500px}
.audit-shot-inner{transform-style:preserve-3d}
.audit-shot .browser-frame{transform:rotateY(-2deg) rotateX(2deg);transform-origin:left center;will-change:transform}
.audit-dot{
  position:absolute;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-m);font-size:.7rem;font-weight:700;color:#000;
  cursor:pointer;z-index:5;opacity:0;transform:scale(0);
}
.audit-dot.warning{background:var(--warning);box-shadow:0 0 0 4px rgba(245,158,11,.18),0 0 18px rgba(245,158,11,.5)}
.audit-dot.danger{background:var(--danger);color:#fff;box-shadow:0 0 0 4px rgba(239,68,68,.18),0 0 18px rgba(239,68,68,.5)}
.audit-dot::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid currentColor;opacity:.4;
  animation:ringPulse 2.4s ease-out infinite;
}
@keyframes ringPulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.8);opacity:0}}
.audit-callout{
  position:absolute;background:#0F0F0E;border:1px solid var(--border-strong);
  border-radius:.75rem;padding:.65rem 1rem;font-size:.78rem;color:#ddd;
  white-space:nowrap;opacity:0;pointer-events:none;
  backdrop-filter:blur(12px);box-shadow:var(--shadow);
  font-family:var(--font-m);transform:translate(-50%,calc(-100% - 14px));
}
.audit-dot:hover+.audit-callout,.audit-dot.show+.audit-callout{opacity:1}
.audit-side{display:flex;flex-direction:column;gap:1.5rem}
.audit-score-card{
  background:var(--surface-glass);border:1px solid var(--border);
  border-radius:var(--r-md);padding:2rem;text-align:center;
  backdrop-filter:blur(20px);
}
.audit-ring{width:180px;height:180px;margin:0 auto 1rem;position:relative}
.audit-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.audit-ring circle{fill:none;stroke-width:8}
.audit-ring .bg{stroke:rgba(255,255,255,.06)}
.audit-ring .fg{stroke:var(--accent);stroke-linecap:round;filter:drop-shadow(0 0 6px var(--accent))}
.audit-score-num{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.audit-score-num .n{font-family:var(--font-m);font-weight:700;font-size:2.5rem;letter-spacing:-.02em}
.audit-score-num .l{font-family:var(--font-m);font-size:.65rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-top:-.2rem}
.audit-findings{list-style:none;display:flex;flex-direction:column;gap:.8rem;margin-top:1rem}
.audit-finding{
  display:flex;align-items:flex-start;gap:.75rem;font-size:.88rem;color:#bbb;
  padding:.85rem 1rem;border-radius:.75rem;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
}
.audit-finding-num{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--font-m);font-size:.65rem;font-weight:700;
  flex-shrink:0;
}
.audit-finding-num.warning{background:var(--warning);color:#000}
.audit-finding-num.danger{background:var(--danger);color:#fff}

/* ============================================================
   SECTION 3: PROBLEMS
   ============================================================ */
#problems{background:linear-gradient(180deg,var(--bg) 0%,var(--bg-alt) 50%,var(--bg) 100%)}
.problems-stack{display:flex;flex-direction:column;gap:1.5rem;margin-top:3rem;max-width:980px}
.problem-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:2rem;
  align-items:center;padding:2.5rem 2rem;
  background:var(--surface-glass);border:1px solid var(--border);
  border-radius:var(--r-md);backdrop-filter:blur(16px);
  position:relative;overflow:hidden;
  transition:transform .5s var(--ease),border-color .5s var(--ease);
}
.problem-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--danger);transform:scaleY(0);transform-origin:top;
  transition:transform .8s var(--ease);
}
.problem-card.warning::before{background:var(--warning)}
.problem-card.in-view::before{transform:scaleY(1)}
.problem-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.problem-num{
  font-family:var(--font-m);font-weight:700;
  font-size:clamp(2.6rem,4vw,3.6rem);line-height:1;
  color:rgba(255,255,255,.05);letter-spacing:-.02em;
}
.problem-statement{
  font-family:var(--font-h);font-weight:600;
  font-size:clamp(1.3rem,2.2vw,1.85rem);line-height:1.25;
  letter-spacing:-.018em;margin-bottom:.7rem;
}
.problem-context{color:var(--muted);font-size:.95rem;line-height:1.7;max-width:600px}
.problem-data{
  font-family:var(--font-m);font-size:.78rem;
  white-space:nowrap;padding:.55rem 1.1rem;border-radius:100px;
  display:inline-flex;align-items:center;gap:.5rem;
}
.problem-card.danger .problem-data{background:rgba(239,68,68,.08);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.problem-card.warning .problem-data{background:rgba(245,158,11,.08);color:var(--warning);border:1px solid rgba(245,158,11,.2)}

/* ============================================================
   SECTION 4: COMPETITORS
   ============================================================ */
.comp-table{
  width:100%;border-collapse:separate;border-spacing:0;
  background:var(--surface-glass);backdrop-filter:blur(20px);
  border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border);
  margin-top:2.5rem;
}
.comp-table th,.comp-table td{
  padding:1.05rem 1.25rem;text-align:center;
  border-bottom:1px solid var(--border);font-size:.92rem;
}
.comp-table tbody tr:last-child td{border-bottom:none}
.comp-table th{
  font-family:var(--font-h);font-weight:600;font-size:.72rem;
  text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
  background:rgba(0,0,0,.4);padding-top:1.4rem;padding-bottom:1.4rem;
}
.comp-table th:first-child,.comp-table td:first-child{text-align:left;color:#ddd}
.comp-table .col-tge{background:rgba(192,105,221,.06)}
.comp-table th.col-tge{color:var(--accent)}
.comp-table tr{transition:background .3s ease}
.comp-table tbody tr:hover{background:rgba(255,255,255,.02)}
.comp-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:50%;font-size:.85rem;
  opacity:0;transform:scale(0);
}
.comp-mark.yes{background:rgba(34,197,94,.12);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.comp-mark.no{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.comp-mark.partial{background:rgba(245,158,11,.1);color:var(--warning);border:1px solid rgba(245,158,11,.25)}
.gaps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.4rem;margin-top:3rem}
.gap-card{
  background:var(--surface-glass);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:var(--r-md);
  padding:1.85rem;transition:all .5s var(--ease);position:relative;overflow:hidden;
}
.gap-card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(circle at top right,rgba(192,105,221,.1) 0%,transparent 70%);
  opacity:0;transition:opacity .5s var(--ease);
}
.gap-card:hover{border-color:var(--border-accent);transform:translateY(-3px)}
.gap-card:hover::after{opacity:1}
.gap-num{
  font-family:var(--font-m);font-size:.7rem;color:var(--muted);
  letter-spacing:.2em;margin-bottom:1rem;
}
.gap-title{font-family:var(--font-h);font-weight:600;font-size:1.15rem;margin-bottom:.6rem;letter-spacing:-.01em}
.gap-desc{color:var(--muted);font-size:.9rem;line-height:1.65}

/* ============================================================
   SECTION 5: ROADMAP TIMELINE
   ============================================================ */
#roadmap{background:linear-gradient(180deg,var(--bg) 0%,#0A0A09 50%,var(--bg) 100%)}
.timeline-wrap{margin-top:4rem;position:relative}
.timeline-track{
  position:relative;height:3px;background:rgba(255,255,255,.04);
  margin:0 auto 4rem;max-width:920px;border-radius:100px;
}
.timeline-fill{
  position:absolute;top:0;left:0;height:100%;width:0;
  background:linear-gradient(90deg,var(--accent-glow),var(--accent),var(--accent-soft));
  border-radius:100px;box-shadow:0 0 20px var(--accent);
}
.timeline-nodes{
  display:grid;grid-template-columns:repeat(4,1fr);position:relative;
  max-width:920px;margin:0 auto;
}
.timeline-node{
  display:flex;flex-direction:column;align-items:center;
  position:relative;margin-top:-12px;
}
.timeline-dot{
  width:24px;height:24px;border-radius:50%;
  background:var(--bg);border:2px solid var(--border-strong);
  position:relative;z-index:2;transition:all .5s var(--ease);
}
.timeline-node.active .timeline-dot{
  border-color:var(--accent);box-shadow:0 0 0 6px rgba(192,105,221,.18),0 0 20px var(--accent);
  background:var(--accent);
}
.timeline-week-label{
  font-family:var(--font-m);font-size:.65rem;letter-spacing:.25em;
  color:var(--muted);text-transform:uppercase;margin-top:1rem;
}
.timeline-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-top:2rem}
.tc{
  background:var(--surface-glass);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:var(--r-md);
  padding:1.85rem 1.5rem;display:flex;flex-direction:column;gap:1rem;
  transition:all .5s var(--ease);position:relative;overflow:hidden;
}
.tc::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent-glow));
  transform:scaleX(0);transform-origin:left;transition:transform .8s var(--ease);
}
.tc.in-view::before{transform:scaleX(1)}
.tc:hover{transform:translateY(-4px);border-color:var(--border-accent)}
.tc-head{display:flex;justify-content:space-between;align-items:center}
.tc-week{font-family:var(--font-m);font-size:.65rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase}
.tc-count{
  font-family:var(--font-m);font-size:.7rem;padding:.2rem .6rem;
  border-radius:100px;background:rgba(192,105,221,.08);color:var(--accent);
}
.tc-title{font-family:var(--font-h);font-weight:600;font-size:1.4rem;letter-spacing:-.02em}
.tc-items{list-style:none;display:flex;flex-direction:column;gap:.55rem}
.tc-items li{font-size:.83rem;color:var(--muted);padding-left:1rem;position:relative;line-height:1.55}
.tc-items li::before{content:'';position:absolute;left:0;top:.55rem;width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
.timeline-total{
  text-align:center;margin-top:3rem;font-family:var(--font-m);font-size:1.15rem;
  color:var(--accent);letter-spacing:.05em;
}
.timeline-total .num{font-size:2rem;font-weight:700;color:#fff;display:block;letter-spacing:-.02em}

/* ============================================================
   SECTION 6: STRATEGY (PINNED STACKING CARDS)
   ============================================================ */
#strategy{position:relative}
.strategy-stack{
  position:relative;height:300vh;
}
.strategy-pinwrap{
  position:sticky;top:0;height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:0 2rem;overflow:hidden;
}
.strategy-card{
  position:absolute;width:100%;max-width:1100px;
  background:var(--surface-glass);backdrop-filter:blur(24px);
  border:1px solid var(--border-strong);border-radius:var(--r-xl);
  padding:3.5rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;
  align-items:center;will-change:transform,opacity,filter;
  box-shadow:var(--shadow-glow);
}
.strategy-left .strat-num{
  font-family:var(--font-m);font-size:.7rem;letter-spacing:.3em;
  color:var(--accent);margin-bottom:1.2rem;display:inline-flex;align-items:center;gap:.6rem;
}
.strategy-left .strat-num::before{content:'';width:24px;height:1px;background:var(--accent)}
.strategy-left h3{
  font-family:var(--font-h);font-weight:700;
  font-size:clamp(1.8rem,3vw,2.6rem);line-height:1.1;letter-spacing:-.025em;
  margin-bottom:1.5rem;
}
.strat-bullets{list-style:none;display:flex;flex-direction:column;gap:.85rem;margin-bottom:1.8rem}
.strat-bullets li{
  display:flex;gap:.75rem;font-size:.95rem;color:#bbb;line-height:1.55;
  padding-left:0;
}
.strat-bullets li i{color:var(--accent);width:18px;height:18px;flex-shrink:0;margin-top:.2rem}
.strat-result{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.65rem 1.15rem;border-radius:100px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);
  font-family:var(--font-m);font-size:.78rem;color:var(--success);
}
.strategy-right{
  position:relative;display:flex;align-items:center;justify-content:center;
  height:340px;
}
.strat-visual{
  position:relative;width:100%;height:100%;border-radius:var(--r-md);
  overflow:hidden;background:radial-gradient(circle at 30% 30%,rgba(192,105,221,.18),transparent 60%),#0A0A09;
  border:1px solid var(--border);
}
.strat-visual .glyph{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:200px;height:200px;display:flex;align-items:center;justify-content:center;
}
.strat-visual .glyph i{width:120px;height:120px;color:var(--accent);filter:drop-shadow(0 0 30px var(--accent))}
.strat-visual .gv-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse at center,#000 0%,transparent 75%);
}
.strat-visual .gv-rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.strat-visual .gv-rings span{
  position:absolute;border:1px solid rgba(192,105,221,.2);border-radius:50%;
}
.strat-visual .gv-rings span:nth-child(1){width:160px;height:160px;animation:rotate 20s linear infinite}
.strat-visual .gv-rings span:nth-child(2){width:240px;height:240px;animation:rotate 30s linear infinite reverse}
.strat-visual .gv-rings span:nth-child(3){width:320px;height:320px;animation:rotate 40s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}

/* ============================================================
   SECTION 7: PROOF WALL
   ============================================================ */
#proof{background:linear-gradient(180deg,var(--bg) 0%,#0A0A09 50%,var(--bg) 100%)}
.proof-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:1rem;
  margin-top:3rem;grid-auto-rows:minmax(140px,auto);
}
.proof-tile{
  background:var(--surface-glass);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:var(--r-md);
  padding:1.85rem;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  transition:all .5s var(--ease);
}
.proof-tile::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(circle at top right,rgba(192,105,221,.18),transparent 60%);
  opacity:0;transition:opacity .5s var(--ease);
}
.proof-tile:hover{border-color:var(--border-accent);transform:translateY(-4px)}
.proof-tile:hover::before{opacity:1}
.proof-tile .pv{
  font-family:var(--font-h);font-weight:800;letter-spacing:-.04em;
  font-size:clamp(2rem,3.6vw,3.4rem);line-height:1;
  background:linear-gradient(135deg,#fff 0%,var(--accent-soft) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  position:relative;z-index:1;
}
.proof-tile .pl{
  font-family:var(--font-m);font-size:.7rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.18em;margin-top:.6rem;
  position:relative;z-index:1;
}
.proof-tile.large{grid-column:span 3}
.proof-tile.medium{grid-column:span 2}
.proof-tile.small{grid-column:span 2}
.proof-tile.large .pv{font-size:clamp(3rem,5vw,5rem)}
.proof-spark{
  position:absolute;bottom:0;left:0;right:0;height:60%;opacity:.12;
  pointer-events:none;
}
.proof-spark svg{width:100%;height:100%}

/* ============================================================
   SECTION 8 + 9: CASE STUDIES
   ============================================================ */
.case-row{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;margin-top:3rem}
.case-row.flip{grid-template-columns:1fr 1fr}
.case-phone-wrap{position:relative;display:flex;justify-content:center}
.case-phone-wrap .phone-frame{max-width:300px;will-change:transform}
.case-phone-glow{
  position:absolute;width:120%;height:120%;top:-10%;left:-10%;
  background:radial-gradient(circle at center,rgba(192,105,221,.18),transparent 60%);
  filter:blur(40px);z-index:0;
}
.case-content{position:relative;z-index:2}
.case-pill{margin-bottom:1.4rem}
.case-name{
  font-family:var(--font-h);font-weight:700;font-size:clamp(1.6rem,3vw,2.2rem);
  letter-spacing:-.025em;margin-bottom:.5rem;
}
.case-industry{font-family:var(--font-m);font-size:.7rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:1.8rem}
.case-hero-metric{
  font-family:var(--font-h);font-weight:800;
  font-size:clamp(3.2rem,6.5vw,5.5rem);line-height:.9;
  letter-spacing:-.04em;color:var(--accent);
  text-shadow:0 0 40px rgba(192,105,221,.4);margin-bottom:.4rem;
}
.case-hero-label{font-family:var(--font-h);font-size:1.15rem;color:#ccc;margin-bottom:2rem}
.case-submetrics{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem}
.case-story{display:flex;flex-direction:column;gap:1rem;color:#bbb;font-size:.95rem;line-height:1.7;margin-bottom:2rem}
.case-story p{padding-left:1rem;border-left:1px solid var(--border-strong)}
.case-baf{
  display:grid;grid-template-columns:1fr 1fr;gap:1rem;
  padding:1.4rem;border-radius:var(--r-md);
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.case-baf::before{
  content:'';position:absolute;top:0;bottom:0;left:50%;width:1px;
  background:var(--border-strong);
}
.case-baf-col .lab{
  font-family:var(--font-m);font-size:.62rem;letter-spacing:.3em;
  color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;
}
.case-baf-col .lab.before{color:var(--danger)}
.case-baf-col .lab.after{color:var(--success)}
.case-baf-col p{font-size:.85rem;color:#ddd;line-height:1.5}
.case-media-strip{
  display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1.5rem;
}
.case-media-strip .ms{
  padding:.5rem 1rem;border-radius:8px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);font-family:var(--font-h);font-weight:600;
  font-size:.78rem;color:#ccc;letter-spacing:.02em;
}

/* fallback phone screen */
.phone-fallback{
  height:520px;background:linear-gradient(180deg,#1a1a1a,#0F0F0E);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;gap:1rem;
}
.phone-fallback .pf-icon{width:60px;height:60px;color:var(--accent)}
.phone-fallback .pf-title{font-family:var(--font-h);font-weight:700;font-size:1.2rem}
.phone-fallback .pf-stat{font-family:var(--font-h);font-weight:800;font-size:2.4rem;color:var(--accent);letter-spacing:-.03em}
.phone-fallback .pf-sub{font-family:var(--font-m);font-size:.7rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
.phone-fallback .pf-bars{display:flex;gap:6px;align-items:flex-end;height:60px;margin-top:1.5rem}
.phone-fallback .pf-bars span{width:18px;background:linear-gradient(180deg,var(--accent),var(--accent-glow));border-radius:3px}

/* ============================================================
   SECTION 10: LIVE DASHBOARDS
   ============================================================ */
.dashboards-stage{
  position:relative;margin-top:4rem;height:580px;perspective:2000px;
}
.dash-card{
  position:absolute;width:62%;border-radius:1.1rem;
  background:#0F0F0E;border:1px solid var(--border-strong);
  box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden;
  transform-style:preserve-3d;will-change:transform;
}
.dash-card.d1{top:0;left:0;transform:rotate(-4deg);z-index:1}
.dash-card.d2{top:90px;left:25%;transform:rotate(2deg);z-index:2}
.dash-card.d3{top:180px;right:0;transform:rotate(-2deg);z-index:3}
.dash-fake{
  background:#0a0a09;height:340px;padding:1.4rem;color:#ddd;
  font-family:var(--font-m);font-size:.7rem;
}
.dash-fake .df-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:.85rem;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:1rem}
.dash-fake .df-title{font-family:var(--font-h);font-weight:700;font-size:.95rem;color:#fff}
.dash-fake .df-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1rem}
.dash-fake .df-col{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:.6rem;padding:.7rem}
.dash-fake .df-col .l{font-size:.55rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}
.dash-fake .df-col .v{font-family:var(--font-h);font-weight:700;font-size:1rem;color:#fff;margin-top:.3rem;letter-spacing:-.02em}
.dash-fake .df-col .v.acc{color:var(--accent)}
.dash-fake .df-col .v.suc{color:var(--success)}
.dash-fake .df-rows{display:flex;flex-direction:column;gap:.4rem}
.dash-fake .df-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:.5rem;padding:.5rem .65rem;background:rgba(255,255,255,.02);border-radius:.4rem;align-items:center}
.dash-fake .df-row .nm{color:#fff;font-family:var(--font-h);font-weight:500}
.dash-bar{height:5px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden}
.dash-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-soft));border-radius:100px}
.dash-callout{
  position:absolute;background:#0F0F0E;border:1px solid var(--border-accent);
  border-radius:.7rem;padding:.65rem 1rem;font-family:var(--font-m);
  font-size:.7rem;color:#fff;backdrop-filter:blur(12px);
  box-shadow:0 0 30px rgba(192,105,221,.3);z-index:10;
}
.dash-callout::before{
  content:'';position:absolute;width:8px;height:8px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 10px var(--accent);
  top:50%;transform:translateY(-50%);
}
.dash-callout.left::before{left:-12px}
.dash-callout.right::before{right:-12px}
.dash-callout.left{left:-180px}
.dash-callout.right{right:-180px}
.dash-callout .lab{font-size:.58rem;letter-spacing:.22em;color:var(--accent);text-transform:uppercase}
.dash-callout .val{font-family:var(--font-h);font-weight:700;font-size:1rem;color:#fff;margin-top:.2rem}

/* ============================================================
   SECTION 11: SYSTEM (TABS)
   ============================================================ */
.system-grid{display:grid;grid-template-columns:280px 1fr;gap:3rem;margin-top:3rem}
.tab-list{display:flex;flex-direction:column;gap:.45rem}
.tab-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:.85rem;padding:1.1rem 1.25rem;
  text-align:left;color:var(--muted);font-family:var(--font-h);
  font-weight:500;font-size:.95rem;display:flex;align-items:center;gap:.75rem;
  transition:all .35s var(--ease);position:relative;letter-spacing:-.01em;
}
.tab-btn .tnum{font-family:var(--font-m);font-size:.65rem;color:var(--subtle);letter-spacing:.2em}
.tab-btn:hover{color:#fff;border-color:var(--border-strong)}
.tab-btn.active{
  background:rgba(192,105,221,.08);border-color:var(--border-accent);
  color:#fff;box-shadow:inset 4px 0 0 var(--accent);
}
.tab-btn.active .tnum{color:var(--accent)}
.tab-panels{position:relative;min-height:380px}
.tab-panel{
  position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;gap:2rem;
  align-items:center;opacity:0;visibility:hidden;
  transition:opacity .5s var(--ease),visibility .5s var(--ease);
}
.tab-panel.active{opacity:1;visibility:visible}
.tab-panel-text h4{font-family:var(--font-h);font-weight:700;font-size:1.6rem;letter-spacing:-.02em;margin-bottom:1rem}
.tab-panel-text p{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:1.4rem}
.tab-panel-vis{
  height:320px;border-radius:var(--r-md);overflow:hidden;
  border:1px solid var(--border);
  background:radial-gradient(circle at 30% 30%,rgba(192,105,221,.15),transparent 60%),#0A0A09;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.tab-panel-vis i{width:100px;height:100px;color:var(--accent);filter:drop-shadow(0 0 30px var(--accent))}
.auto-stack{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-top:5rem}
.auto-card{
  background:var(--surface-glass);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:var(--r-md);
  padding:1.85rem 1.5rem;display:flex;flex-direction:column;gap:1rem;
  transition:all .5s var(--ease);position:relative;overflow:hidden;
}
.auto-card:hover{border-color:var(--border-accent);transform:translateY(-3px)}
.auto-icon{
  width:50px;height:50px;border-radius:1rem;
  background:linear-gradient(135deg,rgba(192,105,221,.15),rgba(192,105,221,.05));
  border:1px solid var(--border-accent);
  display:flex;align-items:center;justify-content:center;color:var(--accent);
}
.auto-icon i{width:22px;height:22px}
.auto-title{font-family:var(--font-h);font-weight:600;font-size:1.05rem;letter-spacing:-.01em}
.auto-desc{color:var(--muted);font-size:.85rem;line-height:1.6;flex:1}
.auto-stat{
  font-family:var(--font-m);font-size:.72rem;color:var(--accent);
  padding:.4rem .85rem;border-radius:100px;
  background:rgba(192,105,221,.08);border:1px solid var(--border-accent);
  align-self:flex-start;
}

/* ============================================================
   SECTION 12: FUNNEL + CHANNELS
   ============================================================ */
.funnel-stage{
  display:grid;grid-template-columns:1fr 2fr 1fr;gap:1.5rem;
  align-items:center;padding:1.85rem 2rem;
  background:var(--surface-glass);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:var(--r-md);
  margin-bottom:1rem;transition:all .5s var(--ease);
  position:relative;overflow:hidden;
}
.funnel-stage::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(192,105,221,.06),transparent);
  opacity:0;transition:opacity .5s var(--ease);
}
.funnel-stage:hover::before{opacity:1}
.funnel-stage:hover{border-color:var(--border-accent);transform:translateX(4px)}
.funnel-stage:nth-child(1){max-width:100%}
.funnel-stage:nth-child(2){max-width:85%;margin-left:auto;margin-right:auto}
.funnel-stage:nth-child(3){max-width:70%;margin-left:auto;margin-right:auto}

/* ============================================================
   HERO ANIMATIONS
   ============================================================ */
function setupHero() {
  // Particle field on canvas
  const canvas = $('#hero-canvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const pcount = window.innerWidth < 640 ? 40 : 100;
    const parts = Array.from({length:pcount}, () => ({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.5 + 0.4,
      vx: (Math.random()-0.5)*0.3,
      vy: (Math.random()-0.5)*0.3,
      a: Math.random()*0.6 + 0.2
    }));
    function drawParts() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      parts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${p.a})`;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
      });
      // connect close particles with lines
      for (let i = 0; i < parts.length; i++) {
        for (let j = i+1; j < parts.length; j++) {
          const dx = parts[i].x - parts[j].x;
          const dy = parts[i].y - parts[j].y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 110) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(192,105,221,${(1 - d/110)*0.18})`;
            ctx.lineWidth = 0.6;
            ctx.moveTo(parts[i].x, parts[i].y);
            ctx.lineTo(parts[j].x, parts[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(drawParts);
    }
    drawParts();
  }

  // Hero text reveal
  const tl = gsap.timeline({defaults:{ease:'power3.out'}});
  tl.from('.hero-eyebrow', {opacity:0, y:20, duration:.8})
    .from('.hero-company', {opacity:0, y:60, duration:1.2, scale:.96}, '-=.5')
    .from('.hero-subline', {opacity:0, y:20, duration:.8}, '-=.6')
    .from('.hero-stats > *', {opacity:0, y:20, stagger:.06, duration:.6}, '-=.4')
    .from('.hero-cta-row > *', {opacity:0, y:20, stagger:.1, duration:.6}, '-=.3')
    .from('.scroll-indicator', {opacity:0, duration:.6}, '-=.3')
    .from('.hero-top-meta', {opacity:0, y:-10, duration:.6}, '-=.8')
    .from('.hero-bottom-meta', {opacity:0, duration:.6}, '-=.4');

  // Hero parallax on scroll
  gsap.to('.hero-blob.b1', {x:-80, y:-50, scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:1}});
  gsap.to('.hero-blob.b2', {x:60, y:40, scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:1}});
  gsap.to('.hero-content', {y:120, opacity:0, scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:.8}});
  gsap.to('.hero-grid', {opacity:0.1, scale:1.2, scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:1}});
}

/* ============================================================
   STRATEGY PINNED STACKING
   ============================================================ */
function setupStrategy() {
  const cards = $$('.strategy-card');
  if (!cards.length) return;
  const N = cards.length;

  // initial positions - all stacked
  cards.forEach((c, i) => {
    gsap.set(c, {opacity: i === 0 ? 1 : 0, y: i === 0 ? 0 : 60, scale:1, filter:'blur(0px)', zIndex: 10 - i});
  });

  ScrollTrigger.create({
    trigger:'#strategy .strategy-stack',
    start:'top top',
    end:'bottom bottom',
    scrub:1,
    onUpdate: (self) => {
      // self.progress goes 0 to 1 across the entire stack height
      const p = self.progress * (N - 1); // 0 -> N-1
      cards.forEach((c, i) => {
        const local = p - i; // -∞ to +∞ where 0 is "this card centered"
        let opacity, y, scale, blur;
        if (local <= -1) {
          opacity = 0; y = 80; scale = 1; blur = 0;
        } else if (local <= 0) {
          // entering
          const t = local + 1; // 0 -> 1
          opacity = t;
          y = (1 - t) * 80;
          scale = 1;
          blur = 0;
        } else if (local <= 1) {
          // pinned then leaving
          const t = local; // 0 -> 1
          opacity = 1 - t * 0.6;
          y = -t * 30;
          scale = 1 - t * 0.08;
          blur = t * 6;
        } else {
          opacity = 0.4;
          y = -40;
          scale = 0.92;
          blur = 6;
        }
        gsap.set(c, {opacity, y, scale, filter:`blur(${blur}px)`});
      });
    }
  });
}
if (window.innerWidth > 640) setupStrategy();

/* ============================================================
   PROOF WALL COUNTERS
   ============================================================ */
$$('.proof-tile .pv').forEach(el => {
  const raw = el.dataset.target || el.textContent;
  ScrollTrigger.create({
    trigger:el, start:'top 90%', once:true,
    onEnter: () => animateValue(el, raw)
  });
});

function animateValue(el, raw) {
  // parse number, suffix, prefix
  const m = String(raw).match(/^([^\d]*)([\d.,]+)([^\d]*)$/);
  if (!m) { el.textContent = raw; return; }
  const prefix = m[1] || '';
  const suffix = m[3] || '';
  const numStr = m[2];
  const isFloat = numStr.includes('.');
  const target = parseFloat(numStr.replace(/,/g, ''));
  const obj = {n:0};
  gsap.to(obj, {
    n:target, duration:1.8, ease:'power2.out',
    onUpdate: () => {
      let v;
      if (isFloat) v = obj.n.toFixed(2);
      else v = Math.round(obj.n).toLocaleString();
      el.textContent = prefix + v + suffix;
    }
  });
}

      gsap.from(`${sel} .case-hero-metric`, {opacity:0, y:30, scale:.9, duration:.8, delay:.3, ease:'power3.out'});
      gsap.from(`${sel} .case-hero-label`, {opacity:0, y:20, duration:.6, delay:.5});
      gsap.from(`${sel} .case-submetrics > *`, {opacity:0, y:15, stagger:.08, duration:.5, delay:.7});
      gsap.from(`${sel} .case-story p`, {opacity:0, x:20*dir, stagger:.12, duration:.6, delay:.9});
      // wipe baf
      gsap.from(`${sel} .case-baf`, {opacity:0, y:30, duration:.7, delay:1.2});
      gsap.from(`${sel} .case-media-strip .ms`, {opacity:0, y:10, stagger:.06, duration:.4, delay:1.4});

      // bar animation
      $$(`${sel} .pf-bars span`).forEach((bar, i) => {
        const h = bar.style.height;
        bar.style.height = '0%';
        gsap.to(bar, {height:h, duration:.6, delay:.6 + i*0.07, ease:'power3.out'});
      });
    }
  });
  // parallax phone
  gsap.to(`${sel} .case-phone-wrap .phone-frame`, {y:-50, scrollTrigger:{trigger:sel, start:'top bottom', end:'bottom top', scrub:1}});
});

/* ============================================================
   DASHBOARDS ANIMATIONS
   ============================================================ */
ScrollTrigger.create({
  trigger:'#dashboards', start:'top 70%', once:true,
  onEnter: () => {
    gsap.from('.dash-card.d1', {x:-100, y:-30, opacity:0, rotation:-8, duration:1, ease:'power3.out'});
    gsap.from('.dash-card.d2', {y:60, opacity:0, rotation:6, duration:1, delay:.2, ease:'power3.out'});
    gsap.from('.dash-card.d3', {x:100, y:30, opacity:0, rotation:-6, duration:1, delay:.4, ease:'power3.out'});
    gsap.from('.dash-callout', {opacity:0, scale:.5, stagger:.18, duration:.6, delay:1, ease:'back.out(1.7)'});
    // animate dash bars
    gsap.from('.dash-bar span', {scaleX:0, transformOrigin:'left center', stagger:.04, duration:.7, delay:.5, ease:'power3.out'});
  }
});
// parallax shift
gsap.to('.dash-card.d1', {y:-60, scrollTrigger:{trigger:'#dashboards', start:'top bottom', end:'bottom top', scrub:1.2}});
gsap.to('.dash-card.d3', {y:60, scrollTrigger:{trigger:'#dashboards', start:'top bottom', end:'bottom top', scrub:1.2}});

/* ============================================================
   SYSTEM TABS
   ============================================================ */
$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const i = btn.dataset.tab;
    $$('.tab-btn').forEach(b => b.classList.remove('active'));
    $$('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const panel = $(`.tab-panel[data-panel="${i}"]`);
    panel.classList.add('active');
    gsap.fromTo(panel, {opacity:0, y:20}, {opacity:1, y:0, duration:.5, ease:'power3.out'});
  });
});
ScrollTrigger.create({
  trigger:'#system', start:'top 75%', once:true,
  onEnter: () => {
    gsap.from('.tab-btn', {opacity:0, x:-20, stagger:.08, duration:.5, ease:'power3.out'});
    gsap.from('.tab-panels', {opacity:0, y:20, duration:.7, delay:.3});
    gsap.from('.auto-card', {opacity:0, y:30, stagger:.1, duration:.6, delay:.6, ease:'power3.out'});
  }
});

/* ============================================================
   FUNNEL + CHANNELS
   ============================================================ */
ScrollTrigger.create({
  trigger:'#funnel', start:'top 75%', once:true,
  onEnter: () => {
    gsap.from('.funnel-stage', {opacity:0, x:-30, stagger:.18, duration:.7, ease:'power3.out'});
    gsap.from('.funnel-arrow', {opacity:0, scale:.5, stagger:.18, duration:.4, delay:.5, ease:'back.out(1.7)'});
  }
});
ScrollTrigger.create({
  trigger:'.channel-grid', start:'top 80%', once:true,
  onEnter: () => gsap.from('.channel-tile', {opacity:0, y:20, stagger:{each:.05, from:'start'}, duration:.5, ease:'power3.out'})
});

/* ============================================================
   MOCKS
   ============================================================ */
ScrollTrigger.create({
  trigger:'#mocks .mock-grid', start:'top 80%', once:true,
  onEnter: () => gsap.from('.mock-card', {opacity:0, scale:.85, y:30, stagger:.1, duration:.7, ease:'back.out(1.4)'})
});

/* ============================================================
   FEATURES
   ============================================================ */
ScrollTrigger.create({
  trigger:'#features', start:'top 75%', once:true,
  onEnter: () => {
    gsap.from('.feat-cat', {opacity:0, y:30, stagger:.12, duration:.7, ease:'power3.out'});
    gsap.from('.feat-list li', {opacity:0, x:-15, stagger:.04, duration:.4, delay:.4, ease:'power2.out'});
  }
});

/* ============================================================
   PRICING + ROI
   ============================================================ */
ScrollTrigger.create({
  trigger:'#pricing', start:'top 75%', once:true,
  onEnter: () => {
    gsap.from('.price-card', {opacity:0, y:50, stagger:.18, duration:.8, ease:'power3.out'});
    gsap.from('.roi-strip', {opacity:0, y:30, duration:.7, delay:.6});
    gsap.from('.roi-stat', {opacity:0, y:20, stagger:.12, duration:.5, delay:.8});
  }
});

/* ============================================================
   CLOSE
   ============================================================ */
ScrollTrigger.create({
  trigger:'#close', start:'top 70%', once:true,
  onEnter: () => {
    gsap.from('.close-headline', {opacity:0, y:40, duration:1, ease:'power3.out'});
    gsap.from('.close-sub', {opacity:0, y:20, duration:.7, delay:.3});
    gsap.from('.close-cta', {opacity:0, scale:.9, duration:.7, delay:.5, ease:'back.out(1.5)'});
    gsap.from('.contact-strip > *', {opacity:0, y:15, stagger:.08, duration:.5, delay:.8});
    gsap.from('.system-status, .tiny-credit', {opacity:0, y:10, stagger:.1, duration:.5, delay:1.1});
  }
});

/* ============================================================
   SECTION HEADLINE WORD-BY-WORD REVEAL
   ============================================================ */
$$('.section-headline').forEach(h => {
  ScrollTrigger.create({
    trigger:h, start:'top 85%', once:true,
    onEnter: () => {
      gsap.from(h, {opacity:0, y:30, duration:.9, ease:'power3.out'});
    }
  });
});
$$('.section-label, .drama').forEach(el => {
  ScrollTrigger.create({
    trigger:el, start:'top 90%', once:true,
    onEnter: () => gsap.from(el, {opacity:0, y:14, duration:.6, ease:'power3.out'})
  });
});

/* ============================================================
   Refresh ScrollTrigger after icons render
   ============================================================ */
setTimeout(() => ScrollTrigger.refresh(), 250);

</script>
</body>
</html>
