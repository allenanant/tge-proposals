<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Growth Engine · Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #FAF8F3;          /* warm paper base */
    --paper-2: #F2EFE7;
    --card: #FFFFFF;
    --ink: #17151B;            /* near-black ink */
    --ink-2: #45424D;
    --ink-3: #76737F;
    --ink-4: #A8A4AC;          /* faint, for big editorial numerals */
    --line: #E7E3D9;           /* hairline */
    --line-2: #D8D3C6;         /* slightly stronger hairline */
    --purple: #7C3AED;
    --purple-2: #C069DD;
    --purple-soft: #F4EEFC;
    --accent: #7C3AED;         /* overridden per-prospect via JS */
    --shadow-sm: 0 1px 2px rgba(22,21,26,.04), 0 4px 14px rgba(22,21,26,.05);
    --shadow-md: 0 2px 6px rgba(22,21,26,.05), 0 18px 50px rgba(22,21,26,.07);
    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 18px;

    /* ---- ONE editorial measure + grid ---- */
    --measure: 1100px;         /* the single content measure everything aligns to */
    --gutter: 40px;            /* page margin */
    --marker-col: 132px;       /* width of the left section-number column */
    --marker-gap: 40px;        /* gap between marker column and content */

    /* ---- type scale (modular, ~1.25) ---- */
    --t-eyebrow: 11.5px;
    --t-body: 16px;
    --t-body-lg: 18px;
    --t-h3: 21px;
    --t-h2: clamp(30px, 4.4vw, 46px);
    --t-display: clamp(42px, 6.4vw, 70px);

    /* ---- vertical rhythm scale ---- */
    --sp-sec: clamp(72px, 9vw, 116px);   /* between major sections */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  body::before {
    /* faint paper warmth, top-corner only. restrained. */
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(1100px 640px at 88% -12%, rgba(124,58,237,.045), transparent 62%);
    z-index: 0;
  }

  h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; font-weight: 600; line-height: 1.06; letter-spacing: -.025em; color: var(--ink); }

  /* the single content measure. everything lives inside .wrap so left edges align. */
  .wrap { max-width: var(--measure); margin: 0 auto; padding: 0 var(--gutter); position: relative; z-index: 1; }
  section { position: relative; z-index: 1; }

  .eyebrow {
    font-family: 'Outfit', sans-serif;
    font-size: var(--t-eyebrow); font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
    color: var(--ink-3);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .accent-text { color: var(--accent); }

  /* ---------- icons ---------- */
  .ic { display: inline-flex; flex: 0 0 auto; }
  .ic svg { display: block; width: 100%; height: 100%; }

  /* ---------- reveal motion (reveal-safe: visible without JS) ---------- */
  .reveal { opacity: 1; transform: none; }
  body.js-on .reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); will-change: opacity, transform; }
  body.js-on .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .reveal, body.js-on .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    html { scroll-behavior: auto; }
  }

  /* =========================================================
     SIGNATURE DETAIL (120%): the numbered section marker.
     A large light Fraunces numeral over a hairline rule + eyebrow.
     Repeated on every section. Establishes the editorial grid:
     a fixed marker column + content column, left edges locked.
     ========================================================= */
  .sec { padding: var(--sp-sec) 0; }
  .sec-grid {
    display: grid;
    grid-template-columns: var(--marker-col) minmax(0, 1fr);
    gap: var(--marker-gap);
    align-items: start;
  }
  .marker { position: relative; }
  .marker .num {
    font-family: 'Fraunces', Georgia, serif; font-weight: 300; font-style: normal;
    font-size: 64px; line-height: .8; letter-spacing: -.02em;
    color: var(--ink); font-variant-numeric: lining-nums;
  }
  .marker .num .slash { color: var(--accent); }
  .marker .rule { height: 1px; background: var(--line-2); margin: 18px 0 14px; }
  .marker .eyebrow { display: block; }
  .marker-sub { font-size: 13px; color: var(--ink-3); margin-top: 12px; max-width: 18ch; line-height: 1.45; }

  /* content column shared heading rhythm */
  .sec-content > .lead { max-width: 30ch; }
  h2.sec-title { font-size: var(--t-h2); letter-spacing: -.03em; margin: 0 0 18px; max-width: 18ch; }
  h2.sec-title .hl { color: var(--accent); }
  .sec-intro { color: var(--ink-2); font-size: var(--t-body-lg); max-width: 52ch; margin-bottom: 4px; }

  /* ================= COVER ================= */
  .cover { padding: 56px 0 8px; }
  .cover-top {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding-bottom: 30px; border-bottom: 1px solid var(--line);
  }
  .brandmark { display: flex; align-items: center; gap: 12px; }
  .brandmark .logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(150deg, var(--purple), var(--purple-2));
    display: grid; place-items: center; box-shadow: 0 6px 16px rgba(124,58,237,.26);
  }
  .brandmark .logo svg { width: 21px; height: 21px; }
  .brandmark .name { font-family: 'Outfit'; font-weight: 600; font-size: 16px; letter-spacing: -.01em; }
  .cover-prepared { text-align: right; font-size: 12px; color: var(--ink-3); line-height: 1.6; letter-spacing: .01em; }
  .cover-prepared b { color: var(--ink); font-weight: 600; display: block; font-family: 'Outfit'; }

  .cover-grid {
    display: grid; grid-template-columns: var(--marker-col) minmax(0, 1fr);
    gap: var(--marker-gap); align-items: start;
    padding: clamp(48px, 7vw, 92px) 0 clamp(40px, 5vw, 64px);
  }
  /* left rail on cover = oversized index numeral, ties cover into the system */
  .cover-rail .idx {
    font-family: 'Fraunces', Georgia, serif; font-weight: 300; font-size: 64px; line-height: .8;
    color: var(--ink);
  }
  .cover-rail .idx .slash { color: var(--accent); }
  .cover-rail .rule { height: 1px; background: var(--line-2); margin: 18px 0 14px; }
  .cover-rail .tag { font-family:'Outfit'; font-size: 11.5px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-3); }

  .cover-for {
    font-family: 'Outfit'; font-size: 13px; font-weight: 500; color: var(--ink-3);
    letter-spacing: .02em; margin-bottom: 20px;
  }
  .cover-for b { color: var(--accent); font-weight: 600; }
  h1.cover-title {
    font-size: var(--t-display); font-weight: 600; letter-spacing: -.04em;
    line-height: 1.0; margin-bottom: 26px; max-width: 15ch;
    overflow-wrap: break-word; hyphens: auto;
  }
  h1.cover-title .hl { color: var(--accent); }
  .cover-sub { font-size: clamp(17px, 2.1vw, 20px); color: var(--ink-2); max-width: 40ch; margin-bottom: 34px; line-height: 1.55; }
  .cover-meta { display: flex; flex-wrap: wrap; gap: 0; align-items: stretch; border-top: 1px solid var(--line); }
  .meta-chip {
    display: inline-flex; align-items: center; gap: 9px; font-size: 13.5px; color: var(--ink-2);
    padding: 14px 22px 14px 0; margin-right: 22px; border-right: 1px solid var(--line);
  }
  .meta-chip:last-child { border-right: none; margin-right: 0; }
  .meta-chip .ic { width: 15px; height: 15px; color: var(--accent); }

  /* ================= TRUST BAR ================= */
  .trust { padding: 8px 0 0; }
  .trust-press { padding: 30px 0 28px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .trust-press-head {
    display: grid; grid-template-columns: var(--marker-col) minmax(0,1fr); gap: var(--marker-gap);
    align-items: baseline; margin-bottom: 22px;
  }
  .trust-press .lbl {
    font-family: 'Outfit'; font-size: var(--t-eyebrow); font-weight: 600; letter-spacing: .2em;
    text-transform: uppercase; color: var(--ink-3);
  }
  .trust-press .lbl-note { font-size: 13px; color: var(--ink-3); }
  .press-row {
    display: grid; grid-template-columns: var(--marker-col) minmax(0,1fr); gap: var(--marker-gap);
  }
  .press-logos {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 16px 42px;
  }
  .press-logo {
    font-family: 'Outfit'; font-weight: 600; font-size: clamp(16px, 2.2vw, 22px);
    color: var(--ink); letter-spacing: -.01em; opacity: .78;
    white-space: nowrap;
  }
  .press-logo.serif { font-family: 'Fraunces', Georgia, serif; font-weight: 500; }
  .press-logo.caps { text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }

  .trust-chips {
    display: grid; grid-template-columns: var(--marker-col) repeat(3, minmax(0,1fr));
    gap: var(--marker-gap); align-items: end;
    padding: 40px 0 4px;
  }
  .trust-chips .chips-label {
    font-family:'Outfit'; font-size: var(--t-eyebrow); font-weight:600; letter-spacing:.2em;
    text-transform: uppercase; color: var(--ink-3); align-self: end; padding-bottom: 6px;
  }
  .trust-chip { padding-left: 0; }
  .trust-chip .val {
    font-family: 'Outfit'; font-weight: 700; font-size: clamp(34px, 4.6vw, 48px);
    letter-spacing: -.035em; line-height: 1; color: var(--ink);
  }
  .trust-chip .val .u { color: var(--accent); }
  .trust-chip .lbl { font-size: 13px; color: var(--ink-3); margin-top: 10px; max-width: 16ch; }

  /* ----- What we see (text-only, was the screenshot section) ----- */
  .seen-list { border-top: 1px solid var(--line); margin-top: 8px; }
  .seen {
    display: grid; grid-template-columns: 40px minmax(0,1fr); gap: 24px; align-items: baseline;
    padding: 22px 0; border-bottom: 1px solid var(--line);
  }
  .seen .sn { font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-size: 19px; color: var(--accent); line-height: 1.2; }
  .seen .st { font-family: 'Outfit'; font-weight: 500; font-size: clamp(16px, 1.9vw, 19px); color: var(--ink); letter-spacing: -.01em; }
  .seen-summary {
    font-family: 'Outfit'; font-weight: 400; font-size: clamp(20px, 2.6vw, 27px);
    line-height: 1.4; letter-spacing: -.02em; color: var(--ink); max-width: 24ch;
  }
  .seen-summary .em { color: var(--accent); }

  /* ----- Strategy: hairline-numbered pillars, no cards/gradient bg ----- */
  .badge-free {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(124,58,237,.2);
    border-radius: 999px; padding: 7px 15px;
    font-family: 'Outfit'; font-size: 12px; font-weight: 600; letter-spacing: .04em;
  }
  .badge-free .ic { width: 14px; height: 14px; color: var(--purple); }
  .pillars { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 0; border-top: 1px solid var(--line-2); margin-top: 40px; }
  .pillar { position: relative; padding: 30px 30px 30px 0; border-right: 1px solid var(--line); }
  .pillar:last-child { border-right: none; padding-right: 0; }
  .pillar:not(:first-child) { padding-left: 30px; }
  .pillar .num {
    font-family: 'Fraunces', Georgia, serif; font-weight: 300; font-size: 30px;
    color: var(--accent); line-height: 1; margin-bottom: 22px; display: block;
  }
  .pillar .pic { color: var(--accent); margin-bottom: 16px; }
  .pillar .pic .ic { width: 26px; height: 26px; }
  .pillar h3 { font-size: var(--t-h3); margin-bottom: 10px; letter-spacing: -.02em; }
  .pillar p { font-size: 15px; color: var(--ink-2); line-height: 1.6; }

  /* ----- Proof: real screenshots kept as imagery, calm editorial frame ----- */
  .proof-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
  .case {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md);
    overflow: hidden; box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
  }
  .case-shot { position: relative; aspect-ratio: 16/10.2; overflow: hidden; background: var(--paper-2); border-bottom: 1px solid var(--line); }
  .case-shot img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
  .case-shot .ph { position: absolute; inset: 0; display: grid; place-items: center; color: var(--ink-3); font-family: 'Outfit'; font-weight: 600; }
  .case-badge {
    position: absolute; top: 14px; left: 14px;
    background: rgba(255,255,255,.94); backdrop-filter: blur(6px);
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 13px;
    font-family: 'Outfit'; font-size: 11.5px; font-weight: 600; color: var(--ink-2);
  }
  .case-body { padding: 26px 28px 28px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
  .case-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .case-name { font-family: 'Outfit'; font-weight: 600; font-size: 19px; letter-spacing: -.01em; }
  .case-ind { font-size: 12.5px; color: var(--ink-3); margin-top: 3px; }
  .case-metric { text-align: right; flex: 0 0 auto; }
  .case-metric .v {
    font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-size: 38px; line-height: .9; letter-spacing: -.02em;
    color: var(--accent);
  }
  .case-metric .l { font-size: 10.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .1em; margin-top: 6px; }
  .case-result { font-size: 14.5px; color: var(--ink-2); line-height: 1.6; }
  .case-result b { color: var(--ink); font-weight: 600; }
  .case-subs { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; }
  .case-subs span {
    font-size: 12px; color: var(--ink-2); background: var(--paper-2);
    border: 1px solid var(--line); border-radius: 6px; padding: 5px 11px; font-weight: 500;
  }
  .case-press { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; padding-top: 14px; border-top: 1px solid var(--line); }
  .case-press .pl { font-family: 'Fraunces', Georgia, serif; font-weight: 500; font-size: 13px; color: var(--ink-3); }

  /* ----- Deliverables: hairline list, no cards ----- */
  .deliver-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 0; border-top: 1px solid var(--line-2); }
  .deliver {
    display: flex; align-items: center; gap: 16px;
    padding: 24px 28px 24px 0; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
  }
  .deliver:nth-child(3n) { border-right: none; padding-right: 0; }
  .deliver:not(:nth-child(3n)) { padding-right: 28px; }
  .deliver:nth-child(n+1):not(:nth-child(3n+1)) { padding-left: 28px; }
  .deliver .dic { color: var(--accent); }
  .deliver .dic .ic { width: 24px; height: 24px; }
  .deliver .dl { font-family: 'Outfit'; font-weight: 500; font-size: 15.5px; color: var(--ink); letter-spacing: -.01em; }

  /* ----- Pricing: 2 calm cards, hairline-led ----- */
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .price-card {
    background: var(--card); border: 1px solid var(--line-2); border-radius: var(--r-md);
    padding: 36px 34px 34px; position: relative; display: flex; flex-direction: column;
  }
  .price-card.featured { border-color: var(--accent); box-shadow: 0 24px 60px rgba(124,58,237,.1); }
  .price-tag {
    position: absolute; top: -12px; left: 34px;
    background: var(--accent); color: #fff;
    font-family: 'Outfit'; font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    padding: 5px 13px; border-radius: 999px;
  }
  .price-name { font-family: 'Outfit'; font-weight: 600; font-size: 13px; color: var(--ink-3); letter-spacing: .14em; text-transform: uppercase; }
  .price-amt { font-family: 'Outfit'; font-weight: 700; font-size: 50px; letter-spacing: -.035em; margin: 12px 0 2px; }
  .price-amt .per { font-size: 15px; font-weight: 500; color: var(--ink-3); letter-spacing: 0; }
  .price-rule { height: 1px; background: var(--line); margin: 24px 0; }
  .price-bullets { display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .price-bullets li { list-style: none; display: flex; align-items: flex-start; gap: 12px; font-size: 14.5px; color: var(--ink); }
  .price-bullets .chk { width: 19px; height: 19px; flex: 0 0 auto; color: var(--accent); display: grid; place-items: center; margin-top: 2px; }
  .price-bullets .chk .ic { width: 16px; height: 16px; }

  /* ----- Guarantee + CTA: editorial, one restrained tint ----- */
  .close { padding: var(--sp-sec) 0 clamp(80px, 9vw, 112px); }
  .close-card {
    background: var(--card); color: var(--ink);
    border: 1px solid var(--line-2); border-radius: var(--r-lg); overflow: hidden; position: relative;
  }
  .close-card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(180deg, var(--purple), var(--purple-2));
  }
  .close-inner { position: relative; padding: clamp(44px, 6vw, 64px) clamp(36px, 5vw, 60px); display: grid; grid-template-columns: 1.15fr .85fr; gap: 48px; align-items: center; }
  .guarantee-badge {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--purple-soft); border: 1px solid rgba(124,58,237,.2);
    border-radius: 999px; padding: 7px 15px; font-family: 'Outfit'; font-size: 12px; font-weight: 600;
    color: var(--purple); margin-bottom: 22px; letter-spacing: .03em;
  }
  .guarantee-badge .ic { width: 15px; height: 15px; color: var(--purple); }
  .close h2 { color: var(--ink); font-size: clamp(28px, 4vw, 40px); letter-spacing: -.03em; margin-bottom: 18px; max-width: 16ch; }
  .close .guarantee-line { color: var(--ink-2); font-size: 16.5px; max-width: 40ch; margin-bottom: 10px; line-height: 1.6; }
  .close .roi-line { color: var(--accent); font-size: 14.5px; font-family: 'Outfit'; font-weight: 500; }
  .close-cta { display: flex; flex-direction: column; gap: 22px; align-items: stretch; }
  .btn {
    display: inline-flex; align-items: center; gap: 11px; text-decoration: none;
    font-family: 'Outfit'; font-weight: 600; font-size: 16px;
    background: var(--accent); color: #fff; border-radius: 12px; padding: 17px 26px;
    box-shadow: 0 14px 34px rgba(124,58,237,.28); transition: transform .2s ease, box-shadow .2s ease;
    width: 100%; justify-content: center;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 20px 46px rgba(124,58,237,.36); }
  .btn .ic { width: 19px; height: 19px; color: #fff; }
  .sign { display: flex; align-items: center; gap: 14px; padding-top: 4px; border-top: 1px solid var(--line); margin-top: 2px; padding-top: 22px; }
  .sign .av {
    width: 46px; height: 46px; border-radius: 50%; flex: 0 0 auto;
    background: linear-gradient(150deg, var(--purple), var(--purple-2)); color: #fff;
    display: grid; place-items: center; font-family: 'Outfit'; font-weight: 700; font-size: 17px;
  }
  .sign .who { line-height: 1.4; }
  .sign .who .nm { font-family: 'Outfit'; font-weight: 600; font-size: 15px; color: var(--ink); }
  .sign .who .rl { font-size: 12.5px; color: var(--ink-3); }

  footer { padding: 34px 0 52px; border-top: 1px solid var(--line); }
  footer .foot-grid { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  footer .fbrand { font-family: 'Outfit'; font-weight: 600; color: var(--ink-2); font-size: 14px; }
  footer .fcontact { color: var(--ink-3); font-size: 12.5px; }
  footer a { color: var(--ink-3); text-decoration: none; }

  /* ================= RESPONSIVE ================= */
  @media (max-width: 940px) {
    :root { --marker-col: 96px; --marker-gap: 28px; --gutter: 32px; }
    .cover-grid { grid-template-columns: minmax(0, 1fr); gap: 18px; }
    .cover-grid > * { min-width: 0; }
    .cover-rail { display: flex; align-items: baseline; gap: 16px; }
    .cover-rail .rule { display: none; }
    .cover-rail .tag { margin-left: auto; }
    .proof-grid { grid-template-columns: 1fr; }
    .pillars { grid-template-columns: 1fr; border-top: none; margin-top: 28px; }
    .pillar { border-right: none; border-bottom: 1px solid var(--line); padding: 26px 0 !important; }
    .pillar:last-child { border-bottom: none; }
    .deliver-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .deliver { border-right: none !important; padding: 22px 0 !important; }
    .deliver:nth-child(odd) { border-right: 1px solid var(--line) !important; padding-right: 24px !important; }
    .deliver:nth-child(even) { padding-left: 24px !important; }
    .close-inner { grid-template-columns: 1fr; gap: 30px; }
  }
  @media (max-width: 640px) {

/* ============================================================
   HELPERS. defensive: missing field -> skip cleanly.
   ============================================================ */
const esc = (s) => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;');
const has = (v) => v !== undefined && v !== null && (typeof v !== 'string' || v.trim() !== '');
const arr = (v) => Array.isArray(v) ? v : [];

function pressClass(name) {
  const n = (name || '').toLowerCase();
  if (n.includes('daily mail') || n.includes('express') || n.includes('telegraph') || n.includes('times')) return 'serif';
  if (n.includes('sky') || n.includes('sun') || n.includes('bbc')) return 'caps';
  return '';
}

function initials(name) {
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'A';
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

/* ============================================================
   SECTION MARKER. the signature editorial detail, reused on every
   section: a large light serif numeral + hairline rule + eyebrow.
   Establishes the columnar grid (fixed marker column, left edges locked).
   ============================================================ */
function sectionMarker(num, eyebrow, sub) {
  return (
    '<div class="marker reveal">' +
      '<div class="num"><span class="slash">/</span>' + esc(num) + '</div>' +
      '<div class="rule"></div>' +
      '<div class="eyebrow">' + esc(eyebrow) + '</div>' +
      (has(sub) ? '<div class="marker-sub">' + esc(sub) + '</div>' : '') +
    '</div>'
  );
}

  );
}
function ringPath(cx, cy, r, op) {
  const o = op == null ? '' : ' stroke-opacity="' + op + '"';
  return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '"' + o + '/>';
}

/* ============================================================
   SECTION RENDERERS
   ============================================================ */
function renderCover(p, meta) {
  const promise = has(p.promise) ? p.promise : 'A growth system built around your business.';
  const titleHTML = esc(promise);

  const metaChips = [];
  if (has(p.industry)) metaChips.push(metaChip('sparkles', p.industry));
  if (has(p.location)) metaChips.push(metaChip('target', p.location));
  if (has(p.website)) metaChips.push(metaChip('search', cleanUrl(p.website)));

  const preparedFor = has(p.contact_name) ? p.contact_name : (has(p.company_name) ? p.company_name : '');

  return (
  '<section class="cover"><div class="wrap">' +
    '<div class="cover-top">' +
      '<div class="brandmark">' +
        '<div class="logo">' + icon('trending') + '</div>' +
        '<div class="name">The Growth Engine</div>' +
      '</div>' +
      '<div class="cover-prepared">' +
        'Prepared for' +
        (has(preparedFor) ? '<b>' + esc(preparedFor) + '</b>' : '') +
        (has(meta && meta.generated_at) ? esc(meta.generated_at) : '') +
      '</div>' +
    '</div>' +
    '<div class="cover-grid">' +
      '<div class="cover-rail reveal" aria-hidden="true">' +
        '<div class="idx"><span class="slash">/</span>01</div>' +
        '<div class="rule"></div>' +
        '<div class="tag">Proposal</div>' +
      '</div>' +
      '<div class="reveal">' +
        (has(p.company_name) ? '<div class="cover-for">A growth proposal for <b>' + esc(p.company_name) + '</b></div>' : '') +
        '<h1 class="cover-title">' + titleHTML + '</h1>' +
        (has(p.cover_sub) ? '<p class="cover-sub">' + esc(p.cover_sub) + '</p>' : '') +
        (metaChips.length ? '<div class="cover-meta">' + metaChips.join('') + '</div>' : '') +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}
function metaChip(ic, txt) {
  return '<span class="meta-chip">' + icon(ic) + esc(txt) + '</span>';
}
function cleanUrl(u) {
  return String(u || '').replace(/^https?:\/\//, '').replace(/\/$/, '');
}

function renderTrust(p, stat) {
  // press = from static drsw media; chips = prospect.result_chips (fallback to static proof_metrics)
  const cs = stat.case_studies || {};
  const press = arr(cs.drsw && cs.drsw.media);
  let chips = arr(p.result_chips).filter(c => has(c.value));
  if (chips.length < 2) {
    chips = arr(stat.proof_metrics).slice(0, 3);
  }
  chips = chips.slice(0, 3);
  if (!press.length && !chips.length) return '';

  // split a value like "20M+" into a numeral + trailing unit so the unit can take accent
  function splitVal(v) {
    const s = String(v == null ? '' : v);
    const m = s.match(/^([\d.,]+)(.*)$/);
    if (!m) return esc(s);
    return esc(m[1]) + (m[2] ? '<span class="u">' + esc(m[2]) + '</span>' : '');
  }

  const pressHTML = press.length ? (
    '<div class="trust-press reveal">' +
      '<div class="trust-press-head">' +
        '<div class="lbl">As featured in</div>' +
        '<div class="lbl-note">Client coverage earned through our work</div>' +
      '</div>' +
      '<div class="press-row">' +
        '<div></div>' +
        '<div class="press-logos">' +
          press.map(m => '<span class="press-logo ' + pressClass(m) + '">' + esc(m) + '</span>').join('') +
        '</div>' +
      '</div>' +
    '</div>'
  ) : '';

  const chipsHTML = chips.length ? (
    '<div class="trust-chips reveal">' +
      '<div class="chips-label">By the numbers</div>' +
      chips.map(c =>
        '<div class="trust-chip">' +
          '<div class="val">' + splitVal(c.value) + '</div>' +
          '<div class="lbl">' + esc(c.label) + '</div>' +
        '</div>'
      ).join('') +
    '</div>'
  ) : '';

  return (
  '<section class="trust"><div class="wrap">' +
    pressHTML + chipsHTML +
  '</div></section>'
  );
}

/* Text-only editorial read of the prospect. No screenshot, no frame.
   Built from read.summary (set as a large editorial statement) +
   read.signals (numbered, hairline-separated list). */
function renderStudy(p) {
  const read = p.read || {};
  const signals = arr(read.signals).slice(0, 4);
  if (!has(read.summary) && !signals.length) return '';

  // emphasize the closing clause of the summary in accent, kept defensive
  let summaryHTML = '';
  if (has(read.summary)) {
    const s = String(read.summary).trim();
    const cut = s.lastIndexOf('. ');
    if (cut > 0 && cut < s.length - 2) {
      summaryHTML = esc(s.slice(0, cut + 1)) + ' <span class="em">' + esc(s.slice(cut + 2)) + '</span>';
    } else {
      summaryHTML = esc(s);
    }
  }

  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-grid">' +
      sectionMarker('02', 'What we see', 'A short, honest read on where the growth is leaking.') +
      '<div class="sec-content">' +
        (summaryHTML ? '<p class="seen-summary reveal">' + summaryHTML + '</p>' : '') +
        (signals.length ? '<div class="seen-list reveal">' +
          signals.map((s, i) =>
            '<div class="seen">' +
              '<div class="sn">' + ('0' + (i + 1)) + '</div>' +
              '<div class="st">' + esc(s) + '</div>' +
            '</div>'
          ).join('') +
        '</div>' : '') +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}

function renderStrategy(p) {
  const s = p.strategy || {};
  const pillars = arr(s.pillars).slice(0, 3);
  if (!has(s.headline) && !pillars.length) return '';

  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-grid">' +
      sectionMarker('03', 'The strategy', 'Yours free, no catch. This is the plan we would run.') +
      '<div class="sec-content">' +
        '<span class="badge-free reveal">' + icon('gift') + 'Your free growth strategy</span>' +
        (has(s.headline) ? '<h2 class="sec-title reveal" style="margin-top:18px;">' + esc(s.headline) + '</h2>' : '') +
        (pillars.length ? '<div class="pillars reveal">' +
          pillars.map((pl, i) =>
            '<div class="pillar">' +
              '<span class="num">0' + (i + 1) + '</span>' +
              '<div class="pic">' + icon(pl.icon) + '</div>' +
              (has(pl.title) ? '<h3>' + esc(pl.title) + '</h3>' : '') +
              (has(pl.line) ? '<p>' + esc(pl.line) + '</p>' : '') +
            '</div>'
          ).join('') +
        '</div>' : '') +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}

function renderProof(stat) {
  const cs = stat.case_studies || {};
  const order = ['frenchify', 'drsw'];
  const cards = order.map(k => cs[k]).filter(Boolean);
  if (!cards.length) return '';

  function caseCard(c) {
    const subs = arr(c.sub_metrics).slice(0, 3);
    const press = arr(c.media).slice(0, 6);
    const phName = esc(c.name || 'Client');
    const img = has(c.image)
      ? '<img src="' + esc(c.image) + '" alt="' + esc(c.name) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'grid\';">' +
        '<div class="ph" style="display:none;">' + phName + '</div>'
      : '<div class="ph">' + phName + '</div>';
    const resultLine = (has(c.before) && has(c.after))
      ? '<div class="case-result"><b>From:</b> ' + esc(c.before) + '<br><b>To:</b> ' + esc(c.after) + '</div>'
      : '';
    return (
    '<div class="case reveal">' +
      '<div class="case-shot">' +
        (has(c.industry) ? '<div class="case-badge">' + esc(c.industry) + '</div>' : '') +
        img +
      '</div>' +
      '<div class="case-body">' +
        '<div class="case-top">' +
          '<div>' +
            '<div class="case-name">' + esc(c.name) + '</div>' +
          '</div>' +
          (has(c.hero_metric) ? '<div class="case-metric">' +
            '<div class="v">' + esc(c.hero_metric) + '</div>' +
            (has(c.hero_metric_label) ? '<div class="l">' + esc(c.hero_metric_label) + '</div>' : '') +
          '</div>' : '') +
        '</div>' +
        resultLine +
        (subs.length ? '<div class="case-subs">' + subs.map(m => '<span>' + esc(m) + '</span>').join('') + '</div>' : '') +
        (press.length ? '<div class="case-press">' + press.map(m => '<span class="pl">' + esc(m) + '</span>').join('') + '</div>' : '') +
      '</div>' +
    '</div>'
    );
  }

  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-grid">' +
      sectionMarker('04', 'Proof, not promises', 'Two businesses we grew from the ground up. The screenshots are theirs.') +
      '<div class="sec-content">' +
        '<h2 class="sec-title reveal">Real clients. <span class="hl">Real numbers.</span></h2>' +
        '<div class="proof-grid">' + cards.map(caseCard).join('') + '</div>' +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}

function renderDeliverables(p) {
  const items = arr(p.deliverables).slice(0, 6);
  if (!items.length) return '';
  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-grid">' +
      sectionMarker('05', 'What you get', 'A full team, one retainer. Nothing left for you to manage.') +
      '<div class="sec-content">' +
        '<h2 class="sec-title reveal">Everything, handled.</h2>' +
        '<div class="deliver-grid reveal">' +
          items.map(d =>
            '<div class="deliver">' +
              '<div class="dic">' + icon(d.icon) + '</div>' +
              '<div class="dl">' + esc(d.label) + '</div>' +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}

function renderPricing(p) {
  const pr = p.pricing || {};
  const g = pr.growth || {}, sc = pr.scale || {};
  const gBullets = arr(g.bullets), sBullets = arr(sc.bullets);
  if (!gBullets.length && !sBullets.length) return '';

  function card(tier, featured) {
    const name = has(tier.name) ? tier.name : (featured ? 'Scale' : 'Growth');
    const price = has(tier.price) ? tier.price : '';
    const bullets = arr(tier.bullets);
    return (
    '<div class="price-card ' + (featured ? 'featured' : '') + ' reveal">' +
      (featured ? '<div class="price-tag">Recommended</div>' : '') +
      '<div class="price-name">' + esc(name) + '</div>' +
      (has(price) ? '<div class="price-amt">' + esc(price) + '<span class="per"> /mo</span></div>' : '') +
      '<div class="price-rule"></div>' +
      '<ul class="price-bullets">' +
        bullets.map(b =>
          '<li><span class="chk">' + icon('check') + '</span>' + esc(b) + '</li>'
        ).join('') +
      '</ul>' +
    '</div>'
    );
  }

  return (
  '<section class="sec"><div class="wrap">' +
    '<div class="sec-grid">' +
      sectionMarker('06', 'Simple pricing', 'One flat monthly retainer. Cancel anytime, no lock-in.') +
      '<div class="sec-content">' +
        '<h2 class="sec-title reveal">Two ways to start.</h2>' +
        '<div class="price-grid reveal">' +
          card(g, false) +
          card(sc, true) +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}

  const guarantee = has(p.guarantee) ? p.guarantee : 'If we do not move the numbers, you do not pay.';
  const preparedBy = (meta && has(meta.prepared_by)) ? meta.prepared_by : 'Allen Anant Thomas';

  return (

      '<div class="close-inner">' +

          '<h2>Let us build this with you.</h2>' +

        '<div class="close-cta">' +

          '<div class="sign">' +
            '<div class="av">' + esc(initials(preparedBy)) + '</div>' +
            '<div class="who">' +
              '<div class="nm">' + esc(preparedBy) + '</div>' +
              '<div class="rl">Founder, The Growth Engine</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div></section>'
  );
}

function renderFooter(stat) {
  const c = (stat && stat.contact) || {};
  const bits = [];
  if (has(c.website)) bits.push(esc(c.website));
  if (has(c.email)) bits.push(esc(c.email));

    '</div>' +

  );

/* ============================================================
   BOOT
   ============================================================ */
function boot() {
  const cfg = (typeof CONFIG !== 'undefined' && CONFIG) ? CONFIG : {};
  const p = cfg.prospect || {};
  const stat = cfg.static || {};
  const meta = cfg.meta || {};

  // set accent hue from prospect
  const hue = (p.visual && has(p.visual.accent_hue)) ? p.visual.accent_hue : '#7C3AED';
  document.documentElement.style.setProperty('--accent', hue);

  const html = [
    renderCover(p, meta),
    renderTrust(p, stat),
    renderStudy(p),
    renderStrategy(p),
    renderProof(stat),
    renderDeliverables(p),
    renderPricing(p),
    renderClose(p, meta),
    renderFooter(stat)
  ].join('');

  document.getElementById('app').innerHTML = html;

  const els = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
  // forceShow makes content visible no matter what, via direct inline style
  // so it never depends on a class+transition resolving (bulletproof floor).
  const forceShow = () => els.forEach(el => {
    el.classList.add('in');
    el.style.opacity = '1';
    el.style.transform = 'none';
  });

  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce || !('IntersectionObserver' in window)) {
    forceShow();
    return;
  }

  // only NOW arm the hidden-then-animate behavior (CSS gated on body.js-on)
  document.body.classList.add('js-on');

  const io = new IntersectionObserver((entries, obs) => {
    entries.forEach(en => {
      if (en.isIntersecting) { en.target.classList.add('in'); obs.unobserve(en.target); }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  els.forEach(el => io.observe(el));

  // hard safety: if the observer never fires for off-screen items (print,
  // headless capture, no-scroll views), force EVERYTHING visible after 1.4s.
  setTimeout(forceShow, 1400);
  // and on print, reveal immediately so PDF/Cmd-P never drops a section
  if (window.matchMedia) {
    const mq = window.matchMedia('print');
    (mq.addEventListener ? mq.addEventListener('change', forceShow) : mq.addListener && mq.addListener(forceShow));
  }
  window.addEventListener('beforeprint', forceShow);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
