<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Growth Engine | Growth Proposal</title>
  <meta name="description" content="A private growth proposal prepared by The Growth Engine.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #FAF9F5;
      --paper-soft: #F2EFE8;
      --ink: #16151A;
      --muted: #6C6872;
      --faint: #DAD4C8;
      --line: rgba(22, 21, 26, 0.14);
      --purple: #7C3AED;
      --purple-soft: #C069DD;
      --white: #FFFFFF;
      --heading: "Outfit", system-ui, sans-serif;
      --body: "Hanken Grotesk", system-ui, sans-serif;
      --serif: "Fraunces", Georgia, serif;
      --max: 1180px;
      --gutter: clamp(22px, 5vw, 72px);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--paper);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(22, 21, 26, 0.045) 1px, transparent 1px) center top / calc((min(100vw, var(--max)) - 32px) / 12) 100%,
        radial-gradient(circle at 88% 8%, rgba(124, 58, 237, 0.055), transparent 28rem),
        var(--paper);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.55;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    .page {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 0 var(--gutter) 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: clamp(22px, 4vw, 38px) 0 clamp(46px, 7vw, 78px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--purple), var(--purple-soft));
      display: grid;
      place-items: center;
    }

    .brand-text {
      display: grid;
      gap: 1px;
      font-family: var(--heading);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand-text span:first-child {
      font-size: 15px;
    }

    .brand-text span:last-child {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--body);
      font-weight: 600;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .prepared {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-align: right;
      letter-spacing: 0;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .section {
      position: relative;
      display: grid;
      grid-template-columns: minmax(92px, 180px) minmax(0, 1fr);
      column-gap: clamp(22px, 5vw, 72px);
      padding: clamp(46px, 8vw, 88px) 0;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .section-number {
      min-width: 0;
    }

    .section-number span {
      display: block;
      color: rgba(22, 21, 26, 0.19);
      font-family: var(--serif);
      font-size: 96px;
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: 0;
    }

    .section-number::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: clamp(18px, 2vw, 28px);
      background: var(--line);
    }

    .section-body {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--purple);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1,
    h2,
    h3 {
      font-family: var(--heading);
      letter-spacing: 0;
      line-height: 0.98;
    }

    h1 {
      max-width: 900px;
      margin-bottom: 22px;
      font-size: 100px;
      font-weight: 800;
    }

    h1 .company {
      color: var(--purple);
      display: block;
    }

    .hero-line {
      max-width: 690px;
      margin-bottom: 30px;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.25;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 31px;
      padding: 6px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(250, 249, 245, 0.82);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .chip strong {
      color: var(--ink);
      font-weight: 800;
    }

    .brief-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 44px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .brief-item {
      min-height: 128px;
      padding: 21px 20px 20px 0;
      border-right: 1px solid var(--line);
    }

    .brief-item:nth-child(n + 2) {
      padding-left: 20px;
    }

    .brief-item:last-child {
      border-right: 0;
      padding-right: 0;
    }

    .brief-label {
      display: block;
      margin-bottom: 12px;
      color: var(--purple);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }

    .brief-item b {
      display: block;
      margin-bottom: 7px;
      font-family: var(--heading);
      font-size: 21px;
      line-height: 1.08;
    }

    .brief-item span:last-child {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.34;
    }

    .press-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .press-logo {
      min-height: 78px;
      display: grid;
      place-items: center;
      padding: 18px 14px;
      border-right: 1px solid var(--line);
      color: rgba(22, 21, 26, 0.68);
      text-align: center;
      font-family: var(--heading);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
    }

    .press-logo:last-child {
      border-right: 0;
    }

    .press-logo.daily {
      font-family: Georgia, serif;
      font-size: 23px;
      font-weight: 700;
    }

    .press-logo.sky {
      font-size: 29px;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .press-logo.sun {
      font-size: 22px;
      text-transform: uppercase;
    }

    .press-logo.tatler {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .press-logo.fabulous {
      font-size: 19px;
      font-style: italic;
      letter-spacing: 0;
    }

    .press-logo.express {
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 700;
    }

    .result-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 36px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .result {
      padding: 20px 22px 19px 0;
      border-right: 1px solid var(--line);
    }

    .result:last-child {
      border-right: 0;
      padding-right: 0;
      padding-left: 22px;
    }

    .result:nth-child(2) {
      padding-left: 22px;
    }

    .result b {
      display: block;
      margin-bottom: 3px;
      font-family: var(--heading);
      font-size: 46px;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .result span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      align-items: center;
    }

    .platform {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .platform svg {
      width: 21px;
      height: 21px;
      flex: 0 0 21px;
      color: var(--purple);
    }

    .trust-board {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: clamp(26px, 4vw, 48px);
      align-items: start;
      margin-top: 36px;
    }

    .trust-proof {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .trust-item {
      min-height: 124px;
      padding: 22px 18px 20px 0;
      border-right: 1px solid var(--line);
    }

    .trust-item:nth-child(n + 2) {
      padding-left: 18px;
    }

    .trust-item:last-child {
      border-right: 0;
      padding-right: 0;
    }

    .trust-item b {
      display: block;
      margin-bottom: 7px;
      font-family: var(--heading);
      font-size: 20px;
      line-height: 1.08;
    }

    .trust-item span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .trust-mini {
      border-top: 2px solid var(--ink);
    }

    .trust-mini h3 {
      margin: 18px 0 14px;
      font-size: 26px;
      line-height: 1.02;
    }

    .trust-mini p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .lead {
      max-width: 760px;
      margin-bottom: 34px;
      color: var(--ink);
      font-size: 36px;
      font-family: var(--heading);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead-small {
      max-width: 680px;
      margin-bottom: 32px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
    }

    .signals {
      display: grid;
      border-top: 1px solid var(--line);
    }

    .signal {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 22px 0;
      border-bottom: 1px solid var(--line);
    }

    .signal-index {
      color: var(--purple);
      font-family: var(--heading);
      font-size: 13px;
      font-weight: 800;
    }

    .signal b {
      display: block;
      margin-bottom: 3px;
      font-family: var(--heading);
      font-size: 19px;
      line-height: 1.2;
    }

    .signal span {
      color: var(--muted);
    }

    .diagnostic-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(260px, 0.82fr);
      gap: clamp(26px, 5vw, 56px);
      align-items: start;
      margin-top: 40px;
    }

    .visual-frame {
      min-width: 0;
      padding: 22px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .visual-frame svg {
      width: 100%;
      height: auto;
    }

    .opportunity-grid {
      display: grid;
      border-top: 1px solid var(--line);
    }

    .opportunity {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 14px;
      padding: 17px 0;
      border-bottom: 1px solid var(--line);
    }

    .opportunity strong {
      color: var(--purple);
      font-family: var(--heading);
      font-size: 13px;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .opportunity b {
      display: block;
      margin-bottom: 4px;
      font-family: var(--heading);
      font-size: 19px;
      line-height: 1.08;
    }

    .opportunity span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.34;
    }

    .strategy-header {
      max-width: 880px;
      margin-bottom: clamp(32px, 5vw, 54px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 11px;
      border: 1px solid rgba(124, 58, 237, 0.28);
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.06);
      color: var(--purple);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--purple);
    }

    .strategy-title {
      max-width: 900px;
      margin-bottom: 0;
      font-size: 74px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .pillars {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .pillar {
      padding: 30px 28px 30px 0;
      border-right: 1px solid var(--line);
    }

    .pillar:nth-child(2),
    .pillar:nth-child(3) {
      padding-left: 28px;
    }

    .pillar:last-child {
      border-right: 0;
      padding-right: 0;
    }

    .pillar-icon {
      width: 45px;
      height: 45px;
      display: grid;
      place-items: center;
      margin-bottom: 24px;
      border: 1px solid rgba(124, 58, 237, 0.25);
      border-radius: 999px;
      color: var(--purple);
    }

    .pillar-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .pillar h3 {
      max-width: 220px;
      margin-bottom: 9px;
      font-size: 30px;
      line-height: 1.02;
      font-weight: 800;
    }

    .pillar p {
      margin-bottom: 0;
      color: var(--muted);
      line-height: 1.42;
    }

    .engine-system {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr);
      gap: clamp(28px, 5vw, 58px);
      align-items: start;
      margin-top: 42px;
    }

    .engine-notes {
      display: grid;
      border-top: 1px solid var(--line);
    }

    .engine-note {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 14px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .engine-note i {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 50%;
      color: var(--purple);
      font-family: var(--heading);
      font-size: 12px;
      font-style: normal;
      font-weight: 800;
      line-height: 1;
    }

    .engine-note b {
      display: block;
      margin-bottom: 4px;
      font-family: var(--heading);
      font-size: 20px;
      line-height: 1.08;
    }

    .engine-note span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.34;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(22px, 4vw, 48px);
    }

    .case {
      min-width: 0;
    }

    .case-art {
      position: relative;
      min-height: 290px;
      display: flex;
      align-items: flex-end;
      margin-bottom: 22px;
      padding: 24px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(250, 249, 245, 0.95), rgba(242, 239, 232, 0.85)),
        repeating-linear-gradient(90deg, rgba(22, 21, 26, 0.08) 0 1px, transparent 1px 34px);
    }

    .case-art::before {
      content: "";
      position: absolute;
      inset: 22px 22px auto auto;
      width: 86px;
      height: 86px;
      border: 1px solid rgba(124, 58, 237, 0.32);
      border-radius: 50%;
    }

    .case-art::after {
      content: "";
      position: absolute;
      left: 24px;
      top: 24px;
      width: 118px;
      height: 8px;
      background: linear-gradient(90deg, var(--purple), var(--purple-soft));
      border-radius: 999px;
    }

    .case-art span {
      position: relative;
      z-index: 1;
      color: var(--ink);
      font-family: var(--heading);
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 0.95;
    }

    .case h3 {
      margin-bottom: 8px;
      font-size: 24px;
      line-height: 1.05;
    }

    .case p {
      margin-bottom: 15px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.4;
    }

    .case-learning {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 34px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .learning-item {
      min-height: 110px;
      padding: 20px 18px 18px 0;
      border-right: 1px solid var(--line);
    }

    .learning-item:nth-child(n + 2) {
      padding-left: 18px;
    }

    .learning-item:last-child {
      border-right: 0;
      padding-right: 0;
    }

    .learning-item b {
      display: block;
      margin-bottom: 6px;
      font-family: var(--heading);
      font-size: 20px;
      line-height: 1.08;
    }

    .learning-item span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.34;
    }

    .deliverables {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
    }

    .deliverable {
      min-height: 134px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 24px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-family: var(--heading);
      font-size: 19px;
      font-weight: 800;
      line-height: 1.12;
    }

    .deliverable svg {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      color: var(--purple);
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .service-map {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .service-lane {
      min-width: 0;
      padding: 26px 24px 28px 0;
      border-right: 1px solid var(--line);
    }

    .service-lane:nth-child(n + 2) {
      padding-left: 24px;
    }

    .service-lane:last-child {
      border-right: 0;
      padding-right: 0;
    }

    .service-lane h3 {
      margin-bottom: 15px;
      font-size: 25px;
      line-height: 1.02;
    }

    .lane-tag {
      display: inline-flex;
      margin-bottom: 18px;
      color: var(--purple);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .service-list {
      display: grid;
      border-top: 1px solid var(--line);
    }

    .service-item {
      display: grid;
      gap: 4px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .service-item b {
      font-family: var(--heading);
      font-size: 15px;
      line-height: 1.15;
    }

    .service-item span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.32;
    }

    .asset-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .scope-matrix {
      margin-top: 34px;
      border-top: 2px solid var(--ink);
      border-bottom: 1px solid var(--line);
    }

    .scope-row {
      display: grid;
      grid-template-columns: minmax(150px, 0.8fr) repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .scope-row:last-child {
      border-bottom: 0;
    }

    .scope-cell {
      min-width: 0;
      padding: 16px 15px 15px 0;
      border-right: 1px solid var(--line);
    }

    .scope-cell:nth-child(n + 2) {
      padding-left: 15px;
    }

    .scope-cell:last-child {
      border-right: 0;
      padding-right: 0;
    }

    .scope-head .scope-cell {
      color: var(--purple);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .scope-cell b {
      display: block;

      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: clamp(24px, 4vw, 54px);

      padding: clamp(34px, 5vw, 58px) 0 0;
      border-top: 2px solid var(--ink);
    }

    .risk {
      max-width: 760px;

      font-size: 68px;
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: 0;

      margin-bottom: 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }

    .signature strong {
      color: var(--ink);
    }

    .button-wrap {
      display: grid;
      justify-items: start;
      gap: 15px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 54px;

      color: var(--white);

      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      transition: transform 180ms ease, background 180ms ease;
    }

      transform: translateY(-2px);
      background: var(--purple);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .micro {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .next-steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 38px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .next-step {
      min-height: 118px;
      padding: 22px 18px 20px 0;
      border-right: 1px solid var(--line);
    }

    .next-step:nth-child(n + 2) {
      padding-left: 18px;
    }

    .next-step:last-child {
      border-right: 0;
      padding-right: 0;
    }

    .next-step strong {
      display: inline-flex;
      margin-bottom: 12px;
      color: var(--purple);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }

    .next-step b {
      display: block;
      margin-bottom: 6px;
      font-family: var(--heading);
      font-size: 20px;
      line-height: 1.08;
    }

    .next-step span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.34;
    }

    .js .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .js .section:first-of-type.reveal {
      opacity: 1;
      transform: none;
    }

    .js .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .cta,
      .js .reveal {
        transition: none;
      }

      .js .reveal {
        opacity: 1;
        transform: none;
      }
    }

/* ============================================================
   SECTION SHELL. Numbers are assigned at assembly time so the
   sequence stays continuous even if a section is skipped.
   ============================================================ */
function sectionShell(num, labelledBy, bodyHTML) {
  const n = num < 10 ? '0' + num : String(num);
  return '<section class="section reveal"' + (labelledBy ? ' aria-labelledby="' + labelledBy + '"' : '') + '>' +
    '<div class="section-number" aria-hidden="true"><span>/' + n + '</span></div>' +
    '<div class="section-body">' + bodyHTML + '</div>' +
  '</section>';
}

/* ============================================================
   SECTION RENDERERS. Each returns the section BODY html (or ''
   to skip). Per-lead copy from p (CONFIG.prospect), shared
   proof from stat (CONFIG.static), links from meta.
   ============================================================ */
function topbarHTML(p, meta) {
  const who = has(p.contact_name) ? p.contact_name : (has(p.company_name) ? p.company_name : '');
  const date = fmtDate(meta && meta.generated_at);
  let prepared = '';
  if (has(who)) {
    prepared = 'Prepared for ' + esc(who) + (date ? ' &middot; ' + esc(date) : '');
  } else if (date) {
    prepared = esc(date);
  }
  return '<header class="topbar" aria-label="Proposal header">' +
    '<span class="brand" aria-label="The Growth Engine">' +
      '<span class="brand-mark" aria-hidden="true">' + BRAND_MARK + '</span>' +
      '<span class="brand-text"><span>The Growth Engine</span><span>Performance marketing</span></span>' +
    '</span>' +
    (prepared ? '<div class="prepared">' + prepared + '</div>' : '') +
  '</header>';
}

function coverBody(p) {
  const company = has(p.company_name) ? p.company_name : 'your business';
  const chips = [];
  if (has(p.industry)) chips.push('<span class="chip"><strong>Industry</strong>&nbsp; ' + esc(p.industry) + '</span>');
  if (has(p.website)) chips.push('<span class="chip"><strong>Website</strong>&nbsp; ' + esc(cleanUrl(p.website)) + '</span>');
  if (has(p.focus)) chips.push('<span class="chip"><strong>Focus</strong>&nbsp; ' + esc(p.focus) + '</span>');

  const tiles = arr(p.cover_brief).slice(0, 4).filter(t => has(t && t.title));
  const briefHTML = tiles.length ? (

function proofBody(stat) {
  const cs = (stat && stat.case_studies) || {};
  const order = ['frenchify', 'drsw'];
  const cases = order.map(k => ({ key: k, c: cs[k] })).filter(x => x.c);
  if (!cases.length) return '';

  function caseCard(key, c) {
    const name = has(c.name) ? c.name : 'Client';
    const line = CASE_LINES[key] || (arr(c.story)[1] || '');
    const chips = [];
    if (has(c.hero_metric)) {
      chips.push('<span class="chip"><strong>' + esc(c.hero_metric) + '</strong>&nbsp; ' +
        esc(String(c.hero_metric_label || 'result').toLowerCase()) + '</span>');
    }
    arr(c.sub_metrics).slice(0, 2).forEach(m => {
      chips.push('<span class="chip">' + esc(m) + '</span>');
    });

    // Placeholder-first: the styled art box is the default; the real client
    // photo (plus scrim) only switches on when the image actually loads, so a
    // missing or stalled asset can never leave a broken dark box.
    const artInner = has(c.image)
      ? '<img src="' + esc(c.image) + '" alt="" ' +
          'onload="var a=this.closest(\'.case-art\'); if(a)a.classList.add(\'has-img\');" ' +
          'onerror="this.remove();">' +
        '<div class="scrim" aria-hidden="true"></div>' +
        '<span>' + esc(name) + '</span>'
      : '<span>' + esc(name) + '</span>';

    return '<article class="case">' +
      '<div class="case-art" role="img" aria-label="' + esc(name) + ' results">' + artInner + '</div>' +
      '<h3>' + esc(name) + '</h3>' +
      (has(line) ? '<p>' + esc(line) + '</p>' : '') +
      (chips.length ? '<div class="chips">' + chips.join('') + '</div>' : '') +
    '</article>';
  }

  return '<p class="eyebrow">Proof</p>' +
    '<h2 id="proof-title" class="lead">Two examples of strategy becoming visible growth.</h2>' +
    '<div class="case-grid">' + cases.map(x => caseCard(x.key, x.c)).join('') + '</div>' +
    '<div class="case-learning" aria-label="Proof patterns we reuse">' +
      LEARNINGS.map(l => '<div class="learning-item"><b>' + esc(l.title) + '</b><span>' + esc(l.line) + '</span></div>').join('') +
    '</div>';
}

/* ============================================================
   BOOT. Build all sections, number them continuously, mount,
   then arm the reveal with the bulletproof visibility floor
   (forceShow safety + print handlers), same as v3.
   ============================================================ */
function boot() {
  const cfg = (typeof CONFIG !== 'undefined' && CONFIG) ? CONFIG : {};
  const p = cfg.prospect || {};
  const stat = cfg.static || {};
  const meta = cfg.meta || {};

  // This is a TGE document: the accent stays TGE purple no matter what.
  document.documentElement.style.setProperty('--purple', '#7C3AED');
  if (has(p.company_name)) {
    document.title = 'The Growth Engine | ' + p.company_name + ' Proposal';
  }

  const parts = [
    { id: 'cover-title', body: coverBody(p) },
    { id: 'trust-title', body: trustBody(p, stat) },
    { id: 'see-title', body: diagnosisBody(p) },
    { id: 'strategy-title', body: strategyBody(p) },
    { id: 'proof-title', body: proofBody(stat) },
    { id: 'get-title', body: getBody() },
    { id: 'funnel-title', body: funnelBody(p) },
    { id: 'rollout-title', body: rolloutBody(p) },
    { id: 'pricing-title', body: pricingBody(p) },
    { id: 'cta-title', body: ctaBody(p, meta) }
  ].filter(x => has(x.body));

  const sections = parts.map((x, i) => sectionShell(i + 1, x.id, x.body)).join('');

  document.getElementById('app').innerHTML =
    '<main class="page">' + topbarHTML(p, meta) + sections + footerHTML(stat) + '</main>';

  // Reveal-on-scroll with a hard visibility floor: content can never stay
  // hidden (print, headless capture, broken IO, reduced motion all safe).
  const els = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
  const forceShow = () => els.forEach(el => {
    el.classList.add('is-visible');
    el.style.opacity = '1';
    el.style.transform = 'none';
  });

  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce || !('IntersectionObserver' in window)) {
    forceShow();
    return;
  }

  document.documentElement.classList.add('js');
  const io = new IntersectionObserver((entries, obs) => {
    entries.forEach(en => {
      if (en.isIntersecting) { en.target.classList.add('is-visible'); obs.unobserve(en.target); }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  els.forEach(el => io.observe(el));

  setTimeout(forceShow, 1400);
  if (window.matchMedia) {
    const mq = window.matchMedia('print');
    (mq.addEventListener ? mq.addEventListener('change', forceShow) : (mq.addListener && mq.addListener(forceShow)));
  }
  window.addEventListener('beforeprint', forceShow);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
