<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Dashboard | The Growth Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:#0D0D0C;color:#FFFFFF;font-family:'Hanken Grotesk',sans-serif;line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* ===== TOKENS ===== */
:root{
  --bg:#0D0D0C;--bg-2:#0A0A09;
  --surface:#141414;--surface-2:#191919;--surface-3:#222222;--surface-glass:rgba(22,22,22,0.55);
  --accent:#C069DD;--accent-glow:#9B3FC7;--accent-bright:#D48EF0;
  --success:#22C55E;--success-soft:rgba(34,197,94,0.08);
  --warning:#F59E0B;--warning-soft:rgba(245,158,11,0.08);
  --danger:#EF4444;--danger-soft:rgba(239,68,68,0.08);
  --info:#38BDF8;--info-soft:rgba(56,189,248,0.08);
  --text:#FFFFFF;--muted:#888888;--subtle:#555555;
  --border:rgba(255,255,255,0.06);--border-strong:rgba(255,255,255,0.10);--border-glow:rgba(192,105,221,0.18);
  --font-heading:'Outfit',sans-serif;
  --font-body:'Hanken Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-serif:'Instrument Serif',serif;
  --radius:1.25rem;
  --radius-lg:2rem;
  --radius-xl:2.5rem;
  --shadow-card:0 4px 24px rgba(0,0,0,0.3),0 1px 4px rgba(0,0,0,0.2);
  --shadow-hover:0 12px 48px rgba(0,0,0,0.4),0 4px 12px rgba(0,0,0,0.3);
  --glow-accent:0 0 60px rgba(192,105,221,0.18);
}

/* ===== SCROLL PROGRESS ===== */
#scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-bright),var(--accent-glow));width:0;z-index:10000;box-shadow:0 0 12px var(--accent)}

/* ===== NOISE OVERLAY ===== */
#noise-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.03;mix-blend-mode:overlay}

/* ===== BG MESH ===== */
.bg-mesh{position:fixed;inset:0;z-index:-1;pointer-events:none;background:
  radial-gradient(900px 600px at 90% -10%, rgba(192,105,221,0.10), transparent 60%),
  radial-gradient(700px 500px at -10% 30%, rgba(155,63,199,0.08), transparent 60%),
  radial-gradient(600px 400px at 50% 110%, rgba(56,189,248,0.04), transparent 60%);
}

/* ===== LAYOUT ===== */
.container{max-width:1280px;margin:0 auto;padding:0 1.75rem}
.section{padding:7rem 0;position:relative}
.section.tight{padding:5rem 0}
.section-label{font-family:var(--font-mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.25em;color:var(--accent);margin-bottom:0.75rem;display:inline-flex;align-items:center;gap:0.6rem}
.section-label::before{content:'';width:18px;height:1px;background:var(--accent);display:inline-block}
.section-headline{font-family:var(--font-heading);font-size:clamp(2rem,4.6vw,3.4rem);font-weight:700;line-height:1.1;margin-bottom:1rem;letter-spacing:-0.025em}
.section-sub{color:var(--muted);font-size:1.05rem;max-width:680px;margin-bottom:3rem}
.section-headline .accent{color:var(--accent)}
.drama{font-family:var(--font-heading);font-weight:600;color:var(--accent);font-size:clamp(1.2rem,2.2vw,1.6rem);margin-top:2.5rem;display:block;letter-spacing:-0.015em}

/* ===== BENTO PRIMITIVES ===== */
.bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.bento-rows-180 .cell{min-height:180px}
.bento-rows-220 .cell{min-height:220px}
.cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;position:relative;overflow:hidden;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),border-color 0.4s,box-shadow 0.4s}
.cell:hover{transform:translateY(-3px);border-color:var(--border-strong);box-shadow:var(--shadow-hover)}
.cell.flat:hover{transform:none;box-shadow:none}
.cell.accent{background:linear-gradient(140deg,rgba(192,105,221,0.10),rgba(192,105,221,0.02) 60%,transparent);border-color:var(--border-glow)}
.cell.success{background:linear-gradient(140deg,rgba(34,197,94,0.10),rgba(34,197,94,0.02) 60%,transparent);border-color:rgba(34,197,94,0.18)}
.cell.warning{background:linear-gradient(140deg,rgba(245,158,11,0.10),rgba(245,158,11,0.02) 60%,transparent);border-color:rgba(245,158,11,0.18)}
.cell.danger{background:linear-gradient(140deg,rgba(239,68,68,0.10),rgba(239,68,68,0.02) 60%,transparent);border-color:rgba(239,68,68,0.18)}
.cell.dark{background:#0F0F0E;border-color:var(--border)}
.cell.image{padding:0}
.cell.image img{width:100%;height:100%;object-fit:cover;display:block;border-radius:calc(var(--radius) - 1px)}

/* span helpers */
.c-3{grid-column:span 3}.c-4{grid-column:span 4}.c-5{grid-column:span 5}.c-6{grid-column:span 6}.c-7{grid-column:span 7}.c-8{grid-column:span 8}.c-9{grid-column:span 9}.c-12{grid-column:span 12}
.r-2{grid-row:span 2}.r-3{grid-row:span 3}

/* ===== STATUS PILL / DOT ===== */
.status-pill{display:inline-flex;align-items:center;gap:0.5rem;padding:0.35rem 0.85rem;border-radius:100px;font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.05em;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted)}
.status-pill.live{color:var(--success);background:var(--success-soft);border-color:rgba(34,197,94,0.18)}
.status-pill.warn{color:var(--warning);background:var(--warning-soft);border-color:rgba(245,158,11,0.18)}
.status-pill.danger{color:var(--danger);background:var(--danger-soft);border-color:rgba(239,68,68,0.18)}
.status-pill.accent{color:var(--accent);background:rgba(192,105,221,0.06);border-color:rgba(192,105,221,0.18)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--muted)}
.dot.live{background:var(--success);box-shadow:0 0 10px rgba(34,197,94,0.5);animation:pulse 1.8s ease-in-out infinite}
.dot.warn{background:var(--warning);box-shadow:0 0 10px rgba(245,158,11,0.5)}
.dot.danger{background:var(--danger);box-shadow:0 0 10px rgba(239,68,68,0.5)}
.dot.accent{background:var(--accent);box-shadow:0 0 10px rgba(192,105,221,0.5)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.55;transform:scale(0.85)}}

/* ===== METRIC TYPOGRAPHY ===== */
.metric{font-family:var(--font-mono);font-weight:700;line-height:0.95;letter-spacing:-0.02em}
.metric-xl{font-size:clamp(3rem,7vw,5rem)}
.metric-lg{font-size:clamp(2rem,4vw,3rem)}
.metric-md{font-size:clamp(1.4rem,2.4vw,1.9rem)}
.metric-sm{font-size:1.1rem}
.metric-label{font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);margin-top:0.6rem}
.cell-eyebrow{font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--subtle);margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between}
.cell-eyebrow .right{color:var(--muted)}

/* ===== SPARKLINE ===== */
.sparkline{width:100%;height:60px;display:block;margin-top:0.6rem}
.sparkline path.area{fill:url(#spark-grad);opacity:0.55}
.sparkline path.line{stroke-width:2;fill:none}
.sparkline circle{fill:#fff}

/* ===== PROGRESS BAR (HORIZONTAL) ===== */
.progress{position:relative;height:6px;border-radius:100px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:0.6rem}
.progress > span{position:absolute;inset:0;border-radius:100px;background:linear-gradient(90deg,var(--accent),var(--accent-bright));width:0;transition:width 1.4s cubic-bezier(0.16,1,0.3,1)}
.progress.success > span{background:linear-gradient(90deg,var(--success),#86EFAC)}
.progress.warning > span{background:linear-gradient(90deg,var(--warning),#FCD34D)}
.progress.danger > span{background:linear-gradient(90deg,var(--danger),#FCA5A5)}

/* ===== HERO ===== */
#hero{min-height:100dvh;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-start;padding:3rem 3rem 4.5rem;position:relative;overflow:hidden}
.hero-rule{position:absolute;top:2.5rem;left:3rem;right:3rem;height:1px;background:rgba(255,255,255,0.08);z-index:1}
.hero-mark{position:absolute;top:2.75rem;left:3rem;font-family:var(--font-heading);font-weight:500;font-size:0.78rem;color:rgba(255,255,255,0.92);letter-spacing:0.18em;text-transform:uppercase;z-index:3}
.hero-mark sup{font-family:var(--font-mono);font-weight:400;font-size:0.55rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-left:0.6rem;vertical-align:super;top:-0.3em;position:relative}
.hero-folio{position:absolute;top:2.95rem;right:3rem;font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;z-index:3}
.hero-content{position:relative;z-index:2;width:100%;max-width:1280px;margin:0 auto}
.hero-eyebrow-clean{font-family:var(--font-mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.32em;color:var(--muted);margin-bottom:2.25rem}
.hero-display{font-family:var(--font-heading);font-size:clamp(3.5rem,11vw,9.5rem);font-weight:800;line-height:0.95;letter-spacing:-0.035em;color:#fff;margin-bottom:2.5rem;max-width:1180px}
.hero-display em{font-style:normal;font-weight:800;background:linear-gradient(180deg,#E5BFF1 0%,var(--accent) 55%,var(--accent-glow) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.hero-subline-clean{font-family:var(--font-body);font-size:clamp(1.05rem,1.4vw,1.25rem);line-height:1.55;color:rgba(255,255,255,0.7);font-weight:400;max-width:560px;margin-bottom:4.5rem}
.hero-stats-row{display:flex;gap:3.5rem;margin-bottom:4rem;flex-wrap:wrap;align-items:flex-end;padding-top:2.5rem;border-top:1px solid rgba(255,255,255,0.08);max-width:760px}
.hero-stat{display:flex;flex-direction:column;gap:0.4rem}
.hero-stat .num{font-family:var(--font-heading);font-size:1.85rem;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.02em}
.hero-stat .lbl{font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.22em;color:var(--muted)}
.hero-cta-row-clean{display:flex;flex-wrap:wrap;align-items:center;gap:2rem}
.hero-cta-row-clean .tagged{font-family:var(--font-body);font-weight:400;font-size:0.92rem;color:var(--muted)}
.hero-colophon{position:absolute;bottom:2.5rem;right:3rem;font-family:var(--font-body);font-size:0.85rem;color:rgba(255,255,255,0.78);text-align:right;line-height:1.5;z-index:3}
.hero-colophon .label{font-family:var(--font-mono);font-size:0.55rem;text-transform:uppercase;letter-spacing:0.25em;color:var(--subtle);display:block;margin-bottom:0.4rem}
.hero-colophon strong{font-family:var(--font-heading);font-weight:600;color:#fff}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.95rem 2rem;border-radius:100px;font-family:var(--font-heading);font-weight:600;font-size:0.95rem;cursor:pointer;border:none;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-glow));color:#fff;box-shadow:0 4px 24px rgba(192,105,221,0.3),inset 0 1px 0 rgba(255,255,255,0.1)}
.btn-primary:hover{transform:scale(1.04) translateY(-2px);box-shadow:0 8px 40px rgba(192,105,221,0.5),inset 0 1px 0 rgba(255,255,255,0.1)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border-strong)}
.btn-outline:hover{border-color:var(--accent);transform:scale(1.03)}
.btn-mono{font-family:var(--font-mono);font-weight:500;letter-spacing:0.03em}

/* ===== AUDIT ===== */
.audit-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.audit-screenshot-cell{grid-column:span 7;grid-row:span 2;padding:0;overflow:hidden;background:#0A0A09}
.audit-screenshot{position:relative;width:100%;height:100%;min-height:420px;background:linear-gradient(135deg,#141414,#0a0a0a);display:flex;align-items:center;justify-content:center;color:var(--subtle);font-family:var(--font-mono);font-size:0.75rem}
.audit-screenshot .placeholder-grid{position:absolute;inset:38px 0 0 0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;opacity:0.6}
.audit-screenshot .site-skel{position:absolute;inset:38px 0 38px 0;padding:1.4rem 1.6rem;display:flex;flex-direction:column;gap:1.1rem;pointer-events:none}
.site-skel-nav{display:flex;align-items:center;justify-content:space-between;padding-bottom:0.85rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.site-skel-nav .logo{width:90px;height:14px;background:rgba(255,255,255,0.18);border-radius:3px}
.site-skel-nav .nav-items{display:flex;gap:0.7rem}
.site-skel-nav .nav-items span{width:46px;height:8px;background:rgba(255,255,255,0.08);border-radius:3px}
.site-skel-hero{margin-top:0.4rem;display:flex;flex-direction:column;gap:0.6rem}
.site-skel-hero .h1{width:78%;height:22px;background:rgba(255,255,255,0.16);border-radius:4px}
.site-skel-hero .h1-2{width:54%;height:22px;background:rgba(255,255,255,0.16);border-radius:4px}
.site-skel-hero .sub{width:60%;height:8px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:0.4rem}
.site-skel-hero .sub-2{width:48%;height:8px;background:rgba(255,255,255,0.08);border-radius:3px}
.site-skel-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-top:auto}
.site-skel-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:0.85rem;display:flex;flex-direction:column;gap:0.45rem;min-height:70px}
.site-skel-card .ico{width:18px;height:18px;background:rgba(255,255,255,0.18);border-radius:4px}
.site-skel-card .ttl{width:70%;height:8px;background:rgba(255,255,255,0.14);border-radius:3px;margin-top:0.3rem}
.site-skel-card .ln{width:90%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px}
.site-skel-card .ln-2{width:65%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px}
.audit-screenshot .browser-bar-mini{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:0.4rem;padding:0.6rem 0.9rem;background:rgba(0,0,0,0.6);border-bottom:1px solid var(--border);z-index:2}
.audit-screenshot .dot-rgba{width:8px;height:8px;border-radius:50%}
.audit-screenshot .url-bar{flex:1;font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);background:rgba(255,255,255,0.04);padding:0.2rem 0.6rem;border-radius:4px;margin-left:0.4rem}
.audit-screenshot .canvas{position:absolute;inset:38px 0 0 0}
.audit-dot{position:absolute;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;font-family:var(--font-mono);cursor:pointer;transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);z-index:3}
.audit-dot:hover{transform:scale(1.4)}
.audit-dot.warning{background:var(--warning);color:#000;box-shadow:0 0 16px rgba(245,158,11,0.5)}
.audit-dot.danger{background:var(--danger);color:#fff;box-shadow:0 0 16px rgba(239,68,68,0.5)}
.audit-dot::after{content:'';position:absolute;inset:-6px;border:1px solid currentColor;border-radius:50%;opacity:0.4;animation:ping 2s ease-out infinite}
@keyframes ping{0%{transform:scale(0.8);opacity:0.7}100%{transform:scale(1.6);opacity:0}}
.audit-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);border-radius:0.6rem;padding:0.5rem 0.85rem;font-size:0.7rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:10}
.audit-dot:hover .audit-tooltip{opacity:1}

/* ring score */
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.5rem}
.ring{position:relative;width:140px;height:140px}
.ring svg{transform:rotate(-90deg);width:100%;height:100%}
.ring .ring-bg{stroke:rgba(255,255,255,0.06);fill:none;stroke-width:10}
.ring .ring-fg{stroke:url(#ring-grad);fill:none;stroke-width:10;stroke-linecap:round;stroke-dasharray:0 1000;transition:stroke-dasharray 1.5s cubic-bezier(0.16,1,0.3,1)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-family:var(--font-mono);font-size:2.2rem;font-weight:700;line-height:1}
.ring-label{font-family:var(--font-mono);font-size:0.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.18em;margin-top:0.2rem}

.audit-finding-row{display:flex;align-items:flex-start;gap:0.7rem;padding:0.55rem 0;border-bottom:1px dashed var(--border);font-size:0.85rem;color:var(--muted);line-height:1.4}
.audit-finding-row:last-child{border-bottom:none}
.audit-finding-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;font-family:var(--font-mono);margin-top:1px}
.audit-finding-num.danger{background:var(--danger);color:#fff}
.audit-finding-num.warning{background:var(--warning);color:#000}
.audit-finding-sev{margin-left:auto;font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em}
.audit-finding-sev.danger{color:var(--danger)}
.audit-finding-sev.warning{color:var(--warning)}

/* ===== PROBLEMS BENTO ===== */
.problems-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.problem-cell{padding:1.6rem;display:flex;flex-direction:column;justify-content:space-between;min-height:240px;position:relative;overflow:hidden}
.problem-cell .pcell-num{position:absolute;top:1rem;right:1.25rem;font-family:var(--font-mono);font-size:5rem;font-weight:800;line-height:1;color:rgba(255,255,255,0.04);letter-spacing:-0.03em;pointer-events:none}
.problem-cell .pcell-statement{font-family:var(--font-heading);font-size:1.1rem;font-weight:600;line-height:1.35;letter-spacing:-0.01em;margin-bottom:0.5rem;position:relative;z-index:1}
.problem-cell .pcell-context{font-size:0.85rem;color:var(--muted);line-height:1.55;margin-bottom:1rem;position:relative;z-index:1}
.problem-cell .pcell-data{font-family:var(--font-mono);font-size:0.78rem;color:var(--warning);background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);padding:0.45rem 0.85rem;border-radius:100px;display:inline-flex;align-items:center;gap:0.5rem;align-self:flex-start;position:relative;z-index:1}
.problem-cell.danger .pcell-data{color:var(--danger);background:var(--danger-soft);border-color:rgba(239,68,68,0.15)}

/* ===== COMPETITORS ===== */
.comp-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.comp-stack-cell{padding:0;overflow:hidden}
.comp-stack-cell .head{display:grid;grid-template-columns:1.6fr repeat(3,1fr);gap:0;padding:0.85rem 1.25rem;background:rgba(0,0,0,0.45);border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em}
.comp-stack-cell .head .you{color:var(--accent)}
.comp-stack-cell .row{display:grid;grid-template-columns:1.6fr repeat(3,1fr);align-items:center;padding:0.7rem 1.25rem;border-bottom:1px solid var(--border);font-size:0.85rem}
.comp-stack-cell .row:last-child{border-bottom:none}
.comp-stack-cell .row .feat{color:var(--text);font-weight:500}
.comp-stack-cell .row .col{text-align:center;font-family:var(--font-mono);font-size:0.85rem}
.comp-stack-cell .row .col.you{background:rgba(192,105,221,0.05)}
.check{color:var(--success);font-weight:700;font-size:1rem;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--success-soft);border:1px solid rgba(34,197,94,0.18)}
.cross{color:rgba(239,68,68,0.6);font-weight:700;font-size:1rem;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--danger-soft);border:1px solid rgba(239,68,68,0.15)}

.comp-coverage-cell .donut{position:relative;width:100%;display:flex;justify-content:center;margin:0.5rem 0 1rem}
.comp-coverage-cell .donut svg{width:140px;height:140px;transform:rotate(-90deg)}
.comp-coverage-cell .donut .seg{fill:none;stroke-width:14}
.comp-coverage-cell .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.coverage-legend{display:flex;flex-direction:column;gap:0.45rem;font-size:0.78rem;color:var(--muted);font-family:var(--font-mono)}
.coverage-legend .lg-row{display:flex;align-items:center;gap:0.55rem}
.coverage-legend .lg-row .swatch{width:10px;height:10px;border-radius:3px}

.gap-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem;margin-top:1.5rem}
.gap-cell{padding:1.5rem;grid-column:span 4}
.gap-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;color:var(--danger);margin-bottom:0.4rem}
.gap-title{font-family:var(--font-heading);font-weight:600;font-size:1rem;margin-bottom:0.4rem}
.gap-desc{color:var(--muted);font-size:0.85rem;line-height:1.55}

/* ===== ROADMAP TIMELINE ===== */
.roadmap-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.timeline-cell{grid-column:span 12;padding:1.5rem 1.25rem 1rem;background:linear-gradient(180deg,rgba(192,105,221,0.06),transparent);border:1px solid var(--border-glow)}
.timeline-bar{position:relative;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 1rem 0.5rem}
.timeline-bar::before{content:'';position:absolute;top:calc(1.5rem + 8px);left:1rem;right:1rem;height:2px;background:linear-gradient(90deg,var(--accent),var(--success),var(--warning),#8B5CF6);opacity:0.35;z-index:0}
.tl-step{position:relative;z-index:1;text-align:center;flex:1}
.tl-dot{width:18px;height:18px;border-radius:50%;margin:0 auto 0.5rem;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--border)}
.tl-dot.w1{background:var(--accent)}
.tl-dot.w2{background:var(--success)}
.tl-dot.w3{background:var(--warning)}
.tl-dot.w4{background:#8B5CF6}
.tl-week{font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.18em}
.tl-title{font-family:var(--font-heading);font-weight:600;font-size:0.9rem;margin-top:0.2rem}
.week-cell{grid-column:span 3;padding:1.4rem;display:flex;flex-direction:column}
.week-pill{display:inline-flex;align-items:center;gap:0.4rem;font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);background:rgba(255,255,255,0.04);padding:0.3rem 0.7rem;border-radius:100px;align-self:flex-start;margin-bottom:0.85rem}
.week-pill .dot{width:6px;height:6px}
.week-title{font-family:var(--font-heading);font-weight:600;font-size:1rem;margin-bottom:0.85rem}
.week-items{list-style:none;display:flex;flex-direction:column;gap:0.4rem;font-size:0.78rem;color:var(--muted);margin-bottom:1rem}
.week-items li{padding-left:0.9rem;position:relative;line-height:1.4}
.week-items li::before{content:'+';position:absolute;left:0;color:var(--accent);font-family:var(--font-mono);font-weight:600}
.week-count{font-family:var(--font-mono);font-size:0.7rem;color:var(--accent);background:rgba(192,105,221,0.08);padding:0.3rem 0.75rem;border-radius:100px;align-self:flex-start;margin-top:auto}
.roadmap-total-cell{grid-column:span 12;text-align:center;padding:2.5rem 1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;background:radial-gradient(circle at 50% 50%,rgba(192,105,221,0.08),transparent 70%);border:1px solid var(--border-glow)}

/* ===== STRATEGY CARDS ===== */
.strategy-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.strategy-cell{grid-column:span 12;padding:2.4rem;display:grid;grid-template-columns:auto 1fr 240px;gap:2rem;align-items:center;position:relative;overflow:hidden}
.strategy-bg-num{position:absolute;top:-30px;right:1rem;font-family:var(--font-heading);font-size:11rem;font-weight:900;color:rgba(255,255,255,0.025);line-height:1;pointer-events:none;letter-spacing:-0.04em}
.strategy-num-block{font-family:var(--font-mono);font-size:1rem;color:var(--accent);font-weight:600}
.strategy-num-block .lg{font-family:var(--font-heading);font-size:3rem;font-weight:800;color:var(--text);display:block;line-height:1;margin-top:0.25rem;letter-spacing:-0.03em}
.strategy-body .strategy-title{font-family:var(--font-heading);font-size:1.5rem;font-weight:700;margin-bottom:0.85rem;letter-spacing:-0.015em}
.strategy-body .strategy-bullets{list-style:none;display:flex;flex-direction:column;gap:0.4rem}
.strategy-body .strategy-bullets li{font-size:0.9rem;color:var(--muted);padding-left:1rem;position:relative}
.strategy-body .strategy-bullets li::before{content:'+';position:absolute;left:0;color:var(--accent);font-family:var(--font-mono);font-weight:600}
.strategy-result{display:flex;flex-direction:column;align-items:flex-end;gap:0.6rem;padding:1.25rem;border-radius:1rem;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15)}
.strategy-result .label{font-family:var(--font-mono);font-size:0.6rem;color:var(--success);text-transform:uppercase;letter-spacing:0.18em}
.strategy-result .val{font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:var(--text);text-align:right;line-height:1.3}

/* ===== PROOF WALL BENTO ===== */
.proof-bento{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:160px;gap:0.85rem}
.proof-bento .cell{display:flex;flex-direction:column;justify-content:space-between;padding:1.4rem}
.proof-bento .cell.center{justify-content:center;align-items:flex-start}

/* ===== CASE STUDIES ===== */
.case-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.case-hero-cell{grid-column:span 5;grid-row:span 3;padding:0;overflow:hidden;background:#0A0A09}
.case-hero-cell .phone{padding:1.5rem;display:flex;align-items:center;justify-content:center;height:100%;min-height:480px}
.phone-frame{background:#0F0F0E;border-radius:2rem;padding:8px;border:2px solid rgba(255,255,255,0.08);max-width:280px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.phone-screen{border-radius:1.6rem;overflow:hidden;background:var(--surface-2);aspect-ratio:9/19;position:relative;display:flex;flex-direction:column}
.phone-screen .pf-stub{flex:1;background:linear-gradient(160deg,#1a1a1a,#0a0a0a);display:flex;align-items:center;justify-content:center;color:var(--subtle);font-family:var(--font-mono);font-size:0.65rem;text-align:center;padding:1rem}
.phone-screen img{width:100%;height:100%;object-fit:cover}

.case-metric-cell{padding:1.6rem;display:flex;flex-direction:column;justify-content:space-between}
.case-metric-cell .industry{font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.18em}
.case-metric-cell h3{font-family:var(--font-heading);font-size:1.2rem;font-weight:700;margin:0.4rem 0 0.85rem}
.case-metric-cell .case-hero-num{font-family:var(--font-mono);font-size:clamp(2.5rem,5vw,3.6rem);font-weight:700;color:var(--accent);line-height:1}
.case-metric-cell .case-hero-num-label{font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-top:0.4rem}

.case-story-cell{padding:1.6rem}
.case-story-cell p{color:var(--muted);font-size:0.85rem;line-height:1.65;margin-bottom:0.7rem}
.case-story-cell p:last-child{margin-bottom:0}

.case-ba-cell{padding:1.4rem;display:flex;flex-direction:column;gap:0.85rem;justify-content:center}
.case-ba-row{padding:0.85rem 1rem;border-radius:0.85rem;font-size:0.78rem;line-height:1.5}
.case-ba-row.before{background:var(--danger-soft);border:1px solid rgba(239,68,68,0.15);color:rgba(239,68,68,0.9)}
.case-ba-row.after{background:var(--success-soft);border:1px solid rgba(34,197,94,0.15);color:rgba(34,197,94,0.95)}
.case-ba-row .ba-label{font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.18em;opacity:0.7;margin-bottom:0.25rem;display:block}

.case-media-cell{padding:1.4rem;display:flex;flex-wrap:wrap;gap:0.4rem;align-content:flex-start}
.case-media-cell .label{font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.18em;width:100%;margin-bottom:0.5rem}

/* ===== DASHBOARDS ===== */
.dash-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.dash-img-cell{padding:0;overflow:hidden;background:#0A0A09;display:flex;align-items:center;justify-content:center;color:var(--subtle);font-family:var(--font-mono);font-size:0.7rem;min-height:240px;position:relative}
.dash-img-cell .placeholder-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:30px 30px}
.dash-img-cell img{width:100%;height:100%;object-fit:cover}
.dash-callout-cell{display:flex;flex-direction:column;justify-content:center}

/* ===== SYSTEM PILLARS BENTO ===== */
.system-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.pillar-cell{grid-column:span 4;padding:1.6rem;display:flex;flex-direction:column;gap:0.6rem;min-height:220px;position:relative;overflow:hidden}
.pillar-cell .pillar-num{font-family:var(--font-mono);font-size:0.65rem;color:var(--accent);letter-spacing:0.15em}
.pillar-cell .pillar-title{font-family:var(--font-heading);font-size:1.1rem;font-weight:700;letter-spacing:-0.01em}
.pillar-cell .pillar-desc{color:var(--muted);font-size:0.85rem;line-height:1.55;flex:1}
.pillar-cell .pillar-stat{display:flex;align-items:baseline;gap:0.5rem;font-family:var(--font-mono);margin-top:auto}
.pillar-cell .pillar-stat .num{font-size:1.5rem;font-weight:700;color:var(--text)}
.pillar-cell .pillar-stat .lbl{font-size:0.7rem;color:var(--muted)}
.pillar-cell .pillar-bar{height:5px;border-radius:100px;background:rgba(255,255,255,0.05);overflow:hidden;margin-top:0.5rem}
.pillar-cell .pillar-bar > span{display:block;height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent),var(--accent-bright));width:0;transition:width 1.4s cubic-bezier(0.16,1,0.3,1)}

/* automation grid */
.auto-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem;margin-top:2rem}
.auto-cell{grid-column:span 3;padding:1.4rem;display:flex;flex-direction:column;gap:0.6rem;min-height:180px}
.auto-cell .auto-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(192,105,221,0.08);border:1px solid var(--border-glow);color:var(--accent)}
.auto-cell .auto-icon i{width:16px;height:16px}
.auto-title{font-family:var(--font-heading);font-weight:600;font-size:0.95rem}
.auto-desc{color:var(--muted);font-size:0.8rem;line-height:1.5;flex:1}
.auto-stat{font-family:var(--font-mono);font-size:0.7rem;color:var(--success);background:var(--success-soft);padding:0.3rem 0.75rem;border-radius:100px;align-self:flex-start;border:1px solid rgba(34,197,94,0.15)}

/* ===== CAMPAIGN ARCHITECTURE ===== */
.camp-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.funnel-cell{grid-column:span 12;padding:2rem;display:flex;flex-direction:column;gap:0.7rem}
.funnel-row{display:flex;align-items:center;gap:1.25rem;padding:1.1rem 1.5rem;border-radius:1rem;border:1px solid var(--border);background:linear-gradient(90deg,rgba(255,255,255,0.025),transparent)}
.funnel-row .stage-num{font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);width:32px}
.funnel-row .stage-name{font-family:var(--font-heading);font-weight:700;font-size:1.1rem;min-width:140px}
.funnel-row .stage-desc{color:var(--muted);font-size:0.85rem;flex:1}
.funnel-row .stage-pct{font-family:var(--font-mono);font-size:0.85rem;color:var(--accent)}
.funnel-row.s1{background:linear-gradient(90deg,rgba(192,105,221,0.10),transparent);border-color:rgba(192,105,221,0.18)}
.funnel-row.s2{background:linear-gradient(90deg,rgba(245,158,11,0.10),transparent);border-color:rgba(245,158,11,0.18);width:88%;margin-left:auto;margin-right:auto;align-self:center}
.funnel-row.s3{background:linear-gradient(90deg,rgba(34,197,94,0.10),transparent);border-color:rgba(34,197,94,0.18);width:74%;margin-left:auto;margin-right:auto;align-self:center}

.channel-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.7rem;margin-top:1.5rem}
.channel-cell{grid-column:span 4;padding:1.1rem;display:flex;align-items:center;gap:0.85rem;border:1px solid var(--border)}
.channel-cell.active{background:rgba(192,105,221,0.06);border-color:var(--border-glow);box-shadow:0 0 30px rgba(192,105,221,0.08)}
.channel-cell .ch-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:1px solid var(--border)}
.channel-cell.active .ch-icon{background:rgba(192,105,221,0.12);border-color:var(--border-glow);color:var(--accent)}
.channel-cell .ch-icon i{width:16px;height:16px}
.channel-cell .ch-name{font-family:var(--font-heading);font-weight:600;font-size:0.85rem}
.channel-cell .ch-role{font-size:0.7rem;color:var(--muted);margin-top:0.15rem}
.channel-cell .ch-status{margin-left:auto;font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--subtle)}
.channel-cell.active .ch-status{color:var(--success)}

/* ===== DELIVERABLES ===== */
.deliverables-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.deliverable-cell{grid-column:span 4;padding:1.6rem;min-height:200px;display:flex;flex-direction:column;gap:0.7rem;position:relative;overflow:hidden}
.del-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.del-icon i{width:18px;height:18px}
.del-icon.reel{background:rgba(224,64,251,0.08);color:#E040FB;border-color:rgba(224,64,251,0.18)}
.del-icon.ad{background:rgba(255,109,0,0.08);color:#FF6D00;border-color:rgba(255,109,0,0.18)}
.del-icon.email{background:rgba(0,188,212,0.08);color:#00BCD4;border-color:rgba(0,188,212,0.18)}
.del-icon.landing{background:rgba(192,105,221,0.08);color:var(--accent);border-color:var(--border-glow)}
.del-icon.whatsapp{background:var(--success-soft);color:var(--success);border-color:rgba(34,197,94,0.18)}
.del-icon.calendar{background:var(--warning-soft);color:var(--warning);border-color:rgba(245,158,11,0.18)}
.del-platform{font-family:var(--font-mono);font-size:0.6rem;color:var(--subtle);text-transform:uppercase;letter-spacing:0.18em}
.del-title{font-family:var(--font-heading);font-weight:600;font-size:1rem}
.del-desc{font-size:0.85rem;color:var(--muted);line-height:1.55;flex:1}

/* ===== FEATURES BENTO ===== */
.features-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem}
.feat-stack-cell{grid-column:span 6;padding:1.7rem;min-height:280px}
.feat-stack-cell .head{display:flex;align-items:center;gap:0.7rem;margin-bottom:1.25rem}
.feat-stack-cell .head .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(192,105,221,0.08);border:1px solid var(--border-glow);color:var(--accent)}
.feat-stack-cell .head .ic i{width:16px;height:16px}
.feat-stack-cell .head .ttl{font-family:var(--font-heading);font-weight:700;font-size:1rem}
.feat-stack-cell .head .ct{margin-left:auto;font-family:var(--font-mono);font-size:0.7rem;color:var(--accent);background:rgba(192,105,221,0.06);border:1px solid rgba(192,105,221,0.15);padding:0.25rem 0.6rem;border-radius:100px}
.feat-stack-cell ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:0.45rem 1.25rem}
.feat-stack-cell li{font-size:0.8rem;color:var(--muted);padding-left:1rem;position:relative;line-height:1.45}
.feat-stack-cell li::before{content:'+';position:absolute;left:0;color:var(--accent);font-family:var(--font-mono);font-weight:600}

.feat-counter-cell{grid-column:span 12;padding:2rem 2.5rem;display:grid;grid-template-columns:auto 1fr;align-items:center;gap:2.5rem;background:radial-gradient(circle at 0% 50%,rgba(192,105,221,0.08),transparent 60%);border-color:var(--border-glow)}
.feat-counter-cell .big{font-family:var(--font-mono);font-size:clamp(3rem,6vw,5rem);font-weight:800;color:var(--accent);line-height:1;letter-spacing:-0.03em}
.feat-counter-cell p{color:var(--muted);font-size:1.05rem;line-height:1.55}

/* ===== PRICING ===== */
.pricing-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:0.85rem;max-width:1100px;margin:0 auto}
.price-cell{grid-column:span 6;padding:2.2rem;position:relative;overflow:hidden;display:flex;flex-direction:column}
.price-cell.recommended{border-color:var(--border-glow);box-shadow:0 0 50px rgba(192,105,221,0.08)}
.price-cell.recommended::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-bright))}
.price-badge{position:absolute;top:1.25rem;right:1.25rem;font-family:var(--font-mono);font-size:0.6rem;background:linear-gradient(135deg,var(--accent),var(--accent-glow));color:#fff;padding:0.3rem 0.7rem;border-radius:100px;letter-spacing:0.1em;text-transform:uppercase}
.price-name{font-family:var(--font-heading);font-size:0.9rem;font-weight:600;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.15em}
.price-amount{font-family:var(--font-heading);font-size:clamp(2.4rem,4.5vw,3.2rem);font-weight:800;letter-spacing:-0.03em;line-height:1}
.price-period{font-size:0.85rem;color:var(--subtle);margin:0.4rem 0 1.5rem}
.price-features{list-style:none;display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.75rem;flex:1}
.price-features li{font-size:0.85rem;color:var(--muted);display:flex;align-items:center;gap:0.55rem;line-height:1.45}
.price-features li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--success);box-shadow:0 0 6px rgba(34,197,94,0.45);flex-shrink:0}

.roi-cell{grid-column:span 12;margin-top:0.5rem;padding:1.75rem 2rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;background:linear-gradient(135deg,rgba(34,197,94,0.06),rgba(192,105,221,0.04));border-color:rgba(34,197,94,0.18)}
.roi-cell .roi-block{display:flex;flex-direction:column;gap:0.4rem;padding-right:1.25rem;border-right:1px solid var(--border)}
.roi-cell .roi-block:last-child{border-right:none;padding-right:0}
.roi-cell .roi-label{font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em}
.roi-cell .roi-val{font-family:var(--font-mono);font-size:clamp(1.4rem,2.4vw,2rem);font-weight:700;letter-spacing:-0.02em}
.roi-cell .roi-val.green{color:var(--success)}
.roi-cell .roi-val.accent{color:var(--accent)}

/* ===== CLOSE ===== */

// inline SVG sparkline. data is 0..1 normalized array.
function sparkline(points, opts={}) {
  const w = opts.w || 220, h = opts.h || 56, color = opts.color || '#C069DD', grad = opts.grad || 'spark-grad';
  const min = Math.min(...points), max = Math.max(...points), span = max - min || 1;
  const step = w / (points.length - 1);
  const coords = points.map((p,i) => [i*step, h - ((p - min)/span)*(h-8) - 4]);
  const linePath = coords.map((c,i) => (i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L ${w},${h} L 0,${h} Z`;
  const last = coords[coords.length-1];
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="area" d="${areaPath}" fill="url(#${grad})"/>
    <path class="line" d="${linePath}" stroke="${color}" />
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3" fill="${color}" />
  </svg>`;
}

// gentle synthetic trend, optionally jittered
function genTrend(n=14, slope=0.06, noise=0.18, seed=1) {
  const out=[]; let x=0.2 + Math.sin(seed)*0.05;
  for (let i=0;i<n;i++) {
    x += slope + (Math.sin(i*1.7+seed*3.1)*noise*0.5) + ((i%5===0)?0.04:0);
    if (x<0.05) x=0.05; if (x>0.95) x=0.95;
    out.push(x);
  }
  return out;
}

          <div class="cell-eyebrow"><span>COVERAGE</span><span class="right">% OF ${total}</span></div>
          <div class="donut">
            <svg viewBox="0 0 140 140">
              <circle class="seg" cx="70" cy="70" r="60" stroke="rgba(255,255,255,0.04)" stroke-width="14"/>
              <circle class="seg" cx="70" cy="70" r="60" stroke="#EF4444" data-target-dasharray="${(youPct*3.77).toFixed(1)} 1000" stroke-dasharray="0 1000"/>
            </svg>
            <div class="center">
              <div class="metric metric-md" style="color:var(--danger)" data-counter="${youPct}" data-suffix="%">0%</div>

          <div class="coverage-legend">

            <div class="lg-row"><span class="swatch" style="background:#F59E0B"></span>${escapeHTML(c.names[0])} <span style="margin-left:auto" class="text-warning">${aPct}%</span></div>
            <div class="lg-row"><span class="swatch" style="background:#38BDF8"></span>${escapeHTML(c.names[1])} <span style="margin-left:auto" style="color:#38BDF8">${bPct}%</span></div>

        <div class="cell c-4">

function tpl_proof() {
  const m = CONFIG.static.proof_metrics;
  // Layout strategy: hero metric (4x2), then mix sizes
  // Use 12-col grid with grid-auto-rows:160px
  // 0: 20M+ (4 col, 2 rows) hero with sparkline
  // 1: 11.58x (4 col)
  // 2: 20x (4 col)
  // 3: 10.8K (4 col, 2 rows) with sparkline
  // 4: 67% (4 col) with progress bar
  // 5: 98% (4 col, 2 rows) ring
  // 6: 5 min (4 col)
  // 7: 24/7 (4 col)
  // 8: $0 (4 col)
  // 9: 78% (4 col, 2 rows) bar
  const sizes = [
    { c:'c-4', r:'r-2', kind:'hero-spark' },
    { c:'c-4', r:'',    kind:'simple' },
    { c:'c-4', r:'',    kind:'simple' },
    { c:'c-4', r:'r-2', kind:'spark' },
    { c:'c-4', r:'',    kind:'progress' },
    { c:'c-4', r:'',    kind:'ring-sm' },
    { c:'c-4', r:'',    kind:'icon' },
    { c:'c-4', r:'',    kind:'icon' },
    { c:'c-4', r:'',    kind:'simple' },
    { c:'c-4', r:'',    kind:'progress' }
  ];

  const tones = ['accent','','','success','warning','accent','','success','','warning'];

  const cells = m.map((it, i) => {
    const sz = sizes[i] || { c:'c-3', r:'', kind:'simple' };
    const tone = tones[i] || '';
    const counterTarget = numFromValue(it.value);
    const valueRaw = it.value;
    const isNumeric = /^\$?-?\d+\.?\d*[KkMm%+x]*$/.test(valueRaw) || /^\d/.test(valueRaw);

    let body = '';
    if (sz.kind === 'hero-spark') {
      body = `
        <div class="cell-eyebrow"><span>METRIC // 01</span><span class="right text-accent">VERIFIED</span></div>
        <div>
          <div class="metric metric-xl" data-counter-text="${escapeHTML(valueRaw)}">${isNumeric ? '0' : escapeHTML(valueRaw)}</div>
          <div class="metric-label">${escapeHTML(it.label)}</div>
        </div>
        ${sparkline(genTrend(20, 0.04, 0.1, i+11), { color:'#C069DD', grad:'spark-grad', w:280, h:80 })}
        <div class="row" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);margin-top:0.4rem;justify-content:space-between">
          <span class="row"><span class="dot live"></span>LIVE</span>
          <span>30D ROLLING</span>
        </div>`;
    } else if (sz.kind === 'spark') {
      body = `
        <div class="cell-eyebrow"><span>METRIC // 0${i+1}</span><span class="right text-success">+TRENDING</span></div>
        <div>
          <div class="metric metric-lg" data-counter-text="${escapeHTML(valueRaw)}">${isNumeric ? '0' : escapeHTML(valueRaw)}</div>
          <div class="metric-label">${escapeHTML(it.label)}</div>
        </div>
        ${sparkline(genTrend(16, 0.05, 0.12, i+5), { color:'#22C55E', grad:'spark-grad-success', w:240, h:64 })}`;
    } else if (sz.kind === 'progress') {
      body = `
        <div class="cell-eyebrow"><span>METRIC // 0${i+1}</span><span class="right text-warning">RATE</span></div>
        <div>
          <div class="metric metric-lg" data-counter-text="${escapeHTML(valueRaw)}">${isNumeric ? '0' : escapeHTML(valueRaw)}</div>
          <div class="metric-label">${escapeHTML(it.label)}</div>
        </div>
        <div class="progress ${tone||''}"><span data-bar-target="${counterTarget}"></span></div>`;
    } else if (sz.kind === 'ring-sm') {
      const r = 50, c = 2*Math.PI*r;
      const target = (counterTarget/100) * c;
      body = `
        <div class="cell-eyebrow"><span>METRIC // 0${i+1}</span><span class="right text-success">RATE</span></div>
        <div style="display:flex;align-items:center;gap:0.85rem;margin-top:0.4rem">
          <div style="position:relative;width:64px;height:64px;flex-shrink:0">
            <svg viewBox="0 0 120 120" style="width:100%;height:100%;transform:rotate(-90deg)">
              <circle cx="60" cy="60" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="11"/>
              <circle cx="60" cy="60" r="${r}" fill="none" stroke="url(#ring-grad-success)" stroke-width="11" stroke-linecap="round" data-stroke-target="${target.toFixed(1)}" stroke-dasharray="0 ${c}"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:0.9rem;font-weight:700;color:var(--success)" data-counter-text="${escapeHTML(valueRaw)}">${isNumeric ? '0' : escapeHTML(valueRaw)}</div>
          </div>
          <div class="metric-label" style="margin:0">${escapeHTML(it.label)}</div>
        </div>`;
    } else if (sz.kind === 'icon') {
      const iconName = i === 6 ? 'clock' : i === 7 ? 'activity' : 'sparkle';
      body = `
        <div class="cell-eyebrow"><span>METRIC // 0${i+1}</span><span class="right text-success">${ico(iconName,12)}</span></div>
        <div>
          <div class="metric metric-lg" style="color:var(--success)" data-counter-text="${escapeHTML(valueRaw)}">${isNumeric && !valueRaw.includes('/') ? '0' : escapeHTML(valueRaw)}</div>
          <div class="metric-label">${escapeHTML(it.label)}</div>
        </div>
        <div class="row" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);margin-top:auto;justify-content:space-between">
          <span class="row"><span class="dot live"></span>OPERATIONAL</span>
        </div>`;
    } else {
      body = `
        <div class="cell-eyebrow"><span>METRIC // 0${i+1}</span><span class="right">VERIFIED</span></div>
        <div>
          <div class="metric metric-lg" data-counter-text="${escapeHTML(valueRaw)}">${isNumeric ? '0' : escapeHTML(valueRaw)}</div>
          <div class="metric-label">${escapeHTML(it.label)}</div>
        </div>`;
    }

    return `<div class="cell ${sz.c} ${sz.r} ${tone}">${body}</div>`;
  }).join('');

  return `
  <section id="proof" class="section">
    <div class="container">
      <div class="section-label">THE NUMBERS DON'T LIE</div>
      <h2 class="section-headline">Proof Wall <span class="text-muted" style="font-weight:400">// last 12 months</span></h2>
      <p class="section-sub">Every cell is a real number from a real client engagement. No vanity metrics.</p>
      <div class="proof-bento bento-rows-180">${cells}</div>
    </div>
  </section>`;
}

const scrollBar = document.getElementById('scroll-progress');
function updateProgress(){
  const h = document.documentElement;
  const pct = (h.scrollTop || document.body.scrollTop) / (h.scrollHeight - h.clientHeight) * 100;
  scrollBar.style.width = pct + '%';
}
window.addEventListener('scroll', updateProgress, { passive: true });
updateProgress();

/* ===== ANIMATIONS ===== */
gsap.registerPlugin(ScrollTrigger);

// fade-up sections
document.querySelectorAll('.section').forEach(sec => {
  gsap.from(sec.querySelectorAll('.section-label, .section-headline, .section-sub, .drama'), {
    scrollTrigger: { trigger: sec, start: 'top 80%' },
    y: 24, opacity: 0, duration: 0.7, ease: 'power3.out', stagger: 0.08
  });
  gsap.from(sec.querySelectorAll('.cell'), {
    scrollTrigger: { trigger: sec, start: 'top 75%' },
    y: 30, opacity: 0, duration: 0.6, ease: 'power3.out', stagger: 0.06
  });
});

// hero entrance
gsap.from('#hero .hero-eyebrow, #hero .hero-company, #hero .hero-subline, #hero .hero-cta-row, #hero .hero-bento .cell', {
  y: 40, opacity: 0, duration: 0.9, ease: 'power3.out', stagger: 0.08, delay: 0.15
});

// numeric counters (data-counter -> number)
function animateCounter(el) {
  const target = parseFloat(el.dataset.counter);
  const suffix = el.dataset.suffix || '';
  const isFloat = String(target).indexOf('.') !== -1;
  const decimals = isFloat ? 2 : 0;
  const obj = { v: 0 };
  gsap.to(obj, {
    v: target, duration: 1.6, ease: 'power2.out',
    onUpdate: () => {
      const v = obj.v.toFixed(decimals);
      el.textContent = (isFloat ? v : Math.round(obj.v).toLocaleString()) + suffix;
    }
  });
}

// text counters (data-counter-text -> e.g. "20M+", "11.58x", "$2,400") - count the leading number
function animateCounterText(el) {
  const target = el.dataset.counterText;
  const m = target.match(/^(-?[\$]?)(-?\d+\.?\d*)([^\d].*)?$/);
  if (!m) { el.textContent = target; return; }
  const prefix = m[1] || '';
  const num = parseFloat(m[2]);
  const suffix = m[3] || '';
  const isFloat = m[2].indexOf('.') !== -1;
  const decimals = isFloat ? 2 : 0;
  const obj = { v: 0 };
  gsap.to(obj, {
    v: num, duration: 1.8, ease: 'power2.out',
    onUpdate: () => {
      const v = obj.v.toFixed(decimals);
      const display = isFloat ? v : Math.round(obj.v).toLocaleString();
      el.textContent = prefix + display + suffix;
    }
  });
}

document.querySelectorAll('[data-counter]').forEach(el => {
  ScrollTrigger.create({ trigger: el, start: 'top 90%', once: true, onEnter: () => animateCounter(el) });
});
document.querySelectorAll('[data-counter-text]').forEach(el => {
  // skip non-numeric (e.g., "24/7", "5 min")
  const t = el.dataset.counterText || '';
  if (!/^[-\$]?\d/.test(t)) { el.textContent = t; return; }
  ScrollTrigger.create({ trigger: el, start: 'top 90%', once: true, onEnter: () => animateCounterText(el) });
});

// progress bars
document.querySelectorAll('[data-bar-target]').forEach(el => {
  ScrollTrigger.create({
    trigger: el, start: 'top 90%', once: true,
    onEnter: () => { el.style.width = (parseFloat(el.dataset.barTarget)) + '%'; }
  });
});

// stroke ring animation
document.querySelectorAll('[data-stroke-target]').forEach(el => {
  const target = parseFloat(el.dataset.strokeTarget);
  ScrollTrigger.create({
    trigger: el, start: 'top 90%', once: true,
    onEnter: () => {
      const dasharray = el.getAttribute('stroke-dasharray') || '0 1000';
      const max = parseFloat(dasharray.split(' ')[1]) || 1000;
      gsap.to({ v: 0 }, {
        v: target, duration: 1.5, ease: 'power2.out',
        onUpdate: function() {
          el.setAttribute('stroke-dasharray', `${this.targets()[0].v} ${max}`);
        }
      });
    }
  });
});

// stroke ring animation (data-target-dasharray full string)
document.querySelectorAll('[data-target-dasharray]').forEach(el => {
  const targetStr = el.dataset.targetDasharray;
  const targetV = parseFloat(targetStr.split(' ')[0]);
  const max = parseFloat(targetStr.split(' ')[1]);
  ScrollTrigger.create({
    trigger: el, start: 'top 90%', once: true,
    onEnter: () => {
      gsap.to({ v: 0 }, {
        v: targetV, duration: 1.5, ease: 'power2.out',
        onUpdate: function() {
          el.setAttribute('stroke-dasharray', `${this.targets()[0].v} ${max}`);
        }
      });
    }
  });
});
