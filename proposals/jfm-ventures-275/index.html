const CONFIG = {"meta":{"slug":"jfm-ventures-275","tier":"HIGH","cta_url":"https://cal.com/grawoth/consultation-call-with-allen","lead_id":275,"generated_at":"2026-06-19","engine":"ai"},"prospect":{"company_name":"JFM Ventures","contact_name":"Franco Wu","industry":"DTC supplements","website":"https://www.linkedin.com/company/jfm-ventures/","focus":"winning ad creative","promise":"TGE can run the direct response creative engine JFM needs for its fast-scaling supplement brand, from VOC mining and angle creation to briefs, testing cadence, loser diagnosis, and winner iteration.","cover_brief":[{"label":"Goal","title":"Scale Winning Ads","line":"Your core need is not prettier creative, it is a reliable pipeline of cold-traffic concepts that can hold profitable spend on Meta."},{"label":"Lever","title":"Creative Testing Engine","line":"We would build the system around avatars, mechanisms, hooks, statics, scripts, VSL concepts, AI assets, UGC briefs, and weekly iteration loops."},{"label":"First 30 days","title":"Research To Tests","line":"In the first 30 days, we would turn reviews, Reddit, comments, competitor ads, and ad account learnings into a prioritized testing roadmap with briefs ready for production."},{"label":"Owner view","title":"Team Over Hire","line":"Instead of waiting for one senior strategist to ramp, you get a done-for-you team that can start quickly, document the system, and scale output without creating a single point of failure."}],"read":{"summary":"JFM is hiring a Senior Direct Response Creative Strategist to own the creative engine for a fast-scaling DTC supplement brand. The ask is clear: crack new avatars and angles, write briefs and scripts, read Meta and Triple Whale data, maintain an angle library, and keep winners alive through relentless iteration.","sub":"This looks like a full-time foundational role, not a one-off project. TGE is best positioned as a done-for-you creative strategy pod that can deliver the role's outcomes faster than a single hire, while still leaving JFM with a documented system future strategists can plug into.","signals":[{"title":"Performance first","detail":"You explicitly care more about what converts than portfolio polish, so the proposal should center on hit rate, CPA, ROAS, and profitable spend capacity."},{"title":"Research depth","detail":"The post names reviews, Reddit, comments, and competitor ads, which means the winning edge is voice-of-customer insight, not generic supplement hooks."},{"title":"High autonomy","detail":"You need someone who can manage the testing cadence and call winners without hand-holding, so ownership and operating rhythm matter as much as copy."}],"opportunities":[{"phase":"Now","title":"Map winners","detail":"Audit current best ads, spend tolerance, fatigue patterns, hooks, and angle families before creating new concepts."},{"phase":"Next","title":"Mine demand","detail":"Build a VOC bank from reviews, Reddit, comments, objections, competitor claims, and supplement category language."},{"phase":"Then","title":"Ship tests","detail":"Turn the highest-signal insights into native statics, UGC scripts, VSL hooks, AI avatar tests, and iteration briefs."},{"phase":"Always","title":"Compound learnings","detail":"Keep a living angle and hook library so every win, loss, and fatigue signal feeds the next test."}]},"strategy":{"headline":"Build JFM a direct response creative pod that finds, tests, and extends supplement ad winners.","pillars":[{"icon":"target","title":"Avatar expansion","line":"Identify new buyer segments and belief states beyond the obvious supplement audience."},{"icon":"funnel","title":"Mechanism-led hooks","line":"Create angles around the problem, promise, unique mechanism, proof, objection, and urgency behind the purchase."},{"icon":"repeat","title":"Iteration discipline","line":"Treat every winner as a source asset to squeeze through new hooks, formats, openings, proof points, and visual structures."}],"engine_notes":[{"title":"Cold traffic","detail":"Every concept should be judged by whether it can stop, qualify, persuade, and move a cold buyer toward purchase."},{"title":"Meta feedback","detail":"Creative decisions should come from ad account patterns, not subjective debate."},{"title":"Clear briefs","detail":"Editors, designers, and UGC creators should receive briefs with hook, claim, angle, visual direction, proof, CTA, and failure risk."},{"title":"AI leverage","detail":"HeyGen, Hedra, ElevenLabs, Midjourney, Krea, and Google Flow can increase concept velocity when tied to a strict testing roadmap."}]},"channels":[{"label":"Meta","role":"Primary scale","detail":"Use Meta Ads Manager to read performance, diagnose creative fatigue, and prioritize the next creative tests."},{"label":"Shopify","role":"Purchase context","detail":"Use product page claims, reviews, objections, and checkout friction to inform ad angles."},{"label":"UGC","role":"Trust builder","detail":"Brief creators around specific buyer beliefs, objections, and first three-second hooks instead of broad testimonials."},{"label":"AI Creative","role":"Output velocity","detail":"Use AI avatars, voiceover, image generation, and motion tools to produce more controlled variants without slowing the test cadence."}],"roadmap":[{"label":"Days 1 to 14","title":"Phase 1: Creative Intelligence","items":["Audit current winning and losing ads by angle, avatar, format, hook, CPA, ROAS, and spend capacity","Review Triple Whale and Meta signals to identify what is scaling, fatiguing, and failing","Mine product reviews, Reddit threads, ad comments, competitor ads, and category objections","Build an initial avatar, mechanism, hook, and objection map for the supplement offer","Set up the living angle and hook library inside JFM's preferred Drive or ClickUp workflow"]},{"label":"Days 15 to 45","title":"Phase 2: Test Pipeline","items":["Prioritize the first wave of net-new angles by likely impact and speed to produce","Write briefs for native statics, UG
