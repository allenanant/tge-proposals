ner-Led Growth","detail":"The owner already has the ideas and needs an execution layer that can organize, prioritize, build, and report."},{"title":"Lead Warming Gap","detail":"Residential painting leads need fast response, trust-building follow-up, estimate reminders, and reactivation when homeowners are not ready today."},{"title":"Scalable Ops","detail":"Your success definition is monthly improvement in organization and scalability, so documentation and metric tracking matter as much as automation."}],"opportunities":[{"phase":"Now","title":"Map Lead Flow","detail":"Clarify where leads enter, how they are followed up, where they stall, and what the owner currently has to chase manually."},{"phase":"Next","title":"Ship Nurture","detail":"Build SMS and email sequences for new inquiries, quote follow-up, no-response leads, seasonal repaint interest, and past customers."},{"phase":"Then","title":"Systemize Referrals","detail":"Create a referral and partner workflow for homeowners, realtors, property managers, and local service businesses."},{"phase":"Always","title":"Track Bottlenecks","detail":"Maintain a simple dashboard for speed-to-lead, booked estimates, estimate follow-up, close rate, source quality, and campaign status."}]},"strategy":{"headline":"Build Pearl Painting's growth operating system around lead warming, clean CRM workflows, and owner-led execution.","pillars":[{"icon":"target","title":"Lead Nurture","line":"Create structured SMS and email paths for new leads, quote follow-ups, cold leads, past customers, and referrals."},{"icon":"funnel","title":"CRM Automation","line":"Turn each sales stage into clear triggers, tasks, reminders, tags, handoffs, and reporting inside your chosen CRM."},{"icon":"repeat","title":"Execution Rhythm","line":"Convert owner ideas into project briefs, assets, SOPs, timelines, dashboards, and weekly progress updates."}],"engine_notes":[{"title":"First System","detail":"The lead warming system should be the first build because
