<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Proposal | The Growth Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:#0A0A09;color:#FFFFFF;font-family:'Hanken Grotesk',sans-serif;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

/* ===== CSS VARIABLES ===== */
:root{
  --bg:#0A0A09;--surface:rgba(22,22,22,0.55);--surface-solid:#151515;--surface-alt:#1E1E1E;
  --accent:#C069DD;--accent-glow:#9B3FC7;--accent-bright:#D48EF0;
  --success:#22C55E;--warning:#F59E0B;--danger:#EF4444;
  --text:#FFFFFF;--muted:#888888;--subtle:#555555;
  --border:rgba(255,255,255,0.06);--border-glow:rgba(192,105,221,0.15);
  --font-heading:'Outfit',sans-serif;
  --font-body:'Hanken Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-serif:'Instrument Serif',serif;
  --radius:1.5rem;
  --glow-sm:0 0 20px rgba(192,105,221,0.08);
  --glow-md:0 0 40px rgba(192,105,221,0.12);
  --glow-lg:0 0 80px rgba(192,105,221,0.15);
  --shadow-card:0 4px 24px rgba(0,0,0,0.3),0 1px 4px rgba(0,0,0,0.2);
  --shadow-hover:0 12px 48px rgba(0,0,0,0.4),0 4px 12px rgba(0,0,0,0.3);
}

/* ===== SCROLL PROGRESS ===== */
#scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-bright),var(--accent-glow));width:0;z-index:10000;box-shadow:0 0 12px var(--accent)}

/* ===== NOISE OVERLAY ===== */
#noise-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0.025}

/* ===== GRADIENT TEXT ===== */
.gradient-text{background:linear-gradient(135deg,var(--accent-bright),var(--accent),#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ===== SECTION DIVIDER ===== */
.section::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--border-glow),transparent)}

/* ===== LAYOUT ===== */
.container{max-width:1200px;margin:0 auto;padding:0 2rem}
.section{padding:10rem 0;position:relative}
.section-label{font-family:var(--font-mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.25em;color:var(--accent);margin-bottom:1rem;display:inline-flex;align-items:center;gap:0.75rem}
.section-label::before{content:'';display:inline-block;width:24px;height:1px;background:var(--accent)}
.section-headline{font-family:var(--font-heading);font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.15;margin-bottom:1.5rem;letter-spacing:-0.02em}
.section-headline .accent,.close-headline .accent{color:var(--accent)}
.drama{font-family:var(--font-serif);font-style:italic;color:var(--accent);font-size:clamp(1.1rem,2vw,1.4rem);margin-top:2.5rem;opacity:0.85}

/* ===== CARDS (GLASS MORPHISM) ===== */
.card{background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow-card);transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),box-shadow 0.4s cubic-bezier(0.16,1,0.3,1),border-color 0.4s ease}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:var(--border-glow)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:1rem 2.5rem;border-radius:100px;font-family:var(--font-heading);font-weight:600;font-size:1rem;cursor:pointer;border:none;transition:all 0.4s cubic-bezier(0.16,1,0.3,1)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-glow));color:#fff;box-shadow:0 4px 24px rgba(192,105,221,0.3),inset 0 1px 0 rgba(255,255,255,0.1)}
.btn-primary:hover{transform:scale(1.04) translateY(-2px);box-shadow:0 8px 40px rgba(192,105,221,0.45),inset 0 1px 0 rgba(255,255,255,0.1)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);transform:scale(1.03)}

/* ===== PILL BADGES ===== */
.pill{display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 1rem;border-radius:100px;font-size:0.75rem;font-family:var(--font-mono);background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted);backdrop-filter:blur(8px)}
.pill-accent{background:rgba(192,105,221,0.08);border-color:rgba(192,105,221,0.2);color:var(--accent)}
.pill-success{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.2);color:var(--success)}
.pill-danger{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.2);color:var(--danger)}
.pill-warning{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.2);color:var(--warning)}

/* ===== BROWSER FRAME ===== */
.browser-frame{background:rgba(17,17,17,0.8);border-radius:1rem;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-card)}
.browser-bar{display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border)}
.browser-dot{width:10px;height:10px;border-radius:50%}
.browser-dot.red{background:#EF4444}.browser-dot.amber{background:#F59E0B}.browser-dot.green{background:#22C55E}
.browser-url{font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);margin-left:0.5rem;background:rgba(255,255,255,0.04);padding:0.25rem 0.75rem;border-radius:4px;flex:1}
.browser-content{padding:0;min-height:200px;position:relative}
.browser-content img{width:100%;display:block}

/* ===== PHONE FRAME ===== */
.phone-frame{background:rgba(17,17,17,0.8);border-radius:2.5rem;padding:8px;border:2px solid rgba(255,255,255,0.08);display:inline-block;max-width:320px;box-shadow:var(--shadow-card)}
.phone-screen{border-radius:2rem;overflow:hidden;background:var(--surface-solid)}
.phone-screen img{width:100%;display:block}

/* ===== HERO ===== */
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden;padding:2rem}
#hero::before{content:none}
#hero-bg{position:absolute;inset:0;overflow:hidden}
.hero-gradient{position:absolute;border-radius:50%;filter:blur(140px);opacity:0.3;animation:float 15s ease-in-out infinite}
.hero-gradient.g1{width:700px;height:700px;background:var(--accent);top:-250px;left:-150px;animation-delay:0s}
.hero-gradient.g2{width:500px;height:500px;background:var(--accent-glow);bottom:-150px;right:-100px;animation-delay:4s}
.hero-gradient.g3{width:400px;height:400px;background:#7C3AED;top:40%;left:50%;animation-delay:8s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(0.95)}75%{transform:translate(20px,20px) scale(1.02)}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:80px 80px}
.hero-content{position:relative;z-index:2;max-width:900px}
.hero-eyebrow{font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.35em;color:var(--muted);margin-bottom:2rem}
.hero-company{font-family:var(--font-heading);font-size:clamp(3.5rem,12vw,10rem);font-weight:900;line-height:0.95;margin-bottom:1.5rem;background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,0.5) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.04em}
.hero-subline{font-size:clamp(1rem,2vw,1.2rem);color:var(--muted);max-width:550px;margin:0 auto 3rem;line-height:1.8;font-weight:300}
.hero-stats{display:flex;flex-wrap:wrap;justify-content:center;gap:0.6rem;margin-bottom:3.5rem}
.hero-meta{position:absolute;bottom:2.5rem;right:2.5rem;font-family:var(--font-mono);font-size:0.65rem;color:var(--subtle);text-align:right;letter-spacing:0.05em}
.scroll-indicator{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.5rem;color:var(--subtle);font-size:0.65rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.2em}
.scroll-chevron{animation:bounce 2.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(10px);opacity:0.5}}

/* ===== AUDIT ===== */
.audit-layout{display:grid;grid-template-columns:1.5fr 1fr;gap:3rem;align-items:start}
.audit-screenshot{position:relative}
.audit-dot{position:absolute;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;font-family:var(--font-mono);cursor:pointer;transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);z-index:2}
.audit-dot:hover{transform:scale(1.4)}
.audit-dot.warning{background:var(--warning);color:#000;box-shadow:0 0 12px rgba(245,158,11,0.3)}
.audit-dot.danger{background:var(--danger);color:#fff;box-shadow:0 0 12px rgba(239,68,68,0.3)}
.audit-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface-solid);border:1px solid var(--border);border-radius:0.75rem;padding:0.6rem 1rem;font-size:0.75rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:10;backdrop-filter:blur(12px)}
.audit-dot:hover .audit-tooltip{opacity:1}
.audit-score-ring{width:160px;height:160px;margin:0 auto 1.5rem}
.audit-score-ring svg{width:100%;height:100%}
.audit-score-number{font-family:var(--font-mono);font-size:2.5rem;font-weight:700}
.audit-findings{list-style:none;display:flex;flex-direction:column;gap:0.75rem}
.audit-finding{display:flex;align-items:flex-start;gap:0.75rem;font-size:0.9rem;color:var(--muted)}
.audit-finding-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;font-family:var(--font-mono);flex-shrink:0}
.audit-finding-num.danger{background:var(--danger);color:#fff;box-shadow:0 0 8px rgba(239,68,68,0.2)}
.audit-finding-num.warning{background:var(--warning);color:#000;box-shadow:0 0 8px rgba(245,158,11,0.2)}

/* ===== PROBLEMS ===== */
.problems-stack{display:flex;flex-direction:column;gap:2.5rem;max-width:900px}
.problem-card{padding:0;background:none;backdrop-filter:none;border:none;box-shadow:none;position:relative;display:grid;grid-template-columns:auto 1fr;gap:2rem;align-items:start}
.problem-card:hover{transform:none;box-shadow:none;border-color:transparent}
.problem-num{font-family:var(--font-mono);font-size:clamp(3rem,5vw,4.5rem);font-weight:700;line-height:1;color:rgba(255,255,255,0.04);position:relative;min-width:60px;text-align:right}
.problem-card.danger .problem-num::after{content:'';position:absolute;top:50%;right:-1rem;width:6px;height:6px;border-radius:50%;background:var(--danger);box-shadow:0 0 12px rgba(239,68,68,0.4);transform:translateY(-50%)}
.problem-card.warning .problem-num::after{content:'';position:absolute;top:50%;right:-1rem;width:6px;height:6px;border-radius:50%;background:var(--warning);box-shadow:0 0 12px rgba(245,158,11,0.4);transform:translateY(-50%)}
.problem-body{padding:0.5rem 0}
.problem-statement{font-family:var(--font-heading);font-size:clamp(1.3rem,2.5vw,1.75rem);font-weight:600;margin-bottom:0.75rem;line-height:1.35;letter-spacing:-0.01em}
.problem-context{color:var(--muted);margin-bottom:1rem;font-size:0.9rem;line-height:1.7}
.problem-data{font-family:var(--font-mono);font-size:0.8rem;color:var(--warning);display:inline-flex;align-items:center;gap:0.5rem;padding:0.4rem 1rem;border-radius:100px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.1)}

/* ===== COMPETITORS ===== */
.comp-table-wrap{overflow-x:auto;margin:2rem 0}
.comp-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);backdrop-filter:blur(20px);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.comp-table th,.comp-table td{padding:1rem 1.25rem;text-align:center;border-bottom:1px solid var(--border);font-size:0.9rem}
.comp-table th{font-family:var(--font-heading);font-weight:600;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);background:rgba(0,0,0,0.4)}
.comp-table th:first-child,.comp-table td:first-child{text-align:left}
.comp-table .col-tge{background:rgba(192,105,221,0.04)}
.comp-table th.col-tge{color:var(--accent)}
.check{color:var(--success);font-weight:700;font-size:1.2rem}
.cross{color:rgba(239,68,68,0.5);font-weight:700;font-size:1.2rem}
.gap-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;margin-top:2.5rem}
.gap-card{padding:2rem}
.gap-number{font-family:var(--font-mono);font-size:2rem;font-weight:700;margin-bottom:0.5rem;background:linear-gradient(135deg,var(--danger),#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gap-title{font-family:var(--font-heading);font-weight:600;font-size:1.1rem;margin-bottom:0.5rem}
.gap-desc{color:var(--muted);font-size:0.9rem}

/* ===== ROADMAP ===== */
.timeline-line{display:flex;justify-content:space-between;align-items:center;position:relative;margin:3rem 0 2rem;padding:0 2rem}
.timeline-line::before{content:'';position:absolute;top:50%;left:2rem;right:2rem;height:2px;background:linear-gradient(90deg,var(--accent),var(--success),var(--warning),#8B5CF6);transform:translateY(-50%);opacity:0.3}
.timeline-dot{width:16px;height:16px;border-radius:50%;position:relative;z-index:2;border:2px solid var(--bg)}
.timeline-dot.w1{background:var(--accent);box-shadow:0 0 12px rgba(192,105,221,0.4)}
.timeline-dot.w2{background:var(--success);box-shadow:0 0 12px rgba(34,197,94,0.4)}
.timeline-dot.w3{background:var(--warning);box-shadow:0 0 12px rgba(245,158,11,0.4)}
.timeline-dot.w4{background:#8B5CF6;box-shadow:0 0 12px rgba(139,92,246,0.4)}
.roadmap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
.week-card{padding:1.5rem}
.week-dot{width:10px;height:10px;border-radius:50%;margin-bottom:0.75rem}
.week-title{font-family:var(--font-heading);font-weight:600;font-size:1rem;margin-bottom:1rem}
.week-items{list-style:none;display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem}
.week-items li{font-size:0.8rem;color:var(--muted)}
.week-items li::before{content:'+ ';color:var(--accent);font-weight:600}
.week-count{font-family:var(--font-mono);font-size:0.7rem;color:var(--accent);background:rgba(192,105,221,0.08);padding:0.25rem 0.75rem;border-radius:100px;display:inline-block}
.roadmap-total{text-align:center;margin-top:4rem}
.roadmap-total .big-number{font-family:var(--font-mono);font-size:clamp(4rem,8vw,7rem);font-weight:700;line-height:1}
.roadmap-total p{color:var(--muted);font-size:1rem;margin-top:0.5rem}

/* ===== STRATEGY ===== */
.strategy-cards{display:flex;flex-direction:column;gap:2rem}
.strategy-card{position:relative;overflow:hidden;padding:3rem}
.strategy-bg-num{position:absolute;top:-30px;right:20px;font-family:var(--font-heading);font-size:14rem;font-weight:900;background:linear-gradient(180deg,rgba(255,255,255,0.03),transparent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;pointer-events:none}
.strategy-title{font-family:var(--font-heading);font-size:1.5rem;font-weight:700;margin-bottom:1.25rem;position:relative}
.strategy-bullets{list-style:none;display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem;position:relative}
.strategy-bullets li{font-size:0.95rem;color:var(--muted)}
.strategy-bullets li::before{content:'+ ';color:var(--accent);font-weight:600}
.strategy-projected{display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1.25rem;border-radius:100px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);color:var(--success);font-family:var(--font-mono);font-size:0.85rem;position:relative}

/* ===== PROOF WALL ===== */
.bento-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:180px;gap:1rem}
.bento-card{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:1.5rem}
.bento-card.span-2x2{grid-column:span 2;grid-row:span 2}
.bento-card.span-2c{grid-column:span 2}
.bento-value{font-family:var(--font-mono);font-weight:700;margin-bottom:0.4rem}
.bento-card.span-2x2 .bento-value{font-size:clamp(2.5rem,5vw,4rem)}
.bento-card:not(.span-2x2) .bento-value{font-size:clamp(1.5rem,3vw,2.2rem)}
.bento-label{font-size:0.75rem;color:var(--muted);letter-spacing:0.03em}

/* ===== CASE STUDIES ===== */
.case-layout{display:grid;grid-template-columns:1fr 1.2fr;gap:4rem;align-items:center}
.case-layout.reverse{grid-template-columns:1.2fr 1fr}
.case-hero-metric{font-family:var(--font-mono);font-size:clamp(3rem,8vw,6rem);font-weight:700;line-height:1}
.case-hero-label{font-size:1rem;color:var(--muted);margin-bottom:1.5rem}
.case-sub-metrics{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:2rem}
.case-story{display:flex;flex-direction:column;gap:1rem;margin-bottom:2rem}
.case-story p{color:var(--muted);font-size:0.95rem;line-height:1.7}
.case-before-after{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.case-ba-card{padding:1.25rem;border-radius:1.25rem;font-size:0.85rem;backdrop-filter:blur(8px)}
.case-ba-card.before{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.12);color:rgba(239,68,68,0.9)}
.case-ba-card.after{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.12);color:rgba(34,197,94,0.9)}
.case-ba-label{font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:0.4rem;opacity:0.7}
.media-strip{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:2rem}

/* ===== DASHBOARDS ===== */
.dashboard-stack{position:relative;max-width:900px;margin:3rem auto 0;perspective:1000px;display:flex;flex-direction:column;gap:2rem}
.dashboard-frame{position:relative;transition:transform 0.5s cubic-bezier(0.16,1,0.3,1)}
.dashboard-frame:nth-child(1){transform:rotate(-0.5deg);z-index:3}
.dashboard-frame:nth-child(2){transform:rotate(0.3deg);z-index:2;opacity:0.85}
.dashboard-frame:nth-child(3){transform:rotate(-0.3deg);z-index:1;opacity:0.7}
.dashboard-placeholder{background:var(--surface-alt);min-height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--font-mono);font-size:0.85rem}

/* ===== SYSTEM TABS ===== */
.system-layout{display:grid;grid-template-columns:280px 1fr;gap:2rem;margin-top:2rem}
.system-tabs{display:flex;flex-direction:column;gap:0.25rem}
.system-tab{padding:1rem 1.25rem;border-radius:1rem;cursor:pointer;font-family:var(--font-heading);font-weight:500;color:var(--muted);transition:all 0.3s cubic-bezier(0.16,1,0.3,1);border-left:3px solid transparent;font-size:0.95rem}
.system-tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.system-tab.active{color:var(--text);background:var(--surface);border-left-color:var(--accent);box-shadow:var(--glow-sm)}
.system-content{padding:2rem}
.system-content-title{font-family:var(--font-heading);font-size:1.3rem;font-weight:600;margin-bottom:0.75rem}
.system-content-desc{color:var(--muted);margin-bottom:1.5rem;font-size:0.95rem}
.automation-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:3rem}
.auto-card{padding:1.5rem}
.auto-card-title{font-family:var(--font-heading);font-weight:600;margin-bottom:0.5rem}
.auto-card-desc{font-size:0.85rem;color:var(--muted);margin-bottom:1rem}
.auto-stat{font-family:var(--font-mono);font-size:0.7rem;color:var(--success);background:rgba(34,197,94,0.08);padding:0.25rem 0.75rem;border-radius:100px;display:inline-block}

.campaign-flow{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;margin:3rem 0;position:relative}
.campaign-flow::before{content:'';position:absolute;top:24px;left:15%;right:15%;height:1px;background:linear-gradient(90deg,var(--accent),var(--accent-glow),#8B5CF6);opacity:0.2;z-index:0}

.campaign-step:nth-child(3) .campaign-step-num{color:var(--success);border-color:rgba(34,197,94,0.2);background:rgba(34,197,94,0.06);box-shadow:0 0 20px rgba(34,197,94,0.1)}
.campaign-step-title{font-family:var(--font-heading);font-weight:600;font-size:1.1rem;margin-bottom:0.5rem}
.campaign-step-desc{font-size:0.85rem;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto}
.channel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:3rem}
.channel-card{padding:1.25rem;text-align:center}
.channel-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.75rem;border:1px solid var(--border)}
.channel-icon i{width:18px;height:18px}
.channel-name{font-family:var(--font-heading);font-weight:600;font-size:0.9rem;margin-bottom:0.25rem}
.channel-role{font-size:0.75rem;color:var(--muted)}

.deliverable-card{padding:2rem;position:relative;overflow:hidden}

.deliverable-icon.email{background:rgba(0,188,212,0.06);border-color:rgba(0,188,212,0.15);color:#00BCD4}

.deliverable-desc{font-size:0.85rem;color:var(--muted);line-height:1.6}

/* ===== FEATURES LIST ===== */

.pricing-period{font-size:0.8rem;color:var(--subtle);margin-bottom:2rem}

.roi-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);font-family:var(--font-mono);margin-bottom:0.5rem}
.roi-value{font-family:var(--font-mono);font-size:clamp(1.5rem,3vw,2.5rem);font-weight:700}
.roi-value.green{color:var(--success)}
.roi-value.accent{color:var(--accent)}

.close-headline{font-family:var(--font-heading);font-size:clamp(2rem,5vw,3.5rem);font-weight:700;margin-bottom:1rem;letter-spacing:-0.02em}
.close-subline{color:var(--muted);font-size:1.15rem;margin-bottom:3rem;max-width:600px;margin-left:auto;margin-right:auto}
.video-placeholder{max-width:500px;margin:0 auto 3rem;background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:4rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
.play-btn{width:64px;height:64px;border-radius:50%;background:rgba(192,105,221,0.1);border:1px solid rgba(192,105,221,0.3);display:flex;align-items:center;justify-content:center;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);box-shadow:0 0 30px rgba(192,105,221,0.1)}
.play-btn:hover{transform:scale(1.1);box-shadow:0 0 50px rgba(192,105,221,0.2)}
.play-triangle{width:0;height:0;border-left:18px solid var(--accent);border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:4px}
.contact-strip{display:flex;justify-content:center;gap:2rem;margin-top:3rem;flex-wrap:wrap}
.contact-item{font-family:var(--font-mono);font-size:0.75rem;color:var(--muted);display:flex;align-items:center;gap:0.4rem}
.contact-item i{width:14px;height:14px;opacity:0.5}
.footer{display:flex;justify-content:center;align-items:center;gap:0.75rem;margin-top:4rem;padding:2rem;font-size:0.7rem;color:var(--subtle)}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.4)}50%{opacity:0.8;box-shadow:0 0 0 6px rgba(34,197,94,0)}}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .audit-layout{grid-template-columns:1fr}
  .roadmap-grid{grid-template-columns:repeat(2,1fr)}
  .bento-grid{grid-template-columns:repeat(2,1fr)}
  .bento-card.span-2x2{grid-column:span 2;grid-row:span 2}
  .case-layout,.case-layout.reverse{grid-template-columns:1fr}
  .system-layout{grid-template-columns:1fr}
  .system-tabs{flex-direction:row;overflow-x:auto;padding-bottom:0.5rem}
  .system-tab{border-left:none;border-bottom:3px solid transparent;white-space:nowrap}
  .system-tab.active{border-bottom-color:var(--accent);border-left-color:transparent}
  .automation-grid{grid-template-columns:repeat(2,1fr)}
  .features-grid{grid-template-columns:repeat(2,1fr)}
  .deliverables-grid{grid-template-columns:repeat(2,1fr)}
  .pricing-grid{grid-template-columns:1fr;max-width:500px}
  .campaign-flow{grid-template-columns:1fr;gap:1.5rem}
  .campaign-flow::before{display:none}
  .channel-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){

  .bento-grid{grid-template-columns:1fr;grid-auto-rows:140px}
  .bento-card.span-2x2,.bento-card.span-2c{grid-column:span 1;grid-row:span 1}
  .deliverables-grid{grid-template-columns:1fr}
  .features-grid{grid-template-columns:1fr}
  .automation-grid{grid-template-columns:1fr}
  .hero-stats{flex-direction:column;align-items:center}
  .comp-table{font-size:0.75rem}
  .comp-table th,.comp-table td{padding:0.6rem 0.5rem}
  .roi-strip{grid-template-columns:1fr;gap:1.5rem}
  .case-before-after{grid-template-columns:1fr}
  .contact-strip{flex-direction:column;align-items:center;gap:1rem}
  .dashboard-frame:nth-child(2){transform:rotate(0.3deg)}
  .dashboard-frame:nth-child(3){transform:rotate(-0.3deg)}
  .timeline-line{display:none}
  .channel-grid{grid-template-columns:1fr}
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', () => {
  renderPage();

  // Initialize Lucide icons
  if (window.lucide) lucide.createIcons();

  // System tabs
  document.querySelectorAll('.system-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.system-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const idx = parseInt(tab.dataset.tab);
      const pillar = CONFIG.static.system_pillars[idx];
      const content = document.getElementById('system-content');
      if (content) {
        let imgHtml = '';
        if (pillar.image) {
          imgHtml = `<div class="browser-frame"><div class="browser-bar"><span class="browser-dot red"></span><span class="browser-dot amber"></span><span class="browser-dot green"></span><span class="browser-url">${pillar.title.toLowerCase()}</span></div><div class="browser-content" style="max-height:400px;overflow:hidden"><img src="${pillar.image}" alt="${pillar.title}" style="width:100%;display:block;object-fit:cover;object-position:top" onerror="this.parentElement.innerHTML='<div class=\\'dashboard-placeholder\\'>${pillar.title}</div>'"></div></div>`;
        }
        content.innerHTML = `
          <div class="system-content-title">${pillar.title}</div>
          <div class="system-content-desc">${pillar.description}</div>
          ${imgHtml}
        `;
      }
    });
  });

  // Initialize animations
  initAnimations();
});

function initAnimations() {
  // Lucide icons
  if (window.lucide) lucide.createIcons();

  // Scroll progress
  window.addEventListener('scroll', () => {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const progress = (scrollTop / scrollHeight) * 100;
    document.getElementById('scroll-progress').style.width = progress + '%';
  });

  // GSAP animations
  if (!window.gsap || !window.ScrollTrigger) return;
  gsap.registerPlugin(ScrollTrigger);

  // Fade-up animation
  document.querySelectorAll('[data-anim="fade-up"]').forEach(el => {
    const delay = parseFloat(el.dataset.delay) || 0;
    gsap.from(el, {
      y: 40,
      opacity: 0,
      duration: 1,
      delay: delay,
      ease: 'power4.out',
      scrollTrigger: { trigger: el, start: 'top 90%', toggleActions: 'play none none none' }
    });
  });

  // Blur-in animation (headlines)
  document.querySelectorAll('[data-anim="blur-in"]').forEach(el => {
    const delay = parseFloat(el.dataset.delay) || 0;
    gsap.from(el, {
      y: 30,
      opacity: 0,
      filter: 'blur(12px)',
      duration: 1.2,
      delay: delay,
      ease: 'power4.out',
      scrollTrigger: { trigger: el, start: 'top 90%', toggleActions: 'play none none none' }
    });
  });

  // Scale-in animation (cards)
  document.querySelectorAll('[data-anim="scale-in"]').forEach(el => {
    const delay = parseFloat(el.dataset.delay) || 0;
    gsap.from(el, {
      scale: 0.92,
      opacity: 0,
      duration: 0.9,
      delay: delay,
      ease: 'power3.out',
      scrollTrigger: { trigger: el, start: 'top 90%', toggleActions: 'play none none none' }
    });
  });

  // Slide-in animation (problem cards, strategy cards)
  document.querySelectorAll('[data-anim="slide-in"]').forEach(el => {
    const delay = parseFloat(el.dataset.delay) || 0;
    gsap.from(el, {
      x: -40,
      opacity: 0,
      duration: 1,
      delay: delay,
      ease: 'power4.out',
      scrollTrigger: { trigger: el, start: 'top 90%', toggleActions: 'play none none none' }
    });
  });

  // Parallax on section headlines
  document.querySelectorAll('.section-headline').forEach(el => {
    gsap.to(el, {
      y: -20,
      ease: 'none',
      scrollTrigger: {
        trigger: el,
        start: 'top bottom',
        end: 'bottom top',
        scrub: 0.5
      }
    });
  });

  // Audit ring animation
  const ringPath = document.querySelector('.audit-ring-path');
  if (ringPath) {
    const circumference = 2 * Math.PI * 70;
    const target = CONFIG.prospect.website_audit.score;
    const finalOffset = circumference * (1 - target / 100);
    gsap.fromTo(ringPath,
      { strokeDashoffset: circumference },
      {
        strokeDashoffset: finalOffset,
        duration: 1.8,
        ease: 'power3.out',
        scrollTrigger: { trigger: ringPath, start: 'top 80%' }
      }
    );
  }

  // Counter animations with ScrollTrigger
  document.querySelectorAll('[data-counter]').forEach(el => {
    const target = parseInt(el.dataset.counter);
    if (isNaN(target)) return;
    ScrollTrigger.create({
      trigger: el,
      start: 'top 85%',
      once: true,
      onEnter: () => {
        const duration = 1800;
        const startTime = performance.now();
        function tick(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 4);
          el.textContent = Math.round(target * eased) + '+';
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }
    });
  });

  // Dashboard frames stagger reveal
  document.querySelectorAll('.dashboard-frame').forEach((frame, i) => {
    gsap.from(frame, {
      y: 60,
      opacity: 0,
      rotation: 0,
      duration: 1,
      delay: i * 0.2,
      ease: 'power4.out',
      scrollTrigger: { trigger: frame.parentElement, start: 'top 80%', toggleActions: 'play none none none' }
    });
  });
}
</script>
