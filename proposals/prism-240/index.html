 paid SaaS model.","signals":[{"title":"Early signal exists","detail":"You already have click volume and signups, which means the first job is quality diagnosis, not campaign creation from zero."},{"title":"Traffic is secondary","detail":"The real metric is whether users become activated accounts that resemble future paid SaaS buyers."},{"title":"Category is nuanced","detail":"AI spend management sits across developer tooling, SaaS management, FinOps, and startup finance, so positioning needs testing before scale."}],"opportunities":[{"phase":"Now","title":"Clean the funnel","detail":"Define the few events that prove activation and make sure ads, landing page, signup, and onboarding are measured correctly."},{"phase":"Next","title":"Test intent","detail":"Separate people curious about AI costs from founders and dev teams actively trying to understand or reduce software spend."},{"phase":"Then","title":"Improve conversion","detail":"Rewrite ad and landing page copy around the angles that create qualified signups, not just cheaper clicks."},{"phase":"Always","title":"Protect budget","detail":"Keep spend tied to learning velocity, activation quality, and a clear decision on whether to scale, narrow, or pause acquisition."}]},"strategy":{"headline":"Use Google Search as a validation lab for Prism's best buyer, message, and activation path.","pillars":[{"icon":"target","title":"Intent Segmentation","line":"Separate AI API cost, SaaS subscription visibility, software stack spend, and startup finance searches so each intent gets its own message."},{"icon":"funnel","title":"Activation Tracking","line":"Define the events that show a signup has actually understood Prism's value, connected meaningful data, or moved toward paid intent."},{"icon":"repeat","title":"Conversion Copy","line":"Rework ads, landing page sections, and onboarding emails to move the right users from curiosity to product activation."}],"engine_notes":[{"title":"Ads audit","detail":"Review current keywords,
