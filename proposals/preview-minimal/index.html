<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Growth Engine — Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
/* ============================================================
   Refined Minimal — TGE Proposal Template
   Inspired by Stripe / Linear / Vercel
   ============================================================ */

:root {
  --bg: #0A0A0A;
  --bg-elevated: #0E0E0E;
  --surface: #111111;
  --surface-2: #161616;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --highlight: rgba(255, 255, 255, 0.04);
  --text: #EDEDED;
  --text-secondary: #B4B4B4;
  --muted: #8A8A8A;
  --subtle: #555555;
  --accent: #C069DD;
  --accent-soft: rgba(192, 105, 221, 0.10);
  --accent-line: rgba(192, 105, 221, 0.35);
  --success: #4ADE80;
  --warning: #F59E0B;
  --danger: #EF4444;
  --shadow-1: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
  --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4);
  --radius: 12px;
  --radius-lg: 16px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  letter-spacing: -0.005em;
  overflow-x: hidden;
}

/* Subtle ambient grid (very faint) */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none;
  z-index: 0;
}

/* Scroll progress bar */
.scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 1px;
  background: var(--accent);
  width: 0%;
  z-index: 100;
  transition: width 80ms linear;
}

/* Top nav */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(10, 10, 10, 0.72);
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  border-bottom: 1px solid var(--border);
  z-index: 90;
  font-size: 13px;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.nav-brand-mark {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: linear-gradient(135deg, #1A1A1A, #0A0A0A);
  border: 1px solid var(--border-strong);
  display: grid; place-items: center;
  position: relative;
}
.nav-brand-mark::after {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}
.nav-meta {
  display: flex;
  align-items: center;
  gap: 18px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-feature-settings: 'tnum';
}
.nav-meta .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
  margin-right: 6px;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Layout */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 28px;
  position: relative;
  z-index: 1;
}
.section {
  padding: 120px 0;
  position: relative;
  z-index: 1;
}
.section-tight { padding: 80px 0; }

/* Section header pattern */
.section-label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.section-label::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
}
.section-heading {
  font-family: 'Inter', sans-serif;
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 600;
  letter-spacing: -0.025em;
  line-height: 1.1;
  margin-bottom: 16px;
  color: var(--text);
}
.section-sub {
  color: var(--muted);
  font-size: 16px;
  max-width: 640px;
  line-height: 1.6;
  margin-bottom: 56px;
}

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 56px 28px 80px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.hero-inner {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}
.hero-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.hero-bg::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 900px; height: 900px;
  background: radial-gradient(circle at center, rgba(192, 105, 221, 0.06) 0%, transparent 60%);
  filter: blur(40px);
}
.hero-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hero-eyebrow::before {
  content: '';
  width: 24px; height: 1px;
  background: var(--accent);
}
.hero-headline {
  font-family: 'Inter', sans-serif;
  font-size: clamp(52px, 9vw, 124px);
  font-weight: 600;
  letter-spacing: -0.045em;
  line-height: 0.96;
  margin-bottom: 32px;
  color: var(--text);
}
.hero-headline .accent-dot {
  color: var(--accent);
}
.hero-subline {
  font-size: clamp(18px, 1.6vw, 22px);
  color: var(--text-secondary);
  max-width: 720px;
  line-height: 1.5;
  font-weight: 400;
  margin-bottom: 48px;
  letter-spacing: -0.01em;
}
.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  font-feature-settings: 'tnum';
  margin-bottom: 48px;
}
.hero-stats span {
  display: flex;
  align-items: center;
  gap: 8px;
}
.hero-stats span::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--border-strong);
}
.hero-cta-row {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  text-decoration: none;
  transition: background 180ms var(--ease), border-color 180ms var(--ease), transform 180ms var(--ease);
  box-shadow: var(--shadow-1);
  font-family: inherit;
}
.btn:hover {
  background: var(--surface-2);
  border-color: var(--border-strong);
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent);
  color: #0A0A0A;
  border-color: var(--accent);
  font-weight: 600;
}
.btn-primary:hover {
  background: #CB7FE2;
  border-color: #CB7FE2;
}
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border-color: var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border-strong); }
.btn i { width: 14px; height: 14px; }

.hero-credit {
  position: absolute;
  bottom: 32px; right: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--subtle);
  text-align: right;
  z-index: 2;
}

/* Generic Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-card);
  transition: transform 220ms var(--ease-out), border-color 220ms var(--ease), background 220ms var(--ease);
}
.card:hover {
  transform: translateY(-1px);
  border-color: var(--border-strong);
  background: var(--surface-2);
}
.card-quiet { background: transparent; }

/* Browser frame (refined) */
.browser-frame {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 32px -12px rgba(0,0,0,0.6);
}
.browser-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.browser-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
}
.browser-url {
  margin-left: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  flex: 1;
  text-align: center;
  padding-right: 56px;
}
.browser-content {
  padding: 32px;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg-elevated) 100%);
  min-height: 280px;
  position: relative;
}

/* === SECTION 2: Audit === */
.audit-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 40px;
  align-items: start;
}
.audit-screenshot-wrap { position: relative; }
.audit-mock-page {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.audit-mock-page .mock-block {
  height: 14px;
  background: rgba(255,255,255,0.04);
  border-radius: 4px;
}
.audit-mock-page .mock-block.tall { height: 60px; }
.audit-mock-page .mock-block.wide { width: 80%; }
.audit-mock-page .mock-block.sm { width: 40%; }
.audit-callout {
  position: absolute;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: #0A0A0A;
  z-index: 4;
  box-shadow: 0 0 0 4px var(--bg);
  cursor: pointer;
  transition: transform 220ms var(--ease-out);
}
.audit-callout.warning { background: var(--warning); }
.audit-callout.danger { background: var(--danger); color: #fff; }
.audit-callout:hover { transform: scale(1.15); }
.audit-findings {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.audit-finding {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  transition: border-color 200ms var(--ease), background 200ms var(--ease);
}
.audit-finding:hover { border-color: var(--border-strong); background: var(--surface-2); }
.audit-finding-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: #0A0A0A;
}
.audit-finding-num.warning { background: var(--warning); }
.audit-finding-num.danger { background: var(--danger); color: #fff; }
.audit-score {
  margin-top: 24px;
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  gap: 24px;
}
.audit-score-ring {
  position: relative;
  width: 84px; height: 84px;
  flex-shrink: 0;
}
.audit-score-ring svg { transform: rotate(-90deg); }
.audit-score-ring .bg-ring { stroke: var(--border); }
.audit-score-ring .fg-ring { stroke: var(--warning); transition: stroke-dashoffset 1.6s var(--ease-out); }
.audit-score-num {
  position: absolute;
  inset: 0;
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  font-feature-settings: 'tnum';
}
.audit-score-meta { color: var(--muted); font-size: 13px; line-height: 1.5; }
.audit-score-meta strong { color: var(--text); display: block; font-size: 14px; margin-bottom: 4px; font-weight: 600; }
.audit-fix-line {
  margin-top: 24px;
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.5;
  font-style: italic;
  padding-left: 14px;
  border-left: 1px solid var(--accent-line);
}

/* === SECTION 3: Problems === */
.problem-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.problem-row {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 28px;
  padding: 32px;
  background: var(--bg);
  align-items: center;
  transition: background 200ms var(--ease);
}
.problem-row:hover { background: var(--surface); }
.problem-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  font-feature-settings: 'tnum';
}
.problem-text { display: flex; flex-direction: column; gap: 8px; }
.problem-statement {
  font-size: clamp(20px, 2.2vw, 26px);
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1.3;
}
.problem-context { color: var(--muted); font-size: 14px; line-height: 1.55; max-width: 560px; }
.problem-data {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--warning);
  font-feature-settings: 'tnum';
  white-space: nowrap;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid rgba(245, 158, 11, 0.18);
  background: rgba(245, 158, 11, 0.04);
}

/* === SECTION 4: Competitors === */
.compare-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
  font-size: 14px;
}
.compare-table th, .compare-table td {
  padding: 14px 18px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.compare-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  background: var(--surface-2);
}
.compare-table tr:last-child td { border-bottom: none; }
.compare-table th.prospect-col { color: var(--accent); }
.compare-table .check { color: var(--success); }
.compare-table .x { color: var(--danger); }
.compare-table .label { color: var(--text); }
.gaps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 32px;
}
.gap-card { padding: 24px; }
.gap-card h4 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  margin-bottom: 8px;
}
.gap-card p { font-size: 14px; color: var(--muted); line-height: 1.55; }
.gap-card-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}
.compete-closer {
  margin-top: 32px;
  text-align: center;
  font-size: 18px;
  color: var(--text-secondary);
  font-style: italic;
}
.compete-closer span { color: var(--accent); }

/* === SECTION 5: Roadmap === */
.timeline {
  position: relative;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.timeline::before {
  content: '';
  position: absolute;
  top: 18px;
  left: 5%; right: 5%;
  height: 1px;
  background: var(--border);
  z-index: 0;
}
.timeline-card {
  position: relative;
  z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  transition: border-color 220ms var(--ease), transform 220ms var(--ease-out), background 220ms var(--ease);
}
.timeline-card:hover { transform: translateY(-2px); border-color: var(--border-strong); background: var(--surface-2); }
.timeline-dot {
  position: absolute;
  top: -6px; left: 24px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--accent);
  z-index: 2;
}
.timeline-week {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
  margin-top: 8px;
}
.timeline-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 16px;
}
.timeline-items { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.timeline-items li {
  font-size: 13px;
  color: var(--text-secondary);
  padding-left: 18px;
  position: relative;
  line-height: 1.5;
}
.timeline-items li::before {
  content: '';
  position: absolute;
  left: 0; top: 8px;
  width: 8px; height: 1px;
  background: var(--border-strong);
}
.timeline-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-feature-settings: 'tnum';
}
.timeline-total {
  margin-top: 32px;
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.timeline-total .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 600;
  color: var(--accent);
  font-feature-settings: 'tnum';
}
.timeline-total .lbl { color: var(--muted); font-size: 14px; }

/* === SECTION 6: Strategy === */
.strategy-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.strategy-card {
  display: grid;
  grid-template-columns: 80px 1fr 280px;
  gap: 32px;
  padding: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  align-items: start;
  transition: border-color 220ms var(--ease), background 220ms var(--ease);
}
.strategy-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
.strategy-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.08em;
}
.strategy-content h3 {
  font-size: clamp(20px, 2vw, 26px);
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  color: var(--text);
}
.strategy-content ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.strategy-content li {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.55;
  padding-left: 20px;
  position: relative;
}
.strategy-content li::before {
  content: '';
  position: absolute;
  left: 0; top: 9px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.4;
}
.strategy-result {
  background: rgba(74, 222, 128, 0.04);
  border: 1px solid rgba(74, 222, 128, 0.16);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.strategy-result-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--success);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.strategy-result-value {
  font-size: 15px;
  color: var(--text);
  font-weight: 500;
  letter-spacing: -0.01em;

/* ========== Section 2: Audit ========== */
function renderAudit() {
  const a = CONFIG.prospect.website_audit;
  const callouts = a.findings.map((f, i) => `
    <div class="audit-callout ${f.severity}" style="left: ${f.x}%; top: ${f.y}%;">${i + 1}</div>
  `).join('');
  const findingsList = a.findings.map((f, i) => `
    <div class="audit-finding">
      <div class="audit-finding-num ${f.severity}">${i + 1}</div>
      <div>${f.text}</div>
    </div>
  `).join('');
  const score = a.score;
  const scoreLabel = score < 50 ? 'Significant gaps detected' : score < 75 ? 'Room to improve' : 'Strong foundation';
  const c = 2 * Math.PI * 36;
  const offset = c * (1 - score / 100);

  const screenshot = browserFrame(CONFIG.prospect.website, `
    <div class="audit-mock-page">
      <div class="mock-block tall"></div>
      <div class="mock-block wide"></div>
      <div class="mock-block sm"></div>
      <div class="mock-block tall" style="height: 100px;"></div>
      <div class="mock-block wide"></div>
      <div class="mock-block sm"></div>
    </div>
    ${callouts}
  `);

  return `
  <section class="section" id="audit">
    <div class="container">
      <div class="section-label fx-fade">We looked at your website</div>
      <h2 class="section-heading fx-fade">Here's what we found.</h2>
      <p class="section-sub fx-fade">A 12-point audit. Five issues are working against your conversions right now.</p>
      <div class="audit-grid fx-fade">
        <div class="audit-screenshot-wrap">${screenshot}</div>
        <div>
          <div class="audit-findings">${findingsList}</div>
          <div class="audit-score">
            <div class="audit-score-ring">
              <svg width="84" height="84" viewBox="0 0 84 84">
                <circle class="bg-ring" cx="42" cy="42" r="36" fill="none" stroke-width="3"/>
                <circle class="fg-ring" cx="42" cy="42" r="36" fill="none" stroke-width="3"
                  stroke-dasharray="${c}" stroke-dashoffset="${c}" data-score-offset="${offset}" stroke-linecap="round"/>
              </svg>
              <div class="audit-score-num"><span data-counter="${score}">0</span>/100</div>
            </div>
            <div class="audit-score-meta">
              <strong>Audit score</strong>
              ${scoreLabel}. We fix all of this in week one.
            </div>
          </div>
          <div class="audit-fix-line">"Don't worry. We rebuild this above the fold first, before anything else ships."</div>
        </div>
      </div>
    </div>
  </section>`;
}

/* ========== Mount ========== */
function mount() {
  document.getElementById('navProspect').textContent = cn;
  document.getElementById('navDate').textContent = CONFIG.meta.generated_date;

  const html = [
    renderHero(),
    renderAudit(),
    renderProblems(),
    renderCompetitors(),
    renderRoadmap(),
    renderStrategy(),
    renderProof(),
    renderFrenchify(),
    renderDrSW(),
    renderDashboards(),
    renderSystem(),
    renderFunnel(),
    renderDeliverables(),
    renderFeatures(),
    renderPricing(),
    renderClose()
  ].join('');

  document.getElementById('app').innerHTML = html;

  if (window.lucide) lucide.createIcons();

  bindPillarTabs();
  bindCounters();
  bindScrollProgress();
  bindEntrances();
  bindAuditScore();
}

function bindPillarTabs() {
  const tabs = document.querySelectorAll('.pillar-tab');
  const panels = document.querySelectorAll('[data-pillar-panel]');
  tabs.forEach(t => {
    t.addEventListener('click', () => {
      const id = t.dataset.pillar;
      tabs.forEach(x => x.classList.toggle('active', x === t));
      panels.forEach(p => p.style.display = (p.dataset.pillarPanel === id) ? 'flex' : 'none');
    });
  });
}

function bindCounters() {
  const els = document.querySelectorAll('[data-counter]');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el = e.target;
      const target = parseFloat(el.getAttribute('data-counter'));
      if (isNaN(target)) return;
      const dur = 1400;
      const start = performance.now();
      const from = 0;
      function tick(now) {
        const t = Math.min(1, (now - start) / dur);
        const eased = 1 - Math.pow(1 - t, 3);
        const v = from + (target - from) * eased;
        el.textContent = (target % 1 === 0) ? Math.floor(v).toLocaleString() : v.toFixed(2);
        if (t < 1) requestAnimationFrame(tick);
        else el.textContent = (target % 1 === 0) ? target.toLocaleString() : target.toFixed(2);
      }
      requestAnimationFrame(tick);
      obs.unobserve(el);
    });
  }, { threshold: 0.4 });
  els.forEach(el => obs.observe(el));
}

function bindAuditScore() {
  const ring = document.querySelector('.fg-ring');
  if (!ring) return;
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const off = ring.getAttribute('data-score-offset');
      requestAnimationFrame(() => { ring.setAttribute('stroke-dashoffset', off); });
      obs.unobserve(ring);
    });
  }, { threshold: 0.4 });
  obs.observe(ring);
}

function bindScrollProgress() {
  const bar = document.getElementById('scrollProgress');
  function update() {
    const h = document.documentElement;
    const pct = (h.scrollTop) / (h.scrollHeight - h.clientHeight);
    bar.style.width = (Math.max(0, Math.min(1, pct)) * 100) + '%';
  }
  document.addEventListener('scroll', update, { passive: true });
  update();
}

function bindEntrances() {
  if (!window.gsap) return;
  if (window.ScrollTrigger) gsap.registerPlugin(ScrollTrigger);

  // Hero on load
  gsap.to('.hero .fx-fade', {
    opacity: 1, y: 0, duration: 0.8, ease: 'power3.out', stagger: 0.08, delay: 0.1
  });

  // Section entrances
  document.querySelectorAll('.section .fx-fade, .close-section .fx-fade').forEach(el => {
    gsap.to(el, {
      opacity: 1, y: 0, duration: 0.7, ease: 'power3.out',
      scrollTrigger: { trigger: el, start: 'top 88%', once: true }
    });
  });
}

document.addEventListener('DOMContentLoaded', mount);
</script>
